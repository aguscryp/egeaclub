<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Pro | Agustín Engine</title>
    <style>
        :root { --pink: #ff007f; }
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: sans-serif; display: flex; }
        #ui { width: 350px; padding: 30px; background: rgba(10,10,10,0.9); border-right: 2px solid var(--pink); z-index: 10; }
        h1 { color: var(--pink); font-size: 20px; text-transform: uppercase; }
        .op { margin-bottom: 20px; display: flex; flex-direction: column; }
        input, select { padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 5px; margin-top: 5px; }
        .btn { background: var(--pink); border: none; padding: 15px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; border-radius: 5px; }
        #canvas-container { flex: 1; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Editor Operador</h1>
        <div class="op"><label>Color Equipación</label><input type="color" id="charColor" value="#ff007f"></div>
        <div class="op"><label>Musculatura</label><input type="range" id="muscleWidth" min="0.7" max="1.5" step="0.1" value="1"></div>
        <div class="op"><label>Altura</label><input type="range" id="charHeight" min="0.8" max="1.3" step="0.05" value="1"></div>
        <div class="op"><label>Calzado</label>
            <select id="shoeModel">
                <option value="nike_tn">Nike TN Neón</option>
                <option value="adidas_classic">Adidas Classic</option>
                <option value="boots">Botas Tácticas</option>
            </select>
        </div>
        <button class="btn" onclick="save()">GUARDAR Y SALIR</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="zapatillas.js"></script>
    <script>
        let scene, camera, renderer, vaquero, pI, pD;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 6);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth - 350, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            build();
            document.querySelectorAll('input, select').forEach(el => el.oninput = build);
            animate();
        }
        function build() {
            if(vaquero) scene.remove(vaquero);
            vaquero = new THREE.Group();
            const color = document.getElementById('charColor').value;
            const muscle = parseFloat(document.getElementById('muscleWidth').value);
            const matRopa = new THREE.MeshStandardMaterial({color: color});
            const matPiel = new THREE.MeshStandardMaterial({color: 0xffe0bd});
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8*muscle, 1.2, 0.5), matRopa); torso.position.y = 1.6;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel); cabeza.position.y = 2.5;
            pI = new THREE.Group(); pD = new THREE.Group();
            const pierna = new THREE.Mesh(new THREE.BoxGeometry(0.3*muscle, 0.9, 0.3), matRopa);
            pI.add(pierna.clone()); pD.add(pierna.clone());
            pI.position.set(-0.25, 0.7, 0); pD.position.set(0.25, 0.7, 0);
            
            // Cargar desde zapatillas.js
            const mod = document.getElementById('shoeModel').value;
            const zI = GaleriaZapatillas[mod](color); const zD = GaleriaZapatillas[mod](color);
            zI.position.y = -0.5; zD.position.y = -0.5;
            pI.add(zI); pD.add(zD);

            vaquero.add(torso, cabeza, pI, pD);
            vaquero.scale.y = parseFloat(document.getElementById('charHeight').value);
            scene.add(vaquero);
        }
        function save() {
            const config = {
                color: document.getElementById('charColor').value,
                musculo: document.getElementById('muscleWidth').value,
                altura: document.getElementById('charHeight').value,
                zapato: document.getElementById('shoeModel').value
            };
            localStorage.setItem('playerConfig', JSON.stringify(config));
            alert("Sincronizado");
        }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
