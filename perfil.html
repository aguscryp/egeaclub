<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Pro | Agustín ADN</title>
    <style>
        :root { --pink: #ff007f; --dark: #050505; }
        body { margin: 0; overflow: hidden; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; }
        #ui { width: 350px; padding: 25px; background: rgba(10,10,10,0.95); border-right: 2px solid var(--pink); z-index: 100; height: 100vh; overflow-y: auto; }
        h2 { color: var(--pink); text-transform: uppercase; font-size: 18px; letter-spacing: 2px; }
        .op { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: var(--pink); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 15px var(--pink); }
        #canvas-container { flex: 1; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>EDITOR ADN</h2>
        <div class="op"><label>Color Equipación</label><input type="color" id="cColor" value="#ff007f"></div>
        <div class="op"><label>Musculatura</label><input type="range" id="cMuscle" min="0.8" max="1.5" step="0.1" value="1"></div>
        <div class="op"><label>Altura</label><input type="range" id="cHeight" min="0.8" max="1.3" step="0.05" value="1"></div>
        
        <div class="op"><label>Accesorio Cabeza</label>
            <select id="cHat">
                <option value="none">Ninguno</option>
                <optgroup label="Sombreros">
                    <option value="cowboy_classic">Cowboy</option>
                    <option value="texano_pink">Texano Pink</option>
                    <option value="mafia_boss">Mafia Boss</option>
                    <option value="top_hat">Galeón Negro</option>
                </optgroup>
                <optgroup label="Gorras">
                    <option value="cap_urban">Urbana Black</option>
                    <option value="cap_neon">Neon Flow</option>
                    <option value="cap_flat">Gorra Plana</option>
                </optgroup>
            </select>
        </div>

        <div class="op"><label>Zapatillas</label>
            <select id="cShoe">
                <option value="nike_tn">Nike TN</option>
                <option value="nike_air_max">Air Max</option>
                <option value="neon_flow_special">Neon Special</option>
                <option value="cyber_punk_2077">Cyber Edition</option>
                <option value="jordan_retro">Jordan Retro</option>
            </select>
        </div>
        <button class="btn" onclick="save()">GUARDAR Y SINCRONIZAR</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="zapatillas.js"></script>
    <script src="sombreros.js"></script>
    <script>
        let scene, camera, renderer, vaquero;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth-350)/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth-350, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            build();
            document.querySelectorAll('input, select').forEach(el => el.oninput = build);
            animate();
        }

        function build() {
            if(vaquero) scene.remove(vaquero);
            vaquero = new THREE.Group();
            const color = document.getElementById('cColor').value;
            const muscle = parseFloat(document.getElementById('cMuscle').value);
            const height = parseFloat(document.getElementById('cHeight').value);
            const matR = new THREE.MeshStandardMaterial({color: color});
            const matP = new THREE.MeshStandardMaterial({color: 0xffe0bd});

            // Cuerpo
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8*muscle, 1.2, 0.5), matR); torso.position.y = 1.6;
            const cab = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matP); cab.position.y = 2.5;
            
            // ANCLAJE DE SOMBRERO (A la cabeza directamente)
            const hatID = document.getElementById('cHat').value;
            if(hatID !== 'none' && GaleriaSombreros[hatID]) {
                const hat = GaleriaSombreros[hatID](color);
                hat.scale.set(0.12, 0.12, 0.12);
                hat.position.y = 0.32; // Sobre el tope de la cabeza
                cab.add(hat); // Se ancla a la cabeza
            }

            const pI = new THREE.Group(); const pD = new THREE.Group();
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.32*muscle, 1, 0.32), matR);
            pI.add(leg.clone()); pD.add(leg.clone());
            pI.position.set(-0.25, 0.6, 0); pD.position.set(0.25, 0.6, 0);
            
            // Zapatillas
            const shoeID = document.getElementById('cShoe').value;
            const zI = GaleriaZapatillas[shoeID](color); 
            const zD = GaleriaZapatillas[shoeID](color);
            zI.position.y = -0.55; zD.position.y = -0.55;
            pI.add(zI); pD.add(zD);

            vaquero.add(torso, cab, pI, pD);
            vaquero.scale.y = height;
            scene.add(vaquero);
        }

        function save() {
            const data = {
                color: document.getElementById('cColor').value,
                musculo: document.getElementById('cMuscle').value,
                altura: document.getElementById('cHeight').value,
                zapato: document.getElementById('cShoe').value,
                sombrero: document.getElementById('cHat').value
            };
            localStorage.setItem('playerConfig', JSON.stringify(data));
            alert("ADN de Agustín guardado con éxito.");
        }

        function animate() { requestAnimationFrame(animate); if(vaquero) vaquero.rotation.y += 0.01; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
