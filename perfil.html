<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Operador | Cowboy Engine</title>
    <style>
        :root { --pink: #ff007f; --neon: 0 0 15px #ff007f; }
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; }
        
        /* Panel Lateral Izquierdo (Configuración) */
        #ui-panel {
            width: 350px; height: 100vh; background: rgba(10, 10, 10, 0.95);
            border-right: 2px solid var(--pink); box-shadow: var(--neon);
            padding: 30px; box-sizing: border-box; z-index: 10;
            display: flex; flex-direction: column; gap: 20px; backdrop-filter: blur(10px);
        }

        h1 { color: var(--pink); text-transform: uppercase; letter-spacing: 2px; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        
        input[type="color"] { width: 100%; height: 40px; border: 1px solid #333; background: none; cursor: pointer; border-radius: 5px; }
        input[type="range"] { accent-color: var(--pink); cursor: pointer; }

        .stats-display { background: #111; padding: 15px; border-radius: 8px; border-left: 3px solid var(--pink); font-size: 13px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .val { color: var(--pink); font-weight: bold; }

        .btn-ready {
            background: var(--pink); color: white; border: none; padding: 15px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-top: auto; transition: 0.3s;
        }
        .btn-ready:hover { box-shadow: var(--neon); transform: scale(1.02); }

        /* Contenedor del Personaje 3D */
        #canvas-container { flex: 1; height: 100vh; position: relative; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Operador: <span id="userName"></span></h1>

        <div class="control-group">
            <label>Color de Equipación</label>
            <input type="color" id="charColor" value="#ff007f">
        </div>

        <div class="control-group">
            <label>Musculatura (Brazos/Piernas)</label>
            <input type="range" id="muscleWidth" min="0.5" max="1.5" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Altura del Sujeto</label>
            <input type="range" id="charHeight" min="0.8" max="1.3" step="0.05" value="1">
        </div>

        <div class="stats-display">
            <div class="stat-row"><span>Energía:</span> <span class="val">100%</span></div>
            <div class="stat-row"><span>Alimentación:</span> <span class="val" id="hunger-val">Lleno</span></div>
            <div class="stat-row"><span>Hidratación:</span> <span class="val" id="thirst-val">Lleno</span></div>
            <div class="stat-row"><span>Respiración:</span> <span class="val" id="breath-val">Estable</span></div>
        </div>

        <button class="btn-ready" onclick="finalizeAndStart()">Desplegar en Mapa</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero;
        let torso, pIzq, pDer, bIzq, bDer;
        
        function initEditor() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Luces Estilo Studio
            const light1 = new THREE.PointLight(0xffffff, 1);
            light1.position.set(5, 5, 5);
            const light2 = new THREE.PointLight(0xff007f, 0.5); // Luz fucsia de rebote
            light2.position.set(-5, 2, 2);
            scene.add(light1, light2, new THREE.AmbientLight(0xffffff, 0.4));

            // Grid de fondo
            const grid = new THREE.GridHelper(10, 20, 0x333333, 0x111111);
            scene.add(grid);

            buildCharacter();
            animate();
            
            // Listeners para cambios en tiempo real
            document.getElementById('charColor').addEventListener('input', updateChar);
            document.getElementById('muscleWidth').addEventListener('input', updateChar);
            document.getElementById('charHeight').addEventListener('input', updateChar);
            
            document.getElementById('userName').innerText = localStorage.getItem('currentUser') || "Agustín";
        }

        function buildCharacter() {
            vaquero = new THREE.Group();
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            
            // Torso
            torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), new THREE.MeshStandardMaterial({color: 0xff007f}));
            torso.position.y = 1.6;
            
            // Cabeza
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;

            // Extremidades (Separadas para manipular física)
            const geoExt = new THREE.BoxGeometry(0.3, 0.9, 0.3);
            pIzq = new THREE.Mesh(geoExt, new THREE.MeshStandardMaterial({color: 0xff007f})); pIzq.position.set(-0.25, 0.5, 0);
            pDer = new THREE.Mesh(geoExt, new THREE.MeshStandardMaterial({color: 0xff007f})); pDer.position.set(0.25, 0.5, 0);
            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matPiel); bIzq.position.set(-0.6, 1.7, 0);
            bDer = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matPiel); bDer.position.set(0.6, 1.7, 0);

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            scene.add(vaquero);
            updateChar();
        }

        function updateChar() {
            const color = document.getElementById('charColor').value;
            const muscle = parseFloat(document.getElementById('muscleWidth').value);
            const height = parseFloat(document.getElementById('charHeight').value);

            // Aplicar color
            torso.material.color.set(color);
            pIzq.material.color.set(color);
            pDer.material.color.set(color);

            // Aplicar Musculatura (Escalado X y Z)
            bIzq.scale.set(muscle, 1, muscle);
            bDer.scale.set(muscle, 1, muscle);
            pIzq.scale.set(muscle, 1, muscle);
            pDer.scale.set(muscle, 1, muscle);

            // Aplicar Altura
            vaquero.scale.y = height;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            // --- FÍSICA DE RESPIRACIÓN (Idle) ---
            if(vaquero) {
                // El pecho se infla suavemente
                torso.scale.x = 1 + Math.sin(time) * 0.02;
                torso.scale.z = 1 + Math.sin(time) * 0.03;
                
                // Los brazos se mueven levemente al respirar
                bIzq.rotation.z = Math.sin(time) * 0.05;
                bDer.rotation.z = -Math.sin(time) * 0.05;

                // Giro suave de presentación
                vaquero.rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }

        function finalizeAndStart() {
            const config = {
                color: document.getElementById('charColor').value,
                musculo: document.getElementById('muscleWidth').value,
                altura: document.getElementById('charHeight').value,
                stats: {
                    hambre: 100, // 100 = Lleno
                    sed: 100,
                    energia: 100,
                    cansancio: 0
                }
            };
            localStorage.setItem('playerConfig', JSON.stringify(config));
            window.location.href = "mapa.html";
        }

        window.onload = initEditor;
    </script>
</body>
</html>
