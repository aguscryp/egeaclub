<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elementor Pro | Agustín</title>
    <style>
        :root { --pink: #ff007f; --dark: #0a0a0a; --neon: #00d4ff; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
        
        /* Panel Lateral */
        #panel {
            width: 300px; height: 100vh; background: rgba(15, 15, 15, 0.95);
            border-right: 2px solid var(--pink); padding: 20px; overflow-y: auto;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5); z-index: 100;
        }

        h2 { color: var(--pink); text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px; }
        .cat { font-size: 12px; color: var(--neon); margin: 15px 0 10px; font-weight: bold; border-bottom: 1px solid #333; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-btn {
            background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 10px;
            cursor: pointer; font-size: 11px; border-radius: 4px; transition: 0.3s;
        }
        .item-btn:hover { border-color: var(--pink); color: white; background: #252525; }
        .item-btn.active { background: var(--pink); color: white; border-color: white; box-shadow: 0 0 10px var(--pink); }

        #btn-save {
            width: 100%; margin-top: 30px; padding: 15px; background: var(--neon);
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--neon); transition: 0.3s;
        }
        #btn-save:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* Render */
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
        .instrucciones {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="panel">
        <h2>CITY BUILDER PRO</h2>
        
        <div class="cat">INFRAESTRUCTURA</div>
        <div class="grid">
            <button class="item-btn" onclick="sel('calle', this)">🛣️ CALLE</button>
            <button class="item-btn" onclick="sel('vereda', this)">🚶 VEREDA</button>
            <button class="item-btn" onclick="sel('porton', this)">🚪 PORTÓN</button>
            <button class="item-btn" onclick="sel('luz_led', this)">💡 LUZ LED</button>
        </div>

        <div class="cat">VEHÍCULOS (USABLES)</div>
        <div class="grid">
            <button class="item-btn" onclick="sel('auto_conducible', this)" style="grid-column: span 2; border-color: var(--neon);">🚗 AUTO ROJO MANEJABLE</button>
            <button class="item-btn" onclick="sel('sw4', this)">🛻 TOYOTA SW4</button>
        </div>

        <div class="cat">VEGETACIÓN</div>
        <div class="grid">
            <button class="item-btn" onclick="sel('palmera', this)">🌴 PALMERA</button>
            <button class="item-btn" onclick="sel('pino', this)">🌲 PINO</button>
        </div>

        <button id="btn-save" onclick="guardarCiudad()">GUARDAR CIUDAD</button>
        <button class="item-btn" onclick="borrarUltimo()" style="width:100%; margin-top:10px;">DESHACER ÚLTIMO</button>
        <button class="item-btn" onclick="limpiarTodo()" style="width:100%; margin-top:10px; border-color: red;">BORRAR TODO</button>
    </div>

    <div id="canvas-container"></div>
    <div class="instrucciones">CLICK: Colocar | CLICK DER: Girar Cámara | RUEDITA: Zoom</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, raycaster, mouse;
        let selectedType = 'calle';
        let ghostObject = null;
        let elementos = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            camera = new THREE.PerspectiveCamera(60, (window.innerWidth - 300) / window.innerHeight, 0.1, 10000);
            camera.position.set(150, 150, 150);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            // Rejilla de guía
            const grid = new THREE.GridHelper(2000, 40, 0x333333, 0x222222);
            scene.add(grid);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Cargar datos previos
            const saved = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            saved.forEach(item => {
                const obj = createModel(item.type);
                obj.position.set(item.pos.x, 0, item.pos.z);
                scene.add(obj);
                elementos.push({ type: item.type, obj: obj });
            });

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', placeObject);
            animate();
        }

        function sel(type, btn) {
            selectedType = type;
            document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(ghostObject) scene.remove(ghostObject);
            ghostObject = createModel(type, true);
            scene.add(ghostObject);
        }

        function createModel(type, isPreview = false) {
            const group = new THREE.Group();
            const mat = (c) => new THREE.MeshStandardMaterial({ 
                color: c, 
                transparent: isPreview, 
                opacity: isPreview ? 0.5 : 1 
            });

            if(type === 'calle') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 50), mat(0x111111)));
                group.add(new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 50), mat(0xffff00)));
            } 
            else if(type === 'auto_conducible' || type === 'sw4') {
                const color = type === 'auto_conducible' ? 0xff0044 : 0xffffff;
                const body = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 18), mat(color));
                body.position.y = 2.5;
                group.add(body);
                const tech = new THREE.Mesh(new THREE.BoxGeometry(8.5, 3, 9), mat(0x111111));
                tech.position.set(0, 5, -1);
                group.add(tech);
                // Ruedas
                const rG = new THREE.CylinderGeometry(1.6, 1.6, 1.2, 12);
                for(let i=0; i<4; i++) {
                    const r = new THREE.Mesh(rG, mat(0x111111));
                    r.rotation.z = Math.PI/2;
                    r.position.set(i%2?5:-5, 1.6, i<2?6:-6);
                    group.add(r);
                }
            } 
            else if(type === 'porton') {
                const p1 = new THREE.Mesh(new THREE.BoxGeometry(4, 30, 4), mat(0x222222));
                const p2 = p1.clone(); p1.position.x = -20; p2.position.x = 20;
                const barra = new THREE.Mesh(new THREE.BoxGeometry(40, 2, 2), mat(0x00d4ff));
                barra.position.y = 25;
                group.add(p1, p2, barra);
            } 
            else if(type === 'luz_led') {
                const poste = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 45), mat(0x333333));
                poste.position.y = 22.5;
                const cab = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 8), mat(0xffffff));
                cab.position.set(0, 45, 3);
                group.add(poste, cab);
            }
            else if(type === 'palmera') {
                const tr = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 30), mat(0x4b3621));
                tr.position.y = 15;
                const cp = new THREE.Mesh(new THREE.SphereGeometry(9, 8, 8), mat(0x228b22));
                cp.position.y = 30;
                group.add(tr, cp);
            }
            else if(type === 'vereda') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(50, 1.2, 12), mat(0x555555)));
            }
            else if(type === 'pino') {
                const tr = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 5), mat(0x3d2b1f));
                const co = new THREE.Mesh(new THREE.ConeGeometry(10, 25, 8), mat(0x0b3d0b));
                co.position.y = 15;
                group.add(tr, co);
            }
            return group;
        }

        function onMouseMove(event) {
            mouse.x = ((event.clientX - 300) / (window.innerWidth - 300)) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(scene.children[2]); // Intersectar con la rejilla

            if (intersects.length > 0 && ghostObject) {
                const pos = intersects[0].point;
                // Snap a la rejilla de 50 en 50 para las calles
                ghostObject.position.x = Math.round(pos.x / 25) * 25;
                ghostObject.position.z = Math.round(pos.z / 25) * 25;
                ghostObject.position.y = 0;
            }
        }

        function placeObject() {
            if(!ghostObject) return;
            const newObj = createModel(selectedType);
            newObj.position.copy(ghostObject.position);
            scene.add(newObj);
            elementos.push({ type: selectedType, obj: newObj });
        }

        function guardarCiudad() {
            const data = elementos.map(e => ({
                type: e.type,
                pos: { x: e.obj.position.x, z: e.obj.position.z }
            }));
            localStorage.setItem('elementos_ciudad', JSON.stringify(data));
            alert("✅ Ciudad Guardada. ¡Entra al mapa para verla!");
        }

        function borrarUltimo() {
            if(elementos.length > 0) {
                const last = elementos.pop();
                scene.remove(last.obj);
            }
        }

        function limpiarTodo() {
            if(confirm("¿Seguro quieres borrar toda la ciudad?")) {
                elementos.forEach(e => scene.remove(e.obj));
                elementos = [];
                localStorage.removeItem('elementos_ciudad');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
