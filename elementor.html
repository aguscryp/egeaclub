<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elementor Pro | Agustín Engine</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }
        
        #toolbar {
            width: 320px; height: 100vh; background: rgba(15, 15, 15, 0.95);
            border-right: 2px solid var(--pink); padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,1);
        }

        h2 { color: var(--pink); font-size: 18px; text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .category-label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 10px; font-weight: bold; }
        
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .btn-obj {
            background: #151515; border: 1px solid #333; color: #ccc; padding: 10px;
            border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-obj:hover { border-color: var(--pink); color: white; background: #202020; }
        .btn-obj.active { background: var(--pink); color: white; border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }

        #viewport { flex-grow: 1; position: relative; }
        #info { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-family: monospace; border: 1px solid var(--neon); color: var(--neon); }
    </style>
</head>
<body>

    <div id="toolbar">
        <h2>ELEMENTOR PRO</h2>
        
        <div class="category-label">Infraestructura</div>
        <div class="grid-tools">
            <button class="btn-obj active" onclick="select('calle', this)">🛣️ Calle</button>
            <button class="btn-obj" onclick="select('casa', this)">🏠 Casa</button>
            <button class="btn-obj" onclick="select('farola', this)">💡 Farola</button>
        </div>

        <div class="category-label">Naturaleza</div>
        <div class="grid-tools">
            <button class="btn-obj" onclick="select('pino', this)">🌲 Pino</button>
            <button class="btn-obj" onclick="select('palmera', this)">🌴 Palmera</button>
            <button class="btn-obj" onclick="select('vaca', this)">🐄 Vaca</button>
        </div>

        <div class="category-label">Vehículos y Tech</div>
        <div class="grid-tools">
            <button class="btn-obj" onclick="select('auto', this)">🚗 Auto</button>
            <button class="btn-obj" onclick="select('camioneta', this)">🛻 SW4 Pro</button>
            <button class="btn-obj" onclick="select('antena', this)">📡 Antena 5G</button>
        </div>

        <button onclick="borrarTodo()" style="margin-top:auto; background:none; border:1px solid #ff4444; color:#ff4444; padding:10px; cursor:pointer; border-radius:5px;">🗑️ Reset Mapa</button>
    </div>

    <div id="viewport">
        <div id="info">OBJETO: CALLE | SNAP: 5m</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, grid, selected = 'calle';
        let mouse = new THREE.Vector2(), raycaster = new THREE.Raycaster();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(50, (window.innerWidth-320)/window.innerHeight, 1, 5000);
            camera.position.set(300, 400, 300);
            camera.lookAt(0,0,0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth-320, window.innerHeight);
            document.getElementById('viewport').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            grid = new THREE.GridHelper(2000, 50, 0x333333, 0x222222);
            scene.add(grid);

            dibujarTodo();

            window.addEventListener('mousedown', (e) => {
                if(e.button !== 0) return;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObject(grid);
                if(hits.length > 0) {
                    const p = hits[0].point;
                    const obj = { type: selected, x: Math.round(p.x/10)*10, z: Math.round(p.z/10)*10 };
                    guardar(obj);
                }
            });

            window.addEventListener('mousemove', (e) => {
                const r = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
                mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
            });

            render();
        }

        function select(t, btn) {
            selected = t;
            document.querySelectorAll('.btn-obj').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('info').innerText = `OBJETO: ${t.toUpperCase()}`;
        }

        function guardar(obj) {
            let data = JSON.parse(localStorage.getItem('mapa_agustin')) || [];
            data.push(obj);
            localStorage.setItem('mapa_agustin', JSON.stringify(data));
            crearMesh(obj);
        }

        function crearMesh(obj) {
            let mesh;
            // Visualización rápida en el editor
            const geo = new THREE.BoxGeometry(10, (obj.type==='calle'?1:20), 10);
            const mat = new THREE.MeshStandardMaterial({ color: obj.type==='calle'?0x333333:0xff007f });
            mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(obj.x, geo.parameters.height/2, obj.z);
            scene.add(mesh);
        }

        function dibujarTodo() {
            let data = JSON.parse(localStorage.getItem('mapa_agustin')) || [];
            data.forEach(crearMesh);
        }

        function borrarTodo() {
            if(confirm("¿Borrar el mundo?")) {
                localStorage.removeItem('mapa_agustin');
                location.reload();
            }
        }

        function render() {
            requestAnimationFrame(render);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
