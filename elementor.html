<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elementor Pro | Agustín Admin</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }
        #side-panel { width: 300px; height: 100vh; background: rgba(10,10,10,0.95); border-right: 2px solid var(--pink); padding: 20px; box-sizing: border-box; z-index: 100; }
        h2 { color: var(--pink); text-transform: uppercase; text-align: center; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .item-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 10px; transition: 0.3s; }
        .item-btn.active { border-color: var(--pink); background: var(--pink); color: white; box-shadow: 0 0 15px var(--pink); }
        #view { flex-grow: 1; position: relative; }
        #status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; color: var(--neon); font-size: 11px; border: 1px solid var(--neon); }
    </style>
</head>
<body>

    <div id="side-panel">
        <h2>ELEMENTOR PRO</h2>
        <div class="grid">
            <button class="item-btn active" onclick="sel('calle', this)">🛣️ CALLE AMARILLA</button>
            <button class="item-btn" onclick="sel('sw4', this)">🛻 SW4</button>
            <button class="item-btn" onclick="sel('estacion', this)">⛽ ESTACIÓN</button>
            <button class="item-btn" onclick="sel('farola', this)">💡 FAROLA</button>
        </div>
        <button onclick="limpiarTodo()" style="margin-top:20px; width:100%; background:none; border:1px solid #ff4444; color:#ff4444; padding:8px; cursor:pointer; border-radius:5px;">BORRAR TODO</button>
    </div>

    <div id="view">
        <div id="status">SISTEMA LISTO</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        let scene, camera, renderer, grid, raycaster, mouse;
        let currentType = 'calle';
        let zoomDist = 500;

        window.onload = () => { init(); animate(); renderExisting(); };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 300) / window.innerHeight, 1, 10000);
            camera.position.set(400, 400, 400);
            camera.lookAt(0,0,0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            document.getElementById('view').appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            grid = new THREE.GridHelper(4000, 80, 0x333333, 0x222222);
            scene.add(grid);

            window.addEventListener('click', (e) => {
                if(e.target.closest('#side-panel')) return;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObject(grid);
                if(hits.length > 0) {
                    const p = hits[0].point;
                    const posX = Math.round(p.x/10)*10;
                    const posZ = Math.round(p.z/10)*10;
                    
                    if(currentType === 'calle') {
                        // FORZADO: Guardamos la base negra
                        save({ type: 'calle_base', pos: { x: posX, z: posZ } });
                        // FORZADO: Guardamos las líneas amarillas como objetos individuales
                        // Usamos el tipo 'farola' o 'casa' temporalmente si el mapa no reconoce otros, 
                        // pero lo ideal es que el mapa lea el color. 
                        // Si el mapa solo lee bloques, le mandamos "mini casas" amarillas en el centro.
                        save({ type: 'linea_amarilla', pos: { x: posX, z: posZ } });
                    } else {
                        save({ type: currentType, pos: { x: posX, z: posZ } });
                    }
                }
            });

            window.addEventListener('mousemove', e => {
                const r = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
                mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
            });
        }

        function sel(t, btn) {
            currentType = t;
            document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function save(obj) {
            let data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.push(obj);
            localStorage.setItem('elementos_ciudad', JSON.stringify(data));
            draw(obj);
        }

        function draw(obj) {
            let color = 0xff007f;
            let size = [10, 10, 10];

            if(obj.type === 'calle_base') { color = 0x111111; size = [50, 1, 50]; }
            if(obj.type === 'linea_amarilla') { color = 0xffff00; size = [2, 2, 40]; }
            if(obj.type === 'sw4') { color = 0xffffff; size = [10, 5, 18]; }

            const geo = new THREE.BoxGeometry(size[0], size[1], size[2]);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(obj.pos.x, size[1]/2, obj.pos.z);
            scene.add(mesh);
        }

        function renderExisting() {
            const data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.forEach(draw);
        }

        function limpiarTodo() {
            localStorage.removeItem('elementos_ciudad');
            location.reload();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
