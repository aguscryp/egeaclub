<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>City Engine Pro | Pink Neon Edition</title>
    <style>
        :root { --pink: #ff007f; --cyan: #00d4ff; --bg: #050505; --glass: rgba(15, 15, 15, 0.95); }
        
        body { margin: 0; display: flex; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Sidebar Estilo CRM / Pink Pro */
        #sidebar { 
            width: 320px; height: 100vh; background: var(--glass); 
            border-right: 2px solid var(--pink); padding: 25px; box-sizing: border-box; 
            display: flex; flex-direction: column; gap: 20px; z-index: 100;
            box-shadow: 10px 0 30px rgba(255, 0, 127, 0.1);
        }
        
        h2 { color: var(--pink); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; margin: 0; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        .section { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        label { display: block; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }

        select { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; 
            color: white; border-radius: 6px; cursor: pointer; outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        
        .btn { 
            background: var(--pink); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; letter-spacing: 1px;
        }
        .btn:hover { background: white; color: var(--pink); transform: translateY(-2px); }
        
        .btn-delete { background: transparent; border: 1px solid #441122; color: #ff4466; margin-top: 10px; font-size: 11px; }
        .btn-delete:hover { background: #441122; color: white; }

        /* Area de Renderizado */
        #render-container { flex: 1; height: 100vh; position: relative; background: #000; }
        
        .ui-status { 
            position: absolute; top: 25px; left: 25px; background: rgba(0,0,0,0.8); 
            padding: 12px 25px; border-radius: 50px; border: 1px solid var(--cyan); 
            font-size: 12px; color: var(--cyan); text-transform: uppercase; font-weight: bold;
            pointer-events: none; letter-spacing: 1px;
        }

        #loading-screen {
            position: absolute; inset: 0; background: var(--bg); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top: 3px solid var(--pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="color: var(--pink); margin-top: 20px; font-size: 12px; letter-spacing: 2px;">CARGANDO ASSET 4K...</p>
    </div>

    <div id="sidebar">
        <h2>CITY DESIGNER</h2>
        
        <div class="section">
            <label>📦 Catálogo de Objetos</label>
            <select id="objSelect">
                <optgroup label="Suelos">
                    <option value="calle">Asfalto Avenida</option>
                    <option value="vereda">Vereda de Hormigón</option>
                </optgroup>
                <optgroup label="Vehículos Argentinos">
                    <option value="chery">Chery Tiggo 8 Pro</option>
                    <option value="vento">VW Vento / Bora</option>
                    <option value="hilux">Toyota Hilux / SW4</option>
                </optgroup>
                <optgroup label="Arquitectura NPC">
                    <option value="casa">Casa de Barrio</option>
                    <option value="hospital">Hospital Central</option>
                </optgroup>
                <optgroup label="Seguridad">
                    <option value="camara">Cámara Seguridad 4K</option>
                </optgroup>
            </select>
            <button class="btn" style="margin-top: 15px;" onclick="enableBuildMode()">🏗️ ACTIVAR CONSTRUCTOR</button>
        </div>

        <div class="section">
            <label>Controles de Edición</label>
            <div id="status-text" style="color: #666; margin-bottom: 10px;">Modo: Vista</div>
            <button class="btn btn-delete" onclick="removeSelected()">🗑️ ELIMINAR SELECCIONADO</button>
        </div>

        <div style="font-size: 10px; color: #444; line-height: 1.6;">
            <b>R:</b> Rotar Objeto (90°)<br>
            <b>CLICK IZQ:</b> Colocar / Seleccionar<br>
            <b>CLICK DER:</b> Cancelar Construcción
        </div>

        <button class="btn" style="background: var(--cyan); color: black; margin-top: auto;" onclick="publishWorld()">🚀 PUBLICAR CIUDAD</button>
    </div>

    <div id="render-container">
        <div class="ui-status" id="mode-indicator">SYSTEM: READY</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let ghostObject = null, isBuilding = false, selectedEntity = null;
        let worldDatabase = [];
        const loader = new THREE.GLTFLoader();

        // --- CONFIGURACIÓN DE MODELOS (Pon tus archivos .glb aquí) ---
        const ASSETS = {
            'chery': 'chery.glb',
            'vento': 'vento.glb',
            'hilux': 'hilux.glb',
            'camara': 'camara_seguridad.glb',
            'casa': 'casa_npc.glb'
        };

        function init() {
            const container = document.getElementById('render-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 20000);
            camera.position.set(150, 150, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Iluminación Profesional
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(200, 500, 200);
            sun.castShadow = true;
            scene.add(sun);

            // Ayudantes Visuales
            const grid = new THREE.GridHelper(3000, 60, 0x1a1a1a, 0x111111);
            scene.add(grid);

            // Suelo de Colisión
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(10000, 10000),
                new THREE.MeshBasicMaterial({ visible: false })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.name = "GROUND";
            scene.add(floor);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Eventos
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseClick);
            window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'r') rotateObject(); });

            animate();
        }

        // CARGADOR DE MODELOS CON FALLBACK (Si no encuentra el .glb pone una caja)
        async function fetchModel(type, isGhost = false) {
            return new Promise((resolve) => {
                const group = new THREE.Group();
                group.userData = { type: type, id: THREE.MathUtils.generateUUID() };

                // Si es un asset externo
                if (ASSETS[type]) {
                    document.getElementById('loading-screen').style.display = 'flex';
                    loader.load(ASSETS[type], 
                        (gltf) => {
                            group.add(gltf.scene);
                            document.getElementById('loading-screen').style.display = 'none';
                            resolve(group);
                        },
                        undefined,
                        () => { 
                            // Fallback si no existe el archivo físico
                            const box = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 20), new THREE.MeshStandardMaterial({color: 0x333333}));
                            group.add(box);
                            document.getElementById('loading-screen').style.display = 'none';
                            resolve(group);
                        }
                    );
                } else {
                    // Objetos de código (Calles/Veredas)
                    const color = type === 'calle' ? 0x111111 : 0x555555;
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 50), new THREE.MeshStandardMaterial({color: color}));
                    group.add(mesh);
                    resolve(group);
                }
            });
        }

        async function enableBuildMode() {
            if(ghostObject) scene.remove(ghostObject);
            const type = document.getElementById('objSelect').value;
            ghostObject = await fetchModel(type, true);
            
            // Transparencia Ghost
            ghostObject.traverse(c => { if(c.isMesh) { c.material = c.material.clone(); c.material.transparent = true; c.material.opacity = 0.4; }});
            
            scene.add(ghostObject);
            isBuilding = true;
            document.getElementById('mode-indicator').innerText = "STATUS: PLACING " + type.toUpperCase();
        }

        function onMouseMove(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            if(isBuilding && ghostObject) {
                raycaster.setFromCamera(mouse, camera);
                const groundHit = raycaster.intersectObjects(scene.children).find(i => i.object.name === "GROUND");
                if(groundHit) {
                    ghostObject.position.copy(groundHit.point);
                    ghostObject.position.y = 0;
                    // Snap de Grilla (evita solapamientos raros)
                    ghostObject.position.x = Math.round(ghostObject.position.x / 5) * 5;
                    ghostObject.position.z = Math.round(ghostObject.position.z / 5) * 5;
                }
            }
        }

        function onMouseClick(e) {
            if(e.button === 2) { cancelBuild(); return; } // Click derecho cancela

            if(isBuilding && ghostObject) {
                const final = ghostObject.clone();
                final.traverse(c => { if(c.isMesh) { c.material = c.material.clone(); c.material.opacity = 1; c.material.transparent = false; }});
                scene.add(final);
                worldDatabase.push(final);
            } else {
                // Modo Selección
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(worldDatabase, true);
                if(hits.length > 0) {
                    let target = hits[0].object;
                    while(target.parent && target.parent !== scene) target = target.parent;
                    if(selectedEntity) setGlow(selectedEntity, 0);
                    selectedEntity = target;
                    setGlow(selectedEntity, 0xff007f);
                    document.getElementById('status-text').innerText = "Seleccionado: " + target.userData.type;
                } else {
                    if(selectedEntity) setGlow(selectedEntity, 0);
                    selectedEntity = null;
                }
            }
        }

        function setGlow(obj, hex) {
            obj.traverse(c => { if(c.isMesh) { c.material.emissive.setHex(hex); c.material.emissiveIntensity = 0.5; }});
        }

        function rotateObject() { if(ghostObject) ghostObject.rotation.y += Math.PI / 2; }
        
        function cancelBuild() { 
            if(ghostObject) scene.remove(ghostObject); 
            ghostObject = null; isBuilding = false; 
            document.getElementById('mode-indicator').innerText = "STATUS: IDLE";
        }

        function removeSelected() {
            if(selectedEntity) {
                scene.remove(selectedEntity);
                worldDatabase = worldDatabase.filter(o => o.userData.id !== selectedEntity.userData.id);
                selectedEntity = null;
                document.getElementById('status-text').innerText = "Objeto Eliminado";
            }
        }

        function publishWorld() {
            const saveData = worldDatabase.map(o => ({ type: o.userData.type, pos: o.position, rot: o.rotation.y }));
            localStorage.setItem('agustin_city_save', JSON.stringify(saveData));
            alert("✅ Ciudad guardada en base de datos local!");
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.enabled = !isBuilding; // No rotar cámara mientras construyo
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
