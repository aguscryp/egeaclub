<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>City Builder Pro | Constructor de Ciudad</title>
    <style>
        :root { --pink: #ff007f; --cyan: #00d4ff; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Panel Lateral */
        #sidebar { 
            width: 320px; height: 100vh; background: rgba(15,15,15,0.98); 
            border-right: 2px solid var(--pink); padding: 20px; box-sizing: border-box; 
            z-index: 10; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        
        h1 { color: var(--pink); font-size: 16px; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; letter-spacing: 2px; }
        .section { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
        
        .btn-main { background: var(--pink); color: white; border: none; padding: 14px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        .btn-main:hover { background: #ff3399; transform: translateY(-1px); }
        
        .btn-del { background: #331111; color: #ff5555; border: 1px solid #552222; margin-top: 10px; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-size: 11px; text-transform: uppercase; }
        .btn-del:hover { background: #ff0000; color: white; }

        /* Pantalla de Juego */
        #view { flex: 1; height: 100vh; position: relative; }
        .mode-indicator { position: absolute; top: 20px; left: 20px; padding: 10px 20px; border-radius: 20px; font-weight: bold; background: rgba(0,0,0,0.8); border: 1px solid var(--pink); pointer-events: none; font-size: 12px; }
        
        .hint-box { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; font-size: 11px; border-radius: 8px; color: #aaa; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Constructor Global</h1>

        <div class="section">
            <label>Catálogo de Estructuras</label>
            <select id="objSelect">
                <optgroup label="Infraestructura">
                    <option value="calle">Avenida con Veredas</option>
                </optgroup>
                <optgroup label="Edificios">
                    <option value="hospital">Hospital Municipal</option>
                    <option value="banco">Banco Central</option>
                    <option value="casa">Casa Familiar (NPC)</option>
                    <option value="concesionaria">Concesionaria Autos</option>
                </optgroup>
                <optgroup label="Vehículos">
                    <option value="auto_sedan">VW Vento / Bora</option>
                    <option value="camioneta">Toyota Hilux / SW4</option>
                    <option value="camion">Camión de Trabajo</option>
                </optgroup>
            </select>
            <button class="btn-main" onclick="enterBuildMode()">👷 Nuevo Objeto</button>
        </div>

        <div class="section">
            <label>Selección</label>
            <div id="status" style="color: var(--cyan); font-weight: bold; font-size: 14px; margin: 5px 0;">Nada seleccionado</div>
            <button class="btn-del" onclick="deleteActive()">🗑️ Eliminar Objeto</button>
        </div>

        <button class="btn-main" style="background: var(--cyan); color: #000; margin-top: auto;" onclick="saveWorld()">💾 PUBLICAR CIUDAD</button>
    </div>

    <div id="view">
        <div id="mode-text" class="mode-indicator">MODO: VISTA</div>
        <div class="hint-box">
            <b>Click Izq:</b> Poner / Seleccionar<br>
            <b>Click Der:</b> Cancelar / Orbitar<br>
            <b>Tecla R:</b> Rotar Estructura
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let worldEntities = [];
        let ghostObject = null;
        let isBuilding = false;
        let selectedEntity = null;
        const loader = new THREE.GLTFLoader();

        function init() {
            const container = document.getElementById('view');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 1, 5000);
            camera.position.set(100, 100, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(150, 300, 100);
            scene.add(sun);

            const grid = new THREE.GridHelper(2000, 100, 0x222222, 0x111111);
            scene.add(grid);

            const planeGeo = new THREE.PlaneGeometry(4000, 4000);
            planeGeo.rotateX(-Math.PI / 2);
            const plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({visible: false}));
            plane.name = "GROUND";
            scene.add(plane);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseClick);
            window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'r') rotateGhost(); });

            animate();
        }

        // ==========================================
        // DISEÑO DE ESTRUCTURAS REALISTAS
        // ==========================================
        function createEntity(type, isGhost = false) {
            const group = new THREE.Group();
            group.userData = { type: type, id: THREE.MathUtils.generateUUID() };

            const opacity = isGhost ? 0.5 : 1;
            const mat = (col) => new THREE.MeshStandardMaterial({color: col, transparent: isGhost, opacity: opacity});

            switch(type) {
                case 'hospital':
                    const cuerpo = new THREE.Mesh(new THREE.BoxGeometry(40, 20, 30), mat(0xeeeeee)); cuerpo.position.y = 10;
                    const cruz = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 0.5), mat(0xff0000)); cruz.position.set(0, 15, 15.1);
                    const cruzV = new THREE.Mesh(new THREE.BoxGeometry(2, 8, 0.5), mat(0xff0000)); cruzV.position.set(0, 15, 15.1);
                    const helipuerto = new THREE.Mesh(new THREE.CylinderGeometry(8, 8, 0.5), mat(0x333333)); helipuerto.position.y = 20.2;
                    group.add(cuerpo, cruz, cruzV, helipuerto);
                    break;

                case 'casa':
                    const pared = new THREE.Mesh(new THREE.BoxGeometry(15, 8, 12), mat(0xd2b48c)); pared.position.y = 4;
                    const techo = new THREE.Mesh(new THREE.BoxGeometry(16, 2, 13), mat(0x8b4513)); techo.position.y = 9;
                    const jardin = new THREE.Mesh(new THREE.BoxGeometry(15, 0.2, 5), mat(0x228b22)); jardin.position.set(0, 0, 8.5);
                    group.add(pared, techo, jardin);
                    break;

                case 'calle':
                    const asf = new THREE.Mesh(new THREE.BoxGeometry(40, 0.2, 40), mat(0x111111));
                    const vereda1 = new THREE.Mesh(new THREE.BoxGeometry(5, 0.4, 40), mat(0x888888)); vereda1.position.x = -22.5;
                    const vereda2 = vereda1.clone(); vereda2.position.x = 22.5;
                    const linea = new THREE.Mesh(new THREE.BoxGeometry(1, 0.1, 40), mat(0xffcc00)); linea.position.y = 0.15;
                    group.add(asf, vereda1, vereda2, linea);
                    break;

                case 'auto_sedan':
                case 'camioneta':
                    // Aquí cargarás el .glb. Por ahora, un bloque con ruedas para posicionar
                    const baseCar = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 9), mat(0x333333)); baseCar.position.y = 1.2;
                    const cabina = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 4), mat(0x555555)); cabina.position.set(0, 3, -1);
                    group.add(baseCar, cabina);
                    break;
            }

            return group;
        }

        // ==========================================
        // SISTEMA DE MOUSE Y CONSTRUCCIÓN
        // ==========================================
        function enterBuildMode() {
            if(ghostObject) scene.remove(ghostObject);
            const type = document.getElementById('objSelect').value;
            ghostObject = createEntity(type, true);
            scene.add(ghostObject);
            isBuilding = true;
            document.getElementById('mode-text').innerText = "MODO: CONSTRUYENDO";
        }

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            if(isBuilding && ghostObject) {
                raycaster.setFromCamera(mouse, camera);
                const ground = raycaster.intersectObjects(scene.children).find(i => i.object.name === "GROUND");
                if(ground) {
                    ghostObject.position.copy(ground.point);
                    // Snap para que queden alineados
                    ghostObject.position.x = Math.round(ghostObject.position.x / 5) * 5;
                    ghostObject.position.z = Math.round(ghostObject.position.z / 5) * 5;
                }
            }
        }

        function onMouseClick(event) {
            if(event.button === 2) { cancelBuild(); return; }

            if(isBuilding) {
                const type = document.getElementById('objSelect').value;
                const newObj = createEntity(type, false);
                newObj.position.copy(ghostObject.position);
                newObj.rotation.copy(ghostObject.rotation);
                scene.add(newObj);
                worldEntities.push(newObj);
            } else {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(worldEntities, true);
                if(intersects.length > 0) {
                    let obj = intersects[0].object;
                    while(obj.parent && obj.parent !== scene) obj = obj.parent;
                    if(selectedEntity) highlight(selectedEntity, false);
                    selectedEntity = obj;
                    highlight(selectedEntity, true);
                    document.getElementById('status').innerText = "Seleccionado: " + obj.userData.type.toUpperCase();
                }
            }
        }

        function highlight(obj, active) {
            obj.traverse(c => { if(c.isMesh) c.material.emissive.setHex(active ? 0xff007f : 0x000000); });
        }

        function rotateGhost() { if(ghostObject) ghostObject.rotation.y += Math.PI/2; }
        function cancelBuild() { if(ghostObject) { scene.remove(ghostObject); ghostObject = null; isBuilding = false; document.getElementById('mode-text').innerText = "MODO: VISTA"; } }

        function deleteActive() {
            if(selectedEntity) {
                scene.remove(selectedEntity);
                worldEntities = worldEntities.filter(e => e.userData.id !== selectedEntity.userData.id);
                selectedEntity = null;
                document.getElementById('status').innerText = "ELIMINADO";
            }
        }

        function saveWorld() {
            const data = worldEntities.map(e => ({ type: e.userData.type, pos: e.position, rot: e.rotation.y }));
            localStorage.setItem('ciudad_data', JSON.stringify(data));
            alert("✅ Ciudad Publicada!");
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.enabled = !isBuilding;
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
