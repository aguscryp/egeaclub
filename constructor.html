<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>City Builder PRO | Realismo Total</title>
    <style>
        :root { --pink: #ff007f; --cyan: #00d4ff; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Panel Lateral UI */
        #sidebar { 
            width: 320px; height: 100vh; background: rgba(10,10,10,0.98); 
            border-right: 2px solid var(--pink); padding: 20px; box-sizing: border-box; 
            z-index: 10; display: flex; flex-direction: column;
        }
        
        h1 { color: var(--pink); font-size: 16px; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; letter-spacing: 2px; }
        .section { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
        
        .btn-main { background: var(--pink); color: white; border: none; padding: 14px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        .btn-main:hover { background: #ff3399; transform: translateY(-1px); }
        
        .btn-del { background: #331111; color: #ff5555; border: 1px solid #552222; margin-top: 10px; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-size: 11px; text-transform: uppercase; }
        .btn-del:hover { background: #ff0000; color: white; }

        /* Pantalla de Visualización */
        #view { flex: 1; height: 100vh; position: relative; }
        .mode-indicator { position: absolute; top: 20px; left: 20px; padding: 10px 20px; border-radius: 20px; font-weight: bold; background: rgba(0,0,0,0.8); border: 1px solid var(--pink); pointer-events: none; font-size: 12px; }
        
        /* Mensaje de Carga */
        #loading-msg {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 10px 30px; border: 1px solid var(--cyan);
            border-radius: 5px; display: none; color: var(--cyan); font-weight: bold; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>MUNDO REALISTA</h1>

        <div class="section">
            <label>🏗️ Catálogo (Modelos GLB)</label>
            <select id="objSelect">
                <optgroup label="Infraestructura Real">
                    <option value="calle">Calle de Asfalto (Código)</option>
                </optgroup>
                <optgroup label="Edificios Reales (Nube)">
                    <option value="casa">Casa Familiar Detallada</option>
                    <option value="edificio">Edificio de Departamentos</option>
                </optgroup>
                <optgroup label="🚗 Vehículos Reales (Nube)">
                    <option value="carro_comun">Auto Sedan (Bora/Vento)</option>
                    <option value="camion_carga">Camión de Carga</option>
                </optgroup>
            </select>
            <button class="btn-main" onclick="enterBuildMode()">👷 Nuevo Objeto</button>
        </div>

        <div class="section">
            <label>Selección Actual</label>
            <div id="status" style="color: var(--cyan); font-weight: bold; font-size: 14px; margin: 5px 0;">Modo Vista</div>
            <button class="btn-del" onclick="deleteActive()">🗑️ Eliminar</button>
        </div>

        <div class="section" style="font-size: 11px; color: #666;">
            <b>R:</b> Rotar (90°) | <b>Click:</b> Poner<br>
            <b>Click Der:</b> Cancelar
        </div>

        <button class="btn-main" style="background: var(--cyan); color: #000; margin-top: auto;" onclick="saveWorld()">💾 PUBLICAR CIUDAD</button>
    </div>

    <div id="view">
        <div id="mode-text" class="mode-indicator">MODO: VISTA</div>
        <div id="loading-msg">📥 DESCARGANDO MODELO 3D REALISTA...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let worldEntities = [];
        let ghostObject = null; // El objeto "fantasma" que sigue al mouse
        let isBuilding = false;
        let selectedEntity = null;
        const loader = new THREE.GLTFLoader();

        // ==========================================
        // REPOSITORIO DE MODELOS REALISTAS (URLs)
        // ==========================================
        // Estos modelos son gratuitos y alojados en GitHub (Three.js/Khronos)
        const MODEL_URLS = {
            'casa': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/SheenChair.glb', // Placeholder: Casa (Necesitas tu .glb)
            'edificio': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Buildings.glb', // Edificios Low Poly pero reales
            'carro_comun': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Car.glb', // Auto realista
            'camion_carga': 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb' // Camión real
        };

        function init() {
            const container = document.getElementById('view');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 1, 10000);
            camera.position.set(150, 150, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Iluminación potente para modelos detallados
            scene.add(new THREE.AmbientLight(0xffffff, 1)); // Luz ambiental fuerte
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(200, 400, 100);
            scene.add(sun);

            const grid = new THREE.GridHelper(2000, 50, 0x222222, 0x111111);
            scene.add(grid);

            // Suelo invisible para el mouse
            const planeGeo = new THREE.PlaneGeometry(5000, 5000);
            planeGeo.rotateX(-Math.PI / 2);
            const plane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({visible: false}));
            plane.name = "GROUND";
            scene.add(plane);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseClick);
            window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'r') rotateGhost(); });

            animate();
        }

        // ==========================================
        // MOTOR DE CARGA ASÍNCRONA (GLTF)
        // ==========================================
        async function loadGltfModel(type) {
            return new THREE.Promise((resolve, reject) => {
                const url = MODEL_URLS[type];
                if(!url) {
                    // Si no hay URL, creamos una caja de código básica (Calle, etc.)
                    resolve(createCodeEntity(type));
                    return;
                }

                // Mostrar mensaje de carga
                document.getElementById('loading-msg').style.display = 'block';

                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    const group = new THREE.Group();
                    group.add(model);
                    group.userData = { type: type, id: THREE.MathUtils.generateUUID() };
                    
                    // Ajuste de escala según el modelo (Importante!)
                    if(type === 'carro_comun') group.scale.set(10, 10, 10);
                    if(type === 'camion_carga') group.scale.set(8, 8, 8);
                    if(type === 'edificio') group.scale.set(50, 50, 50);

                    // Ocultar mensaje de carga
                    document.getElementById('loading-msg').style.display = 'none';
                    resolve(group);
                }, undefined, (error) => {
                    console.error("Error cargando modelo:", error);
                    document.getElementById('loading-msg').innerText = "ERROR CARGANDO MODELO";
                    reject(error);
                });
            });
        }

        // Entidades simples hechas con código (Calle)
        function createCodeEntity(type) {
            const group = new THREE.Group();
            group.userData = { type: type, id: THREE.MathUtils.generateUUID() };
            if(type === 'calle') {
                const asf = new THREE.Mesh(new THREE.BoxGeometry(40, 0.2, 40), new THREE.MeshStandardMaterial({color: 0x111111}));
                const linea = new THREE.Mesh(new THREE.PlaneGeometry(1, 40), new THREE.MeshStandardMaterial({color: 0xffcc00}));
                linea.rotation.x = -Math.PI/2; linea.position.y = 0.11;
                group.add(asf, linea);
            }
            return group;
        }

        // ==========================================
        // SISTEMA DE CONSTRUCCIÓN PRO CON MOUSE
        // ==========================================
        async function enterBuildMode() {
            if(ghostObject) scene.remove(ghostObject);
            const type = document.getElementById('objSelect').value;
            
            // Cargamos el modelo real asincrónicamente
            ghostObject = await loadGltfModel(type);
            
            // Hacerlo semitransparente (fantasma)
            ghostObject.traverse(child => {
                if(child.isMesh) {
                    child.material = child.material.clone(); // Evitar cambiar material original
                    child.material.transparent = true; child.material.opacity = 0.4;
                    child.material.emissive.setHex(0x00ff00); // Tinte verde
                }
            });

            scene.add(ghostObject);
            isBuilding = true;
            if(selectedEntity) deselectActive();
            document.getElementById('mode-text').innerText = "MODO: CONSTRUYENDO (CLICK IZQ)";
        }

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            if(isBuilding && ghostObject) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                const ground = intersects.find(i => i.object.name === "GROUND");
                if(ground) {
                    ghostObject.position.copy(ground.point);
                    // Snap a grilla de 2 en 2
                    ghostObject.position.x = Math.round(ghostObject.position.x / 2) * 2;
                    ghostObject.position.z = Math.round(ghostObject.position.z / 2) * 2;
                    ghostObject.position.y = 0; // Pegado al piso
                }
            }
        }

        function onMouseClick(event) {
            if(event.button === 2) { // Click derecho: Cancelar/Deseleccionar
                if(isBuilding) cancelBuild();
                else if(selectedEntity) deselectActive();
                return;
            }

            if(isBuilding) {
                // Colocar objeto real (Clonando el fantasma pero haciéndolo sólido)
                const finalObj = ghostObject.clone();
                finalObj.traverse(child => {
                    if(child.isMesh) {
                        child.material = child.material.clone(); // Material único
                        child.material.transparent = false; child.material.opacity = 1.0;
                        child.material.emissive.setHex(0x000000); // Quitar tinte verde
                    }
                });
                scene.add(finalObj);
                worldEntities.push(finalObj);
            } else {
                // Modo Selección
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(worldEntities, true);
                
                if(intersects.length > 0) {
                    // Encontrar el Grupo padre (la entidad completa)
                    let obj = intersects[0].object;
                    while(obj.parent && obj.parent !== scene) obj = obj.parent;

                    if(selectedEntity) deselectActive();
                    selectedEntity = obj;
                    highlightEntity(selectedEntity, true);
                    document.getElementById('status').innerText = selectedEntity.userData.type.toUpperCase();
                } else {
                    if(selectedEntity) deselectActive();
                }
            }
        }

        function highlightEntity(entity, active) {
            entity.traverse(child => {
                if(child.isMesh) {
                    // Usamos emissive para el highlight neón rosa
                    child.material.emissive.setHex(active ? 0xff007f : 0x000000);
                    child.material.emissiveIntensity = active ? 0.5 : 0;
                }
            });
        }

        function deselectActive() {
            if(selectedEntity) highlightEntity(selectedEntity, false);
            selectedEntity = null;
            document.getElementById('status').innerText = "VISTA GLOBAL";
        }

        function rotateGhost() { if(ghostObject) ghostObject.rotation.y += Math.PI / 2; }
        function cancelBuild() { if(ghostObject) { scene.remove(ghostObject); ghostObject = null; isBuilding = false; document.getElementById('mode-text').innerText = "MODO: VISTA GLOBAL"; } }

        function deleteActive() {
            if(selectedEntity) {
                scene.remove(selectedEntity);
                worldEntities = worldEntities.filter(e => e.userData.id !== selectedEntity.userData.id);
                deselectActive();
                document.getElementById('status').innerText = "ELIMINADO";
            }
        }

        function saveWorld() {
            const data = worldEntities.map(ent => ({ type: ent.userData.type, pos: ent.position, rot: ent.rotation.y }));
            localStorage.setItem('ciudad_data', JSON.stringify(data));
            alert("✅ Ciudad guardada con éxito.");
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.enabled = !isBuilding;
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
