<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Store Editor 3D</title>
    <style>
        :root { --pink: #ff007f; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        
        #editor-ui { width: 350px; height: 100vh; background: #111; border-right: 2px solid var(--pink); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #canvas-container { flex: 1; height: 100vh; position: relative; }
        
        h1 { color: var(--pink); font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .control-group { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        
        select, input { width: 100%; padding: 8px; background: #000; border: 1px solid var(--pink); color: white; border-radius: 4px; margin-bottom: 10px; }
        
        .pos-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-move { background: #333; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .btn-move:hover { background: var(--pink); }

        .btn-save { background: var(--pink); color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="editor-ui">
        <h1>Tienda Architect Pro</h1>
        
        <div class="control-group">
            <label>Paredes Neón</label>
            <input type="color" id="wallColor" value="#1a1a1a">
        </div>

        <div class="control-group">
            <label>Seleccionar Objeto para Mover</label>
            <select id="selectedObj">
                <option value="dispenser">Dispenser de Agua</option>
                <option value="heladera">Heladera</option>
                <option value="mostrador">Mostrador</option>
                <option value="computadora">Computadora</option>
            </select>
            <div class="pos-controls">
                <button class="btn-move" onclick="moveObj('z', -1)">Adelante</button>
                <button class="btn-move" onclick="moveObj('z', 1)">Atrás</button>
                <button class="btn-move" onclick="moveObj('x', -1)">Izquierda</button>
                <button class="btn-move" onclick="moveObj('x', 1)">Derecha</button>
            </div>
        </div>

        <button class="btn-save" onclick="saveToMap()">Publicar Tienda</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, storeGroup;
        let objects = {
            dispenser: { mesh: null, x: -3, z: -3 },
            heladera: { mesh: null, x: 3, z: -3 },
            mostrador: { mesh: null, x: 0, z: 2 },
            computadora: { mesh: null, x: 0, z: 1.8 }
        };

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 12, 15);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const light = new THREE.HeadsUpDisplay; // Fake
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const point = new THREE.PointLight(0xff007f, 1);
            point.position.set(0, 5, 0);
            scene.add(point);

            buildStructure();
            animate();
        }

        function buildStructure() {
            storeGroup = new THREE.Group();

            // PAREDES CON VENTANAS Y PUERTA (Grande: 15x15)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
            
            // Pared Trasera
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(15, 6, 0.5), wallMat);
            backWall.position.z = -7.5; backWall.position.y = 3;

            // Paredes Laterales con Ventanas (Huecos imaginarios por ahora)
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 15), wallMat);
            leftWall.position.x = -7.5; leftWall.position.y = 3;

            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 15), wallMat);
            rightWall.position.x = 7.5; rightWall.position.y = 3;

            // Pared Frontal con Puerta
            const frontWallL = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.5), wallMat);
            frontWallL.position.set(-4.5, 3, 7.5);
            const frontWallR = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.5), wallMat);
            frontWallR.position.set(4.5, 3, 7.5);
            const frontWallTop = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 0.5), wallMat);
            frontWallTop.position.set(0, 5, 7.5);

            storeGroup.add(backWall, leftWall, rightWall, frontWallL, frontWallR, frontWallTop);

            // CREAR OBJETOS MÓVILES
            // Dispenser
            objects.dispenser.mesh = new THREE.Group();
            const dBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.8), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            const dTop = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0x00aaff}));
            dTop.position.y = 1; objects.dispenser.mesh.add(dBody, dTop);

            // Heladera
            objects.heladera.mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1.2), new THREE.MeshStandardMaterial({color: 0x333333}));
            
            // Mostrador
            objects.mostrador.mesh = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 1.5), new THREE.MeshStandardMaterial({color: 0x5d4037}));

            // Computadora (Monitor y CPU)
            objects.computadora.mesh = new THREE.Group();
            const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
            monitor.position.y = 1.5;
            const cpu = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
            cpu.position.set(0.6, 1.3, 0);
            objects.computadora.mesh.add(monitor, cpu);

            // Posicionar inicialmente
            updateMeshes();
            
            storeGroup.add(objects.dispenser.mesh, objects.heladera.mesh, objects.mostrador.mesh, objects.computadora.mesh);
            scene.add(storeGroup);
        }

        function updateMeshes() {
            for (let key in objects) {
                objects[key].mesh.position.set(objects[key].x, objects[key].mesh.position.y, objects[key].z);
            }
        }

        window.moveObj = function(axis, delta) {
            const id = document.getElementById('selectedObj').value;
            objects[id][axis] += delta * 0.5;
            updateMeshes();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.saveToMap = function() {
            const config = {
                colorParedes: document.getElementById('wallColor').value,
                posiciones: {
                    dispenser: { x: objects.dispenser.x, z: objects.dispenser.z },
                    heladera: { x: objects.heladera.x, z: objects.heladera.z },
                    mostrador: { x: objects.mostrador.x, z: objects.mostrador.z },
                    computadora: { x: objects.computadora.x, z: objects.computadora.z }
                },
                activa: true
            };
            localStorage.setItem('tienda_config', JSON.stringify(config));
            alert("¡Tienda publicada! Entra al mapa para verla.");
        }

        window.onload = init;
    </script>
</body>
</html>
