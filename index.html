<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Engine: First & Third Person</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
            border: 2px solid #5d4037; pointer-events: none;
        }
        canvas { display: block; }
        .hint { color: #ffeb3b; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <strong>MODO: <span id="modoTxt">TERCERA PERSONA</span></strong><br>
    <div class="hint">WASD: Mover | flechas ← →: Girar Cámara | V: Cambiar Vista | ESPACIO: Saltar</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const modoTxt = document.getElementById('modoTxt');

let width, height;
let primeraPersona = false;
const keys = {};

// --- CONFIGURACIÓN DEL JUGADOR ---
const player = {
    x: 0, y: 0, z: 0,
    angle: 0, // Rotación de la cámara/personaje
    speed: 4,
    rotSpeed: 0.05,
    vz: 0, isJumping: false,
    walkCycle: 0
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = (e) => { 
    keys[e.key.toLowerCase()] = true; 
    if(e.key === 'v') {
        primeraPersona = !primeraPersona;
        modoTxt.innerText = primeraPersona ? "PRIMERA PERSONA (MINECRAFT)" : "TERCERA PERSONA (ROBLOX)";
    }
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// --- MOTOR DE PROYECCIÓN 3D SIMPLE ---
// Transforma coordenadas 3D (x, y, z) a 2D (pantalla)
function project(x, y, z) {
    // Traslación relativa al jugador
    let dx = x - player.x;
    let dy = y - player.y;
    
    // Rotación de cámara
    let rx = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let ry = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    
    let rz = z - (player.z + 60); // Altura de los ojos

    // Si está detrás de la cámara, no dibujar
    if (ry < 10) return null;

    const fov = 600; // Distancia focal
    const scale = fov / ry;
    
    return {
        x: width / 2 + rx * scale,
        y: height / 2 + rz * scale,
        scale: scale
    };
}

// --- DIBUJO DE OBJETOS ---
function drawCube(x, y, z, w, h, d, color) {
    // Dibujamos una caja simple basada en la proyección de sus esquinas
    const p1 = project(x - w/2, y - d/2, -z);
    const p2 = project(x + w/2, y + d/2, -z - h);
    
    if (!p1 || !p2) return;

    const cw = (p2.x - p1.x);
    const ch = (p2.y - p1.y);

    // Sombra lateral
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(p1.x, p1.y, cw, ch);
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = "rgba(0,0,0,0.2)";
    ctx.strokeRect(p1.x, p1.y, cw, ch);
}

function drawCowboy() {
    if (primeraPersona) return; // En 1ª persona no vemos nuestro cuerpo

    const bob = Math.sin(player.walkCycle) * 5;
    // El personaje se dibuja un poco por delante de la cámara en 3ª persona
    const p = project(player.x, player.y + 150, -player.z); 
    
    if (!p) return;

    const s = p.scale;
    
    // Sombrero
    ctx.fillStyle = "#3e2723";
    ctx.fillRect(p.x - 15*s, p.y - 45*s + bob, 30*s, 5*s); // Ala
    ctx.fillRect(p.x - 8*s, p.y - 55*s + bob, 16*s, 10*s); // Copa
    
    // Cabeza
    ctx.fillStyle = "#ffccbc";
    ctx.fillRect(p.x - 7*s, p.y - 40*s + bob, 14*s, 14*s);
    
    // Cuerpo
    ctx.fillStyle = "#795548";
    ctx.fillRect(p.x - 10*s, p.y - 26*s + bob, 20*s, 22*s);
}

function drawWorld() {
    // 1. Suelo Infinito (Líneas de perspectiva)
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(0, height/2, width, height/2); // Horizonte básico

    // 2. Una "Casa" de prueba (Paredes)
    // Pared izquierda
    drawCube(200, 500, 0, 10, 150, 200, "#a1887f");
    // Pared derecha
    drawCube(400, 500, 0, 10, 150, 200, "#a1887f");
    // Techo
    drawCube(300, 500, 150, 210, 10, 200, "#5d4037");
}

function update() {
    // Rotación
    if (keys['arrowleft']) player.angle -= player.rotSpeed;
    if (keys['arrowright']) player.angle += player.rotSpeed;

    // Movimiento relativo al ángulo de la cámara
    let mvX = 0;
    let mvY = 0;
    if (keys['w']) { mvX = Math.sin(player.angle); mvY = Math.cos(player.angle); }
    if (keys['s']) { mvX = -Math.sin(player.angle); mvY = -Math.cos(player.angle); }
    if (keys['a']) { mvX = -Math.cos(player.angle); mvY = Math.sin(player.angle); }
    if (keys['d']) { mvX = Math.cos(player.angle); mvY = -Math.sin(player.angle); }

    if (mvX !== 0 || mvY !== 0) {
        player.x += mvX * player.speed;
        player.y += mvY * player.speed;
        player.walkCycle += 0.2;
    }

    // Salto
    if (keys[' '] && !player.isJumping) { player.vz = 10; player.isJumping = true; }
    if (player.isJumping) {
        player.z += player.vz;
        player.vz -= 0.7;
        if (player.z <= 0) { player.z = 0; player.isJumping = false; }
    }
}

function loop() {
    // Cielo
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, width, height);

    drawWorld();
    drawCowboy();
    update();
    
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
