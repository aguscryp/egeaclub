<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy - Third Person Camera</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            border: 2px solid #5d4037; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY 3D - VISTA TRASERA</strong><br>
    <small>WASD para caminar | Flechas para girar cámara</small>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width, height;
const keys = {};

// Configuración del Jugador y Cámara
const player = {
    x: 0, y: 0, z: 0,
    angle: 0,
    speed: 5,
    rotSpeed: 0.05,
    walkCycle: 0,
    distanciaCamara: 250, // Distancia detrás del personaje
    alturaCamara: 120     // Altura de la vista
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

/**
 * PROYECCIÓN 3D CON CÁMARA EN TERCERA PERSONA
 */
function project(x, y, z) {
    // 1. Posicionamos la cámara DETRÁS del personaje usando su ángulo
    let camX = player.x - Math.sin(player.angle) * player.distanciaCamara;
    let camY = player.y - Math.cos(player.angle) * player.distanciaCamara;
    let camZ = player.z + player.alturaCamara;

    // 2. Transformación relativa a la cámara
    let dx = x - camX;
    let dy = y - camY;

    // 3. Rotación del mundo según hacia donde mira la cámara
    let rx = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let ry = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    
    let rz = z - camZ;

    if (ry < 10) return null; // Clipping (no dibujar lo que está muy cerca o detrás)

    const fov = 700; 
    const scale = fov / ry;
    
    return {
        x: width / 2 + rx * scale,
        y: height / 2 + rz * scale,
        scale: scale
    };
}

function drawMap() {
    const tileSize = 100;
    const range = 15;
    const pX = Math.floor(player.x / tileSize);
    const pY = Math.floor(player.y / tileSize);

    for (let i = pX - range; i <= pX + range; i++) {
        for (let j = pY - range; j <= pY + range; j++) {
            const p1 = project(i * tileSize, j * tileSize, 0);
            const p2 = project((i + 1) * tileSize, j * tileSize, 0);
            const p3 = project((i + 1) * tileSize, (j + 1) * tileSize, 0);
            const p4 = project(i * tileSize, (j + 1) * tileSize, 0);

            if (p1 && p2 && p3 && p4) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.lineTo(p4.x, p4.y);
                ctx.closePath();

                // Colores con separación clara
                ctx.fillStyle = (i + j) % 2 === 0 ? "#4caf50" : "#388e3c";
                ctx.fill();
                
                // Efecto de cuadrícula para realismo de profundidad
                ctx.strokeStyle = "rgba(0,0,0,0.05)";
                ctx.stroke();
            }
        }
    }
}

function drawCowboy() {
    const bob = Math.sin(player.walkCycle) * 5;
    // Proyectamos al personaje en su posición real (siempre adelante de la cámara)
    const pos = project(player.x, player.y, 0);
    
    if (!pos) return;
    const s = pos.scale;

    // Sombra
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y, 25 * s, 10 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cuerpo (Vaquero)
    ctx.fillStyle = "#795548"; // Chaleco
    ctx.fillRect(pos.x - 12 * s, pos.y - 35 * s + bob, 24 * s, 25 * s);
    
    // Cabeza
    ctx.fillStyle = "#ffccbc";
    ctx.fillRect(pos.x - 8 * s, pos.y - 48 * s + bob, 16 * s, 16 * s);

    // Sombrero
    ctx.fillStyle = "#3e2723";
    ctx.fillRect(pos.x - 18 * s, pos.y - 50 * s + bob, 36 * s, 4 * s); // Ala
    ctx.fillRect(pos.x - 10 * s, pos.y - 60 * s + bob, 20 * s, 12 * s); // Copa
}

function update() {
    if (keys['arrowleft']) player.angle -= player.rotSpeed;
    if (keys['arrowright']) player.angle += player.rotSpeed;

    let dx = 0, dy = 0;
    if (keys['w']) { dx = Math.sin(player.angle); dy = Math.cos(player.angle); }
    if (keys['s']) { dx = -Math.sin(player.angle); dy = -Math.cos(player.angle); }
    if (keys['a']) { dx = -Math.cos(player.angle); dy = Math.sin(player.angle); }
    if (keys['d']) { dx = Math.cos(player.angle); dy = -Math.sin(player.angle); }

    if (dx !== 0 || dy !== 0) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.walkCycle += 0.2;
    }
}

function loop() {
    // Fondo de cielo
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, width, height);

    update();
    drawMap();
    drawCowboy();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
