<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Roblox Cowboy Engine - Ultra Realismo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
        canvas { display: block; filter: contrast(1.1) saturate(1.2); }
        .controls { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY SIMULATOR</strong><br>
    <div class="controls">WASD: Caminar | ESPACIO: Saltar | V: Cámara</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width, height;
let view3D = true;
const TILE_SIZE = 120;
const keys = {};

const world = { x: 0, y: 0 };
const player = {
    z: 0, vz: 0, isJumping: false,
    walkCycle: 0,
    velocity: { x: 0, y: 0 },
    lastDir: 1 // 1 para derecha, -1 para izquierda
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === 'v') view3D = !view3D; };
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// --- DIBUJO DE CAJA 3D (Estilo Roblox Blocky) ---
function drawBlock(x, y, w, h, d, color) {
    const shadow = shadeColor(color, -20);
    const highlight = shadeColor(color, 20);

    // Cara lateral (Profundidad)
    ctx.fillStyle = shadow;
    ctx.fillRect(x + w, y + d, d/2, h);

    // Cara superior
    ctx.fillStyle = highlight;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w + d/2, y + d);
    ctx.lineTo(x + d/2, y + d);
    ctx.fill();

    // Cara frontal
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
}

function shadeColor(col, amt) {
    let usePound = false;
    if (col[0] == "#") { col = col.slice(1); usePound = true; }
    let num = parseInt(col, 16);
    let r = (num >> 16) + amt;
    let g = (num >> 8 & 0x00FF) + amt;
    let b = (num & 0x0000FF) + amt;
    r = Math.max(Math.min(255, r), 0);
    g = Math.max(Math.min(255, g), 0);
    b = Math.max(Math.min(255, b), 0);
    return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
}

function drawCowboy(targetX, targetY) {
    const isMoving = Math.abs(player.velocity.x) > 0.1 || Math.abs(player.velocity.y) > 0.1;
    if(isMoving) player.walkCycle += 0.15;
    
    const bob = Math.sin(player.walkCycle) * 4;
    const swing = Math.sin(player.walkCycle) * 12;
    const jumpY = player.z;

    ctx.save();
    ctx.translate(targetX, targetY - jumpY);

    // Sombra proyectada real
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(15, jumpY + 40, 25 - jumpY/10, 12 - jumpY/20, 0, 0, Math.PI*2);
    ctx.fill();

    // Piernas (Movimiento independiente)
    drawBlock(-12, 15 + (isMoving ? -swing : 0), 10, 25, 10, "#3e2723"); // Izq
    drawBlock(5, 15 + (isMoving ? swing : 0), 10, 25, 10, "#3e2723");  // Der

    // Torso (Inclinación al caminar)
    ctx.rotate(isMoving ? Math.sin(player.walkCycle)*0.05 : 0);
    drawBlock(-15, -15 + bob, 30, 32, 12, "#795548");

    // Brazos
    drawBlock(-22, -12 + (isMoving ? swing : 0), 7, 22, 8, "#5d4037");
    drawBlock(15, -12 + (isMoving ? -swing : 0), 7, 22, 8, "#5d4037");

    // Cabeza y Sombrero (Head bobbing)
    const headY = -38 + bob;
    drawBlock(-10, headY, 20, 20, 10, "#ffccbc"); // Cabeza
    
    // Sombrero Realista
    drawBlock(-22, headY - 2, 44, 4, 15, "#3e2723"); // Ala
    drawBlock(-12, headY - 14, 24, 12, 10, "#4e342e"); // Copa

    ctx.restore();
}

function drawInfiniteMap() {
    const startX = Math.floor((world.x - width/2) / TILE_SIZE);
    const startY = Math.floor((world.y - height/2) / TILE_SIZE);
    const endX = startX + Math.ceil(width / TILE_SIZE) + 2;
    const endY = startY + Math.ceil(height / TILE_SIZE) + 2;

    for (let i = startX; i < endX; i++) {
        for (let j = startY; j < endY; j++) {
            const px = i * TILE_SIZE - world.x + width/2;
            const py = j * TILE_SIZE - world.y + height/2;

            // Color de pasto con ruido de iluminación
            const seed = (i * 12345 + j * 67890);
            ctx.fillStyle = (i + j) % 2 === 0 ? "#4caf50" : "#43a047";
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

            // Briznas de pasto 3D simples
            if (Math.abs(seed % 10) > 7) {
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillRect(px + (seed%TILE_SIZE), py + (seed%TILE_SIZE), 2, 8);
            }
        }
    }
}

function update() {
    const speed = 6;
    let targetVX = 0, targetVY = 0;

    if (keys['w']) targetVY = -speed;
    if (keys['s']) targetVY = speed;
    if (keys['a']) targetVX = -speed;
    if (keys['d']) targetVX = speed;

    // Suavizado de movimiento (Inercia tipo Roblox)
    player.velocity.x += (targetVX - player.velocity.x) * 0.15;
    player.velocity.y += (targetVY - player.velocity.y) * 0.15;

    world.x += player.velocity.x;
    world.y += player.velocity.y;

    // Salto
    if (keys[' '] && !player.isJumping) {
        player.vz = 14;
        player.isJumping = true;
    }

    if (player.isJumping) {
        player.z += player.vz;
        player.vz -= 0.85;
        if (player.z <= 0) { player.z = 0; player.isJumping = false; }
    }
}

function render() {
    ctx.fillStyle = "#1e1e1e";
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    if (view3D) {
        // Perspectiva FOV tipo Roblox
        ctx.translate(width/2, height/2);
        ctx.transform(1.2, 0, -0.4, 0.6, 0, 0); 
        ctx.translate(-width/2, -height/2 + 100);
    }

    drawInfiniteMap();
    drawCowboy(width/2, height/2 + (view3D ? 100 : 0));
    
    ctx.restore();

    // Viñeta ambiental
    const grad = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,0.4)");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0, width, height);

    update();
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
