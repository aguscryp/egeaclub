<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Pro - Fluid Movement & Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY ENGINE PRO</strong><br>
    <small>Mover: <b>WASD</b> | Saltar: <b>Espacio</b><br>Girar Cámara: <b>Arrastrar Mouse (Click Izquierdo o Derecho)</b></small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let vaquero, piernaIzq, piernaDer, brazoIzq, brazoDer, houseRoof;
let obstacles = []; // Para colisiones
const keys = {};

const config = {
    speed: 0.18,
    jumpForce: 0.28,
    gravity: 0.012,
    vY: 0,
    isJumping: false,
    walkCycle: 0,
    turnSpeed: 0.15 // Velocidad de giro suave
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    scene.add(sun);

    crearTerreno();
    crearVaquero();
    crearCasa(15, 0, -15);
    
    // CONTROLES DE CÁMARA
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 25;
    controls.enablePan = false; // Bloqueamos el desplazamiento lateral de cámara

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
}

function crearTerreno() {
    const geo = new THREE.PlaneGeometry(500, 500);
    const mat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    const ground = new THREE.Mesh(geo, mat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

    piernaIzq = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaDer = piernaIzq.clone(); piernaDer.position.x = 0.25;
    
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    
    brazoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoDer = brazoIzq.clone(); brazoDer.position.x = 0.65;
    
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), matPiel);
    head.position.y = 2.5;
    
    const hat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.2), matCuero);
    hat.position.y = 2.85;

    vaquero.add(piernaIzq, piernaDer, torso, brazoIzq, brazoDer, head, hat);
    vaquero.traverse(n => { if(n.isMesh) n.castShadow = true; });
    scene.add(vaquero);
}

function crearCasa(x, y, z) {
    const house = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    
    // Paredes con colisión
    const walls = [
        { g: [0.5, 6, 8], p: [-4, 3, 0] },
        { g: [0.5, 6, 8], p: [4, 3, 0] },
        { g: [8, 6, 0.5], p: [0, 3, -4] }
    ];

    walls.forEach(w => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.g), mat);
        mesh.position.set(...w.p);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        house.add(mesh);
        
        // Creamos una caja invisible para calcular colisiones
        const box = new THREE.Box3().setFromObject(mesh);
        obstacles.push(box);
    });
    
    houseRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, 9), mat);
    houseRoof.position.set(0, 6, 0);
    house.add(houseRoof);
    
    house.position.set(x, y, z);
    
    // Actualizar las cajas de colisión a la posición del mundo
    obstacles.forEach(box => {
        box.translate(new THREE.Vector3(x, y, z));
    });

    scene.add(house);
}

function update() {
    let moveX = 0;
    let moveZ = 0;

    // Detectar dirección de entrada
    if (keys['KeyW']) moveZ -= 1;
    if (keys['KeyS']) moveZ += 1;
    if (keys['KeyA']) moveX -= 1;
    if (keys['KeyD']) moveX += 1;

    if (moveX !== 0 || moveZ !== 0) {
        // 1. Calcular ángulo hacia donde apunta la cámara
        const angle = Math.atan2(camera.position.x - vaquero.position.x, camera.position.z - vaquero.position.z);
        
        // 2. Crear vector de movimiento relativo a la cámara
        const moveDir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
        moveDir.normalize();

        // 3. Rotar suavemente al personaje hacia la dirección de movimiento
        const targetRotation = Math.atan2(moveDir.x, moveDir.z);
        vaquero.rotation.y = THREE.MathUtils.lerp(vaquero.rotation.y, targetRotation, config.turnSpeed);

        // 4. Intento de movimiento con colisión
        const newPosX = vaquero.position.x + moveDir.x * config.speed;
        const newPosZ = vaquero.position.z + moveDir.z * config.speed;
        
        // Verificar colisión simple (Círculo vs Caja)
        let collision = false;
        const playerBox = new THREE.Box3().setFromCenterAndSize(
            new THREE.Vector3(newPosX, 1, newPosZ),
            new THREE.Vector3(1, 2, 1)
        );

        for (let obs of obstacles) {
            if (playerBox.intersectsBox(obs)) {
                collision = true;
                break;
            }
        }

        if (!collision) {
            vaquero.position.x = newPosX;
            vaquero.position.z = newPosZ;
        }

        // Animación extremidades
        config.walkCycle += 0.2;
        piernaIzq.rotation.x = Math.sin(config.walkCycle) * 0.6;
        piernaDer.rotation.x = -Math.sin(config.walkCycle) * 0.6;
        brazoIzq.rotation.x = -Math.sin(config.walkCycle) * 0.4;
        brazoDer.rotation.x = Math.sin(config.walkCycle) * 0.4;
    } else {
        // Reset posición natural
        piernaIzq.rotation.x = THREE.MathUtils.lerp(piernaIzq.rotation.x, 0, 0.1);
        piernaDer.rotation.x = THREE.MathUtils.lerp(piernaDer.rotation.x, 0, 0.1);
    }

    // Salto
    if (keys['Space'] && !config.isJumping) { config.vY = config.jumpForce; config.isJumping = true; }
    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) { vaquero.position.y = 0; config.isJumping = false; }
    }

    // Transparencia de techo
    const distToHouse = vaquero.position.distanceTo(new THREE.Vector3(15, 0, -15));
    houseRoof.material.transparent = true;
    houseRoof.material.opacity = (distToHouse < 5) ? 0.2 : 1.0;

    // CÁMARA: Sigue al personaje pero permite rotación libre con mouse
    controls.target.copy(vaquero.position);
    controls.update();
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
