<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Native 3D World - Three.js Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        b { color: #58ff58; }
    </style>
</head>
<body>

<div id="ui">
    <strong>3D NATIVE WORLD</strong><br>
    <small>Movimiento: <b>WASD</b> | Cámara: <b>Ratón (Click y Arrastra)</b></small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// --- CONFIGURACIÓN BÁSICA DE THREE.JS ---
let scene, camera, renderer, controls;
const keys = {};

// Configuración del Jugador
const player = {
    speed: 0.3,
    rotSpeed: 0.02
};

function init() {
    // 1. ESCENA (El mundo 3D)
    scene = new THREE.Scene();
    // Cielo Celeste Sólido
    scene.background = new THREE.Color(0x87CEEB); 

    // 2. CÁMARA (Perspectiva Real)
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 20); // Posición inicial de la cámara

    // 3. RENDERIZADOR (El motor que dibuja)
    renderer = new THREE.WebGLRenderer({ antialias: true }); // Antialias para bordes suaves
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Activamos sombras reales
    document.body.appendChild(renderer.domElement);

    // 4. CONTROLES DE CÁMARA (OrbitControls)
    // Permite rotar la cámara con el ratón alrededor de un punto
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false; // No permitir desplazar la cámara, solo rotar
    controls.enableZoom = true; // Permitir zoom
    controls.minDistance = 5;
    controls.maxDistance = 50;

    // 5. ILUMINACIÓN
    // Luz Ambiental (ilumina todo un poco)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // Luz Direccional (como el Sol, proyecta sombras)
    const sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(10, 20, 10);
    sunLight.castShadow = true; // Proyecta sombras
    // Configuración de calidad de sombra
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    scene.add(sunLight);

    crearMundo();
    crearPersonaje();
    setupControls();

    window.addEventListener('resize', onWindowResize, false);
}

// --- CREACIÓN DE GEOMETRÍA (Objetos 3D) ---
let groundMesh;
function crearMundo() {
    // 1. EL SUELO (Tierra/Espacio Verde 3D)
    // Usamos una geometría de plano grande
    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    // Material de color verde que reacciona a la luz
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
    
    // En Three.js los planos son verticales por defecto, lo rotamos para que sea el suelo
    groundMesh.rotation.x = -Math.PI / 2; 
    groundMesh.receiveShadow = true; // El suelo recibe sombras
    scene.add(groundMesh);

    // 2. Objetos de referencia (Árboles simples de bloques)
    for (let i = 0; i < 10; i++) {
        crearArbol(Math.random() * 80 - 40, Math.random() * 80 - 40);
    }
}

function crearArbol(x, z) {
    // Tronco
    const trunkGeometry = new THREE.BoxGeometry(1, 4, 1);
    const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
    const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
    trunk.position.set(x, 2, z);
    trunk.castShadow = true;
    trunk.receiveShadow = true;
    scene.add(trunk);

    // Hojas (Cubo verde encima)
    const leavesGeometry = new THREE.BoxGeometry(3, 3, 3);
    const leavesMaterial = new THREE.MeshStandardMaterial({ color: 0x2e7d32 });
    const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
    leaves.position.set(x, 5, z);
    leaves.castShadow = true;
    leaves.receiveShadow = true;
    scene.add(leaves);
}

let playerGroup;
function crearPersonaje() {
    // Creamos un grupo para contener todas las partes del personaje
    playerGroup = new THREE.Group();

    // Materiales
    const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x3498db });
    const skinMaterial = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

    // Cuerpo (Cubo azul)
    const bodyGeometry = new THREE.BoxGeometry(1, 2, 1);
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.position.y = 1; // Elevado para que los pies toquen el suelo
    body.castShadow = true;
    playerGroup.add(body);

    // Cabeza
    const headGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const head = new THREE.Mesh(headGeometry, skinMaterial);
    head.position.y = 2.4;
    head.castShadow = true;
    playerGroup.add(head);

    // Posición inicial del personaje
    playerGroup.position.set(0, 0, 0);
    scene.add(playerGroup);

    // Hacer que los controles miren al personaje
    controls.target = playerGroup.position;
}

// --- CONTROLES Y ANIMACIÓN ---
function setupControls() {
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function update() {
    // Movimiento del personaje (WASD)
    // El movimiento es relativo a la rotación del personaje
    if (keys['w']) {
        playerGroup.translateZ(-player.speed);
    }
    if (keys['s']) {
        playerGroup.translateZ(player.speed);
    }
    if (keys['a']) {
        playerGroup.rotation.y += player.rotSpeed;
    }
    if (keys['d']) {
        playerGroup.rotation.y -= player.rotSpeed;
    }

    // Actualizar los controles de órbita (necesario si cambiamos el target)
    controls.update();
}

// BUCLE DE RENDERIZADO (El Game Loop)
function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

// INICIAR TODO
init();
animate();

</script>
</body>
</html>
