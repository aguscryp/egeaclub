<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cowboy Engine - Inventory System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        
        /* UI de Instrucciones */
        #ui-top {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            backdrop-filter: blur(5px); z-index: 10;
        }

        /* --- ESTILO DEL INVENTARIO (Pink Pro: Neon Flow) --- */
        #inventory-bar {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(20, 20, 20, 0.8);
            padding: 10px; border-radius: 15px;
            border: 2px solid #ff007f; /* Neon Pink */
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            z-index: 100;
        }

        .inv-slot {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 0, 127, 0.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: 0.3s;
        }

        .inv-slot:hover {
            background: rgba(255, 0, 127, 0.2);
            border-color: #ff007f;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="ui-top">
    <strong>COWBOY OS v2.0</strong><br>
    <small>Usa <b>WASD</b> para moverte | <b>Scroll</b> para Zoom</small>
</div>

<div id="inventory-bar" id="inv-container">
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// --- DATOS EXTERNOS (Aquí podrías importar tu data.js) ---
const RECURSOS_JUGADOR = [
    { id: "sw4", nombre: "Camioneta SW4", icono: "🛻", color: 0xffffff },
    { id: "gold", nombre: "Oro", icono: "💰", color: 0xffd700 },
    { id: "revolver", nombre: "Revólver", icono: "🔫", color: 0x333333 }
];

let scene, camera, renderer, controls, vaquero;
const keys = {};
const obstacles = [];

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

    crearTerreno();
    crearVaquero();
    cargarInventarioUI();
    
    // --- CAMIONETA SW4 EN EL MUNDO ---
    crearCamioneta(10, 0, 5);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 5;
    controls.maxDistance = 30;

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
}

// Función para cargar items desde el "archivo externo"
function cargarInventarioUI() {
    const container = document.getElementById('inventory-bar');
    RECURSOS_JUGADOR.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.innerHTML = item.icono;
        slot.title = item.nombre;
        slot.onclick = () => alert(`Seleccionado: ${item.nombre}`);
        container.appendChild(slot);
    });
}

function crearCamioneta(x, y, z) {
    const car = new THREE.Group();
    // Cuerpo SW4
    const body = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 8), new THREE.MeshStandardMaterial({color: 0xffffff}));
    body.position.y = 1.5;
    // Techo
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 4), new THREE.MeshStandardMaterial({color: 0xffffff}));
    cabin.position.set(0, 3, -0.5);
    
    car.add(body, cabin);
    car.position.set(x, y, z);
    scene.add(car);
    
    // Colisión para la camioneta
    const box = new THREE.Box3().setFromObject(car);
    obstacles.push(box);
}

function crearTerreno() {
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4caf50}));
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffe0bd}));
    head.position.y = 2.5;
    
    // Cara sonriente 3D
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({color:0x000}));
    eye.position.set(0.15, 0.1, 0.35);
    const eye2 = eye.clone(); eye2.position.x = -0.15;
    const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.1), new THREE.MeshBasicMaterial({color:0x000}));
    mouth.position.set(0, -0.15, 0.35);
    head.add(eye, eye2, mouth);

    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), new THREE.MeshStandardMaterial({color: 0x795548}));
    body.position.y = 1.5;
    
    vaquero.add(head, body);
    scene.add(vaquero);
}

function update() {
    const prevPos = vaquero.position.clone();
    let moveX = 0, moveZ = 0;
    if (keys['KeyW']) moveZ -= 1;
    if (keys['KeyS']) moveZ += 1;
    if (keys['KeyA']) moveX -= 1;
    if (keys['KeyD']) moveX += 1;

    if (moveX !== 0 || moveZ !== 0) {
        const angle = Math.atan2(camera.position.x - vaquero.position.x, camera.position.z - vaquero.position.z);
        const moveDir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle).normalize();
        
        // Rotación suave
        const targetRot = Math.atan2(moveDir.x, moveDir.z);
        vaquero.rotation.y = THREE.MathUtils.lerp(vaquero.rotation.y, targetRot, 0.15);

        const newX = vaquero.position.x + moveDir.x * 0.2;
        const newZ = vaquero.position.z + moveDir.z * 0.2;

        // Verificación de colisión
        const playerBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(newX, 1, newZ), new THREE.Vector3(1, 2, 1));
        let collision = obstacles.some(obs => playerBox.intersectsBox(obs));

        if (!collision) {
            vaquero.position.set(newX, vaquero.position.y, newZ);
        }
    }

    camera.position.add(vaquero.position.clone().sub(prevPos));
    controls.target.copy(vaquero.position);
    controls.update();
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
