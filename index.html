<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 2D Style - WASD Edition</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #contenedor {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            pointer-events: none;
            border-left: 4px solid #0f0;
        }

        canvas {
            display: block;
            background-color: #348c31;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <div id="ui">MOVIMIENTO: [W, A, S, D]</div>
        <canvas id="mundo"></canvas>
    </div>

<script>
    const canvas = document.getElementById('mundo');
    const ctx = canvas.getContext('2d');

    // Ajuste de pantalla
    canvas.width = 900;
    canvas.height = 600;

    const config = {
        tileSize: 50,
        playerSpeed: 4.5,
        grassColor1: '#3fa33a', // Verde base
        grassColor2: '#2e8b29', // Verde sombra
        detailDensity: 0.15     // Cantidad de "pastitos" realistas
    };

    const jugador = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        size: 35,
        color: '#e63946', // Rojo vibrante tipo Roblox
        headColor: '#ffb703', // Tono de piel / cabeza
        dirX: 0,
        dirY: 0
    };

    const teclas = { w: false, a: false, s: false, d: false };

    // --- GENERACIÓN DE MAPA "REALISTA" ---
    // Creamos un canvas oculto para la textura de pasto y así no procesar tanto cada frame
    const grassCanvas = document.createElement('canvas');
    grassCanvas.width = canvas.width;
    grassCanvas.height = canvas.height;
    const gCtx = grassCanvas.getContext('2d');

    function generarMapaRealista() {
        // Dibujamos bloques base con degradados
        for (let x = 0; x < canvas.width; x += config.tileSize) {
            for (let y = 0; y < canvas.height; y += config.tileSize) {
                // Alternamos color base
                gCtx.fillStyle = (Math.floor(x/50) + Math.floor(y/50)) % 2 === 0 
                                 ? config.grassColor1 : config.grassColor2;
                gCtx.fillRect(x, y, config.tileSize, config.tileSize);

                // Añadimos "ruido" de briznas de pasto para realismo
                for (let i = 0; i < 20; i++) {
                    gCtx.fillStyle = 'rgba(255,255,255,0.05)';
                    gCtx.fillRect(x + Math.random()*50, y + Math.random()*50, 2, 4);
                    gCtx.fillStyle = 'rgba(0,0,0,0.05)';
                    gCtx.fillRect(x + Math.random()*50, y + Math.random()*50, 2, 2);
                }
            }
        }
    }
    generarMapaRealista();

    // Eventos de teclado actualizados a WASD
    window.onkeydown = (e) => { 
        const key = e.key.toLowerCase();
        if (teclas.hasOwnProperty(key)) teclas[key] = true; 
    };
    window.onkeyup = (e) => { 
        const key = e.key.toLowerCase();
        if (teclas.hasOwnProperty(key)) teclas[key] = false; 
    };

    function dibujarJugador() {
        // 1. Sombra (le da el toque de profundidad de Roblox)
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(jugador.x + 18, jugador.y + 35, 15, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 2. Cuerpo (Bloque principal)
        ctx.fillStyle = jugador.color;
        ctx.fillRect(jugador.x, jugador.y, jugador.size, jugador.size);
        
        // Borde del cuerpo para definición
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.strokeRect(jugador.x, jugador.y, jugador.size, jugador.size);

        // 3. Cabeza (Estilo Roblox)
        ctx.fillStyle = jugador.headColor;
        const headSize = jugador.size * 0.6;
        const headX = jugador.x + (jugador.size - headSize) / 2;
        const headY = jugador.y - headSize * 0.4;
        ctx.fillRect(headX, headY, headSize, headSize);

        // 4. Cara Simple
        ctx.fillStyle = '#333';
        // Ojo izq
        ctx.fillRect(headX + 5, headY + 5, 4, 4);
        // Ojo der
        ctx.fillRect(headX + headSize - 9, headY + 5, 4, 4);
        // Boca
        ctx.fillRect(headX + 5, headY + 14, headSize - 10, 2);
    }

    function update() {
        jugador.dirX = 0;
        jugador.dirY = 0;

        if (teclas.w) jugador.dirY = -1;
        if (teclas.s) jugador.dirY = 1;
        if (teclas.a) jugador.dirX = -1;
        if (teclas.d) jugador.dirX = 1;

        // Normalización de velocidad diagonal
        if (jugador.dirX !== 0 && jugador.dirY !== 0) {
            jugador.dirX *= 0.7071;
            jugador.dirY *= 0.7071;
        }

        // Colisiones con bordes
        let nx = jugador.x + jugador.dirX * config.playerSpeed;
        let ny = jugador.y + jugador.dirY * config.playerSpeed;

        if (nx > 0 && nx < canvas.width - jugador.size) jugador.x = nx;
        if (ny > 15 && ny < canvas.height - jugador.size) jugador.y = ny;
    }

    function loop() {
        // Dibujamos la textura pre-generada (mucho más rápido)
        ctx.drawImage(grassCanvas, 0, 0);
        
        update();
        dibujarJugador();
        
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
