<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cowboy World: Infinite Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 2px solid #5d4037;
        }
        .key { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <span class="key">WASD</span> Caminar | 
    <span class="key">ESPACIO</span> Saltar | 
    <span class="key">V</span> Cambiar Vista (2D/3D)<br>
    <small>Mapa Infinito Generado por Código</small>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- CONFIGURACIÓN ---
let width, height;
let view3D = false; 
const TILE_SIZE = 100;
const keys = {};

const player = {
    x: 0, y: 0, // Posición en el mundo infinito
    screenX: 0, screenY: 0,
    speed: 5,
    z: 0, // Altura para el salto
    vz: 0, // Velocidad de salto
    isJumping: false,
    angle: 0, // Animación de piernas/brazos
    frame: 0
};

// Redimensionar pantalla completa
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    player.screenX = width / 2;
    player.screenY = height / 2;
}
window.addEventListener('resize', resize);
resize();

// Eventos
window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === 'v') view3D = !view3D; };
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// --- DIBUJO DEL VAQUERO ---
function drawCowboy(x, y, scale) {
    const jumpOffset = player.z; // Elevación por salto
    const swing = Math.sin(player.frame * 0.2) * 15; // Balanceo de extremidades
    
    ctx.save();
    ctx.translate(x, y - jumpOffset);
    ctx.scale(scale, scale);

    // 1. Sombra (en el suelo)
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(0, jumpOffset + 20, 20, 10, 0, 0, Math.PI*2);
    ctx.fill();

    // 2. Piernas (Marrones)
    ctx.fillStyle = "#3e2723";
    // Pierna Izq
    ctx.fillRect(-12 + (player.dirY ? 0 : -swing/4), 5 + (player.dirY ? swing : 0), 8, 15);
    // Pierna Der
    ctx.fillRect(4 + (player.dirY ? 0 : swing/4), 5 + (player.dirY ? -swing : 0), 8, 15);

    // 3. Cuerpo (Chaleco Marrón claro)
    ctx.fillStyle = "#795548";
    ctx.fillRect(-15, -20, 30, 30);

    // 4. Brazos
    ctx.fillStyle = "#5d4037";
    // Brazo Izq
    ctx.fillRect(-22, -18 + (player.dirY ? -swing : 0), 7, 15);
    // Brazo Der
    ctx.fillRect(15, -18 + (player.dirY ? swing : 0), 7, 15);

    // 5. Cabeza y Sombrero
    ctx.fillStyle = "#ffccbc"; // Piel
    ctx.fillRect(-10, -35, 20, 18);
    
    // Sombrero Vaquero
    ctx.fillStyle = "#3e2723";
    ctx.fillRect(-20, -38, 40, 5); // Ala
    ctx.fillRect(-12, -48, 24, 12); // Copa

    // Cara simple
    ctx.fillStyle = "#000";
    ctx.fillRect(-5, -30, 3, 3);
    ctx.fillRect(3, -30, 3, 3);

    ctx.restore();
}

// --- RENDERIZADO DEL MAPA INFINITO ---
function drawMap() {
    const offsetX = player.x % TILE_SIZE;
    const offsetY = player.y % TILE_SIZE;

    // Calculamos cuántos tiles caben en pantalla
    const cols = Math.ceil(width / TILE_SIZE) + 2;
    const rows = Math.ceil(height / TILE_SIZE) + 2;

    for (let i = -1; i < cols; i++) {
        for (let j = -1; j < rows; j++) {
            const posX = i * TILE_SIZE - offsetX;
            const posY = j * TILE_SIZE - offsetY;

            // Simular coordenadas reales para el patrón de colores
            const worldI = Math.floor((player.x + posX) / TILE_SIZE);
            const worldJ = Math.floor((player.y + posY) / TILE_SIZE);

            ctx.fillStyle = (worldI + worldJ) % 2 === 0 ? "#4caf50" : "#43a047";
            ctx.fillRect(posX, posY, TILE_SIZE, TILE_SIZE);
            
            // Detalles de pasto "realista"
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(posX + 20, posY + 20, 2, 10);
        }
    }
}

function update() {
    let dx = 0, dy = 0;
    if (keys['w']) dy = -1;
    if (keys['s']) dy = 1;
    if (keys['a']) dx = -1;
    if (keys['d']) dx = 1;

    // Guardamos dirección para animación
    player.dirY = dy !== 0;

    if (dx !== 0 || dy !== 0) {
        player.frame++;
        const mag = Math.sqrt(dx*dx + dy*dy);
        player.x += (dx/mag) * player.speed;
        player.y += (dy/mag) * player.speed;
    }

    // Lógica de Salto (Física simple)
    if ((keys[' '] || keys['escape']) && !player.isJumping) {
        player.vz = 12;
        player.isJumping = true;
    }

    if (player.isJumping) {
        player.z += player.vz;
        player.vz -= 0.8; // Gravedad
        if (player.z <= 0) {
            player.z = 0;
            player.vz = 0;
            player.isJumping = false;
        }
    }
}

function loop() {
    ctx.clearRect(0,0, width, height);

    ctx.save();
    if (view3D) {
        // Efecto de perspectiva 3D (Tercera persona)
        ctx.translate(width/2, height/2);
        ctx.transform(1, 0, -0.3, 0.5, 0, 0); 
        ctx.translate(-width/2, -height/1.5);
    }

    drawMap();
    
    // El personaje siempre está en el centro de la pantalla
    // Pero si es 3D, lo bajamos un poco para que se vea mejor
    const drawY = view3D ? player.screenY + 100 : player.screenY;
    drawCowboy(player.screenX, drawY, view3D ? 1.5 : 1);

    ctx.restore();

    update();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
