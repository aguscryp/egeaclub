<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Fixed - Biomes & Interior</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
            backdrop-filter: blur(5px); z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    <strong>WILD WEST 3D</strong><br>
    <small>Mover: <b>WASD</b> | Salto: <b>Espacio</b><br>Girar: <b>Clic Derecho</b></small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, sun;
let vaquero, piernaIzq, piernaDer, brazoIzq, brazoDer, houseRoof;
let particles = [];
const keys = {};

const config = {
    speed: 0.2,
    jumpForce: 0.3,
    gravity: 0.012,
    vY: 0,
    isJumping: false,
    walkCycle: 0
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Cielo Celeste Fijo

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ILUMINACIÓN ESTABLE
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1024;
    sun.shadow.mapSize.height = 1024;
    scene.add(sun);

    crearTerreno();
    crearVaquero();
    crearCasa(15, 0, -15);
    
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.mouseButtons = { ORBIT: THREE.MOUSE.RIGHT, ZOOM: THREE.MOUSE.MIDDLE, PAN: THREE.MOUSE.LEFT };
    controls.enableDamping = true;
    controls.rotateSpeed = 1.5;

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onresize = onWindowResize;
}

function crearTerreno() {
    const geo = new THREE.PlaneGeometry(400, 400, 40, 40);
    const colors = [];
    const colorA = new THREE.Color(0xd2b48c); // Arena
    const colorB = new THREE.Color(0x4caf50); // Pasto/Tierra
    
    for (let i = 0; i < geo.attributes.position.count; i++) {
        const x = geo.attributes.position.getX(i);
        const y = geo.attributes.position.getY(i);
        const noise = Math.sin(x * 0.05) * Math.cos(y * 0.05);
        const mixed = colorA.clone().lerp(colorB, (noise + 1) / 2);
        colors.push(mixed.r, mixed.g, mixed.b);
    }
    
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9 });
    const ground = new THREE.Mesh(geo, mat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

    piernaIzq = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaDer = piernaIzq.clone(); piernaDer.position.x = 0.25;
    
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    
    brazoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoDer = brazoIzq.clone(); brazoDer.position.x = 0.65;
    
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), matPiel);
    head.position.y = 2.5;
    
    const brim = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.2), matCuero);
    brim.position.y = 2.85;
    const top = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.6), matCuero);
    top.position.y = 3.1;

    vaquero.add(piernaIzq, piernaDer, torso, brazoIzq, brazoDer, head, brim, top);
    vaquero.traverse(n => { if(n.isMesh) n.castShadow = true; });
    scene.add(vaquero);
}

function crearCasa(x, y, z) {
    const house = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    
    const wall1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 8), mat);
    wall1.position.set(-4, 3, 0);
    const wall2 = wall1.clone(); wall2.position.x = 4;
    const wall3 = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 0.4), mat);
    wall3.position.set(0, 3, -4);
    
    houseRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, 9), mat);
    houseRoof.position.set(0, 6, 0);
    
    house.add(wall1, wall2, wall3, houseRoof);
    house.position.set(x, y, z);
    scene.add(house);
}

function update() {
    let moving = false;
    const prevPos = vaquero.position.clone();

    if (keys['KeyW']) { vaquero.translateZ(-config.speed); moving = true; }
    if (keys['KeyS']) { vaquero.translateZ(config.speed); moving = true; }
    if (keys['KeyA']) { vaquero.rotation.y += 0.06; moving = true; }
    if (keys['KeyD']) { vaquero.rotation.y -= 0.06; moving = true; }

    if (moving && !config.isJumping) {
        config.walkCycle += 0.2;
        piernaIzq.rotation.x = Math.sin(config.walkCycle) * 0.5;
        piernaDer.rotation.x = -Math.sin(config.walkCycle) * 0.5;
        brazoIzq.rotation.x = -Math.sin(config.walkCycle) * 0.4;
        brazoDer.rotation.x = Math.sin(config.walkCycle) * 0.4;
        
        // Polvo
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({color:0xbdc3c7, transparent:true}));
        p.position.set(vaquero.position.x, 0.1, vaquero.position.z);
        p.life = 1.0;
        scene.add(p);
        particles.push(p);
    }

    if (keys['Space'] && !config.isJumping) { config.vY = config.jumpForce; config.isJumping = true; }
    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) { vaquero.position.y = 0; config.isJumping = false; }
    }

    // Partículas Update
    particles.forEach((p, i) => {
        p.life -= 0.03;
        p.position.y += 0.01;
        p.material.opacity = p.life;
        if(p.life <= 0) { scene.remove(p); particles.splice(i,1); }
    });

    // Interior Casa (Transparencia)
    const dist = vaquero.position.distanceTo(new THREE.Vector3(15, 0, -15));
    if (dist < 6) {
        houseRoof.material.transparent = true;
        houseRoof.material.opacity = 0.3;
    } else {
        houseRoof.material.opacity = 1.0;
    }

    // Cámara sigue al personaje rígidamente
    camera.position.add(vaquero.position.clone().sub(prevPos));
    controls.target.copy(vaquero.position);
    controls.update();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
