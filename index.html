<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Real Engine - WASD & Jump</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY 3D REAL</strong><br>
    <small><b>WASD</b>: Caminar | <b>ESPACIO</b>: Saltar<br>Usa el <b>Ratón</b> para orbitar la vista</small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let vaquero, suelo;
const keys = {};

// Configuración de Físicas y Movimiento
const config = {
    speed: 0.15,
    jumpForce: 0.25,
    gravity: 0.01,
    vY: 0,
    isJumping: false,
    walkCycle: 0
};

function init() {
    // 1. ESCENA Y CIELO
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); 

    // 2. CÁMARA
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 15);

    // 3. RENDERER
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Sombras activadas
    document.body.appendChild(renderer.domElement);

    // 4. LUCES
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    // 5. MAPA / TIERRA 3D
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    suelo = new THREE.Mesh(groundGeo, groundMat);
    suelo.rotation.x = -Math.PI / 2;
    suelo.receiveShadow = true;
    scene.add(suelo);

    // Agregar algunos bloques decorativos (casas/obstáculos)
    crearObstaculo(10, 5, -10);
    crearObstaculo(-15, 5, -20);

    // 6. CREAR VAQUERO
    crearVaquero();

    // 7. CONTROLES DE CÁMARA
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Suavizado de cámara
    controls.minDistance = 5;
    controls.maxDistance = 30;

    // Eventos
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    window.addEventListener('resize', onWindowResize);
}

function crearVaquero() {
    vaquero = new THREE.Group();

    // Piernas (Marrones)
    const legGeo = new THREE.BoxGeometry(0.4, 0.8, 0.4);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const pI = new THREE.Mesh(legGeo, legMat);
    pI.position.set(-0.3, 0.4, 0);
    pI.castShadow = true;
    const pD = pI.clone();
    pD.position.x = 0.3;
    vaquero.add(pI, pD);

    // Torso (Marrón claro)
    const torsoGeo = new THREE.BoxGeometry(1, 1.2, 0.6);
    const torsoMat = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const torso = new THREE.Mesh(torsoGeo, torsoMat);
    torso.position.y = 1.4;
    torso.castShadow = true;
    vaquero.add(torso);

    // Cabeza
    const headGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.3;
    head.castShadow = true;
    vaquero.add(head);

    // Sombrero Vaquero
    const brimGeo = new THREE.BoxGeometry(1.6, 0.1, 1.4); // Ala
    const crownGeo = new THREE.BoxGeometry(0.8, 0.5, 0.7); // Copa
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const brim = new THREE.Mesh(brimGeo, hatMat);
    brim.position.y = 2.7;
    const crown = new THREE.Mesh(crownGeo, hatMat);
    crown.position.y = 3.0;
    vaquero.add(brim, crown);

    scene.add(vaquero);
}

function crearObstaculo(x, y, z) {
    const box = new THREE.Mesh(
        new THREE.BoxGeometry(5, 5, 5),
        new THREE.MeshStandardMaterial({ color: 0xa1887f })
    );
    box.position.set(x, 2.5, z);
    box.castShadow = true;
    box.receiveShadow = true;
    scene.add(box);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function update() {
    let moving = false;

    // Movimiento Relativo a la rotación del personaje
    if (keys['KeyW']) { vaquero.translateZ(-config.speed); moving = true; }
    if (keys['KeyS']) { vaquero.translateZ(config.speed); moving = true; }
    if (keys['KeyA']) { vaquero.rotation.y += 0.05; moving = true; }
    if (keys['KeyD']) { vaquero.rotation.y -= 0.05; moving = true; }

    // Animación de caminata (balanceo)
    if (moving) {
        config.walkCycle += 0.2;
        vaquero.children[2].rotation.z = Math.sin(config.walkCycle) * 0.05; // Torso rebota
    }

    // Lógica de Salto (Espacio o Escape)
    if ((keys['Space'] || keys['Escape']) && !config.isJumping) {
        config.vY = config.jumpForce;
        config.isJumping = true;
    }

    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) {
            vaquero.position.y = 0;
            config.isJumping = false;
        }
    }

    // CÁMARA DE SEGUIMIENTO (Tercera Persona)
    // Hacemos que los controles de órbita siempre se centren en el vaquero
    controls.target.copy(vaquero.position);
    
    // Para que la cámara no se quede estática, la desplazamos con el personaje
    // pero permitiendo que el usuario rote con el ratón.
    controls.update();
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();

</script>
</body>
</html>
