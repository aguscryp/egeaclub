<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cowboy Engine Pro - Full Integration</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        
        #ui-top {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            backdrop-filter: blur(5px); z-index: 10; border: 1px solid rgba(255, 0, 127, 0.3);
        }

        /* INVENTARIO NEON FLOW */
        #inventory-bar {
            position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 12px;
            background: rgba(15, 15, 15, 0.9);
            padding: 12px; border-radius: 18px;
            border: 2px solid #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            z-index: 100;
        }

        .inv-slot {
            width: 65px; height: 65px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 127, 0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .inv-slot:hover {
            background: rgba(255, 0, 127, 0.15);
            border-color: #ff007f;
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

<div id="ui-top">
    <strong>COWBOY OS v3.0</strong><br>
    <small><b>WASD</b>: Caminar | <b>Espacio</b>: Saltar | <b>Mouse</b>: Zoom y Giro</small>
</div>

<div id="inventory-bar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/** * ARCHIVO DE DATOS (RECURSOS)
 * En tu repositorio, esto vendría de un archivo .js o .json externo
 */
const RECURSOS_MUNDO = [
    { id: "sw4", nombre: "Toyota SW4", icono: "🛻" },
    { id: "oro", nombre: "Lingote", icono: "💰" },
    { id: "casa", nombre: "Cabaña", icono: "🏠" }
];

let scene, camera, renderer, controls, vaquero;
let piernaIzq, piernaDer, brazoIzq, brazoDer, houseRoof;
let obstacles = [];
const keys = {};

const config = {
    speed: 0.18,
    jumpForce: 0.28,
    gravity: 0.012,
    vY: 0,
    isJumping: false,
    walkCycle: 0,
    turnSpeed: 0.15 
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(30, 50, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

    crearTerreno();
    crearVaquero(); // Con toda la lógica de extremidades y cara
    crearCasa(15, 0, -15);
    crearCamioneta(10, 0, 5);
    cargarInventarioUI();

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.minDistance = 5;
    controls.maxDistance = 25;

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.addEventListener('resize', onWindowResize);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
    const matNegro = new THREE.MeshStandardMaterial({ color: 0x000000 });

    // Extremidades para animación
    const legGeo = new THREE.BoxGeometry(0.35, 1, 0.35);
    piernaIzq = new THREE.Mesh(legGeo, matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaIzq.castShadow = true;
    piernaDer = piernaIzq.clone(); piernaDer.position.x = 0.25;

    const armGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
    brazoIzq = new THREE.Mesh(armGeo, matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoIzq.castShadow = true;
    brazoDer = brazoIzq.clone(); brazoDer.position.x = 0.65;

    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    torso.castShadow = true;

    // Cabeza con CARA SONRIENTE
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), matPiel);
    head.position.y = 2.5;
    head.castShadow = true;

    const eyeGeo = new THREE.BoxGeometry(0.1, 0.1, 0.05);
    const e1 = new THREE.Mesh(eyeGeo, matNegro); e1.position.set(0.15, 0.1, 0.33);
    const e2 = e1.clone(); e2.position.x = -0.15;
    
    // Sonrisa 3 bloques
    const b1 = new THREE.Mesh(eyeGeo, matNegro); b1.position.set(0, -0.15, 0.33);
    const b2 = b1.clone(); b2.position.set(0.1, -0.1, 0.33);
    const b3 = b1.clone(); b3.position.set(-0.1, -0.1, 0.33);
    head.add(e1, e2, b1, b2, b3);

    const hat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.2), matCuero);
    hat.position.y = 2.85;

    vaquero.add(piernaIzq, piernaDer, torso, brazoIzq, brazoDer, head, hat);
    scene.add(vaquero);
}

function cargarInventarioUI() {
    const container = document.getElementById('inventory-bar');
    RECURSOS_MUNDO.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.innerHTML = item.icono;
        slot.title = item.nombre;
        slot.onclick = () => console.log(`Equipando: ${item.nombre}`);
        container.appendChild(slot);
    });
}

function crearCamioneta(x, y, z) {
    const car = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color: 0xffffff});
    const body = new THREE.Mesh(new THREE.BoxGeometry(4, 1.8, 8), mat);
    body.position.y = 1.2; body.castShadow = true;
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 4), mat);
    cabin.position.set(0, 2.8, -0.5); cabin.castShadow = true;
    car.add(body, cabin);
    car.position.set(x, y, z);
    scene.add(car);
    obstacles.push(new THREE.Box3().setFromObject(car));
}

function crearCasa(x, y, z) {
    const house = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    const wall1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 8), mat);
    wall1.position.set(-4, 3, 0);
    const wall2 = wall1.clone(); wall2.position.x = 4;
    const wall3 = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 0.4), mat);
    wall3.position.set(0, 3, -4);
    houseRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, 9), mat);
    houseRoof.position.set(0, 6, 0);
    house.add(wall1, wall2, wall3, houseRoof);
    house.position.set(x, y, z);
    [wall1, wall2, wall3].forEach(w => {
        let b = new THREE.Box3().setFromObject(w);
        b.translate(new THREE.Vector3(x, y, z));
        obstacles.push(b);
    });
    scene.add(house);
}

function crearTerreno() {
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4caf50}));
    ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
    scene.add(ground);
}

function update() {
    const prevPos = vaquero.position.clone();
    let moveX = 0, moveZ = 0;
    if (keys['KeyW']) moveZ -= 1; if (keys['KeyS']) moveZ += 1;
    if (keys['KeyA']) moveX -= 1; if (keys['KeyD']) moveX += 1;

    if (moveX !== 0 || moveZ !== 0) {
        const angle = Math.atan2(camera.position.x - vaquero.position.x, camera.position.z - vaquero.position.z);
        const moveDir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle).normalize();
        
        const targetRot = Math.atan2(moveDir.x, moveDir.z);
        let diff = targetRot - vaquero.rotation.y;
        while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
        vaquero.rotation.y += diff * config.turnSpeed;

        const newX = vaquero.position.x + moveDir.x * config.speed;
        const newZ = vaquero.position.z + moveDir.z * config.speed;

        const playerBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(newX, 1, newZ), new THREE.Vector3(1, 2, 1));
        if (!obstacles.some(obs => playerBox.intersectsBox(obs))) {
            vaquero.position.x = newX; vaquero.position.z = newZ;
        }

        config.walkCycle += 0.2;
        piernaIzq.rotation.x = Math.sin(config.walkCycle) * 0.6;
        piernaDer.rotation.x = -Math.sin(config.walkCycle) * 0.6;
        brazoIzq.rotation.x = -Math.sin(config.walkCycle) * 0.4;
        brazoDer.rotation.x = Math.sin(config.walkCycle) * 0.4;
    } else {
        piernaIzq.rotation.x = THREE.MathUtils.lerp(piernaIzq.rotation.x, 0, 0.1);
        piernaDer.rotation.x = THREE.MathUtils.lerp(piernaDer.rotation.x, 0, 0.1);
    }

    if (keys['Space'] && !config.isJumping) { config.vY = config.jumpForce; config.isJumping = true; }
    if (config.isJumping) {
        vaquero.position.y += config.vY; config.vY -= config.gravity;
        if (vaquero.position.y <= 0) { vaquero.position.y = 0; config.isJumping = false; }
    }

    // Techo dinámico
    const dist = vaquero.position.distanceTo(new THREE.Vector3(15, 0, -15));
    houseRoof.material.transparent = true;
    houseRoof.material.opacity = (dist < 5) ? 0.2 : 1.0;

    // Cámara FIJA con Zoom
    camera.position.add(vaquero.position.clone().sub(prevPos));
    controls.target.copy(vaquero.position);
    controls.update();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
