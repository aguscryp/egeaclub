<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Open World Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .key { color: #58ff58; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <strong>3D WORLD EXPLORER</strong><br>
    <small>Movimiento: <span class="key">WASD</span> | Cámara: <span class="key">Flechas ← →</span></small>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width, height;
const keys = {};
const player = {
    x: 0, y: 0, z: 0,
    angle: 0,
    speed: 5,
    rotSpeed: 0.04,
    walkCycle: 0
};

// Configuración de Colores y Estilo
const COLORS = {
    grass1: '#4caf50',
    grass2: '#388e3c',
    playerBody: '#3498db',
    playerSkin: '#ffe0bd',
    shadow: 'rgba(0,0,0,0.3)'
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

/**
 * PROYECCIÓN 3D: Convierte coordenadas de mundo a coordenadas de pantalla
 */
function project(x, y, z) {
    let dx = x - player.x;
    let dy = y - player.y;

    // Rotación de la cámara (Matemática de rotación 2D)
    let rx = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let ry = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    
    // Altura relativa (z es profundidad, pero aquí y es profundidad en pantalla)
    let rz = z - 60; // Altura de ojos del espectador

    if (ry < 1) return null; // Detrás de la cámara

    const fov = 800; // Campo de visión
    const scale = fov / ry;
    
    return {
        x: width / 2 + rx * scale,
        y: height / 2 + rz * scale,
        scale: scale
    };
}

/**
 * DIBUJO DEL SUELO 3D CON SOMBRAS Y SEPARACIÓN
 */
function drawInfiniteGrass() {
    const tileSize = 150;
    const range = 12; // Cuántos bloques vemos a la redonda

    // Calculamos el bloque actual donde está el jugador
    const playerTileX = Math.floor(player.x / tileSize);
    const playerTileY = Math.floor(player.y / tileSize);

    for (let i = playerTileX - range; i <= playerTileX + range; i++) {
        for (let j = playerTileY - range; j <= playerTileY + range; j++) {
            
            // Esquinas del cuadrado en 3D
            const p1 = project(i * tileSize, j * tileSize, 0);
            const p2 = project((i + 1) * tileSize, j * tileSize, 0);
            const p3 = project((i + 1) * tileSize, (j + 1) * tileSize, 0);
            const p4 = project(i * tileSize, (j + 1) * tileSize, 0);

            if (p1 && p2 && p3 && p4) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.lineTo(p4.x, p4.y);
                ctx.closePath();

                // Colores alternados para "separación" clara de bloques
                ctx.fillStyle = (i + j) % 2 === 0 ? COLORS.grass1 : COLORS.grass2;
                ctx.fill();

                // Líneas de cuadrícula sutiles para realzar el 3D
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.stroke();
            }
        }
    }
}

/**
 * DIBUJO DEL PERSONAJE (Estilo Bloque con Sombras)
 */
function drawPlayer() {
    const bob = Math.sin(player.walkCycle) * 6; // Efecto de rebote al caminar
    const pos = project(player.x, player.y + 120, 0); // Lo dibujamos un poco adelante

    if (!pos) return;
    const s = pos.scale;

    // 1. Sombra Proyectada en el suelo
    ctx.fillStyle = COLORS.shadow;
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y, 25 * s, 12 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. Piernas (Simples con movimiento)
    ctx.fillStyle = "#2c3e50";
    const legW = 8 * s;
    const legH = 15 * s;
    ctx.fillRect(pos.x - 10 * s, pos.y - 15 * s + bob, legW, legH);
    ctx.fillRect(pos.x + 2 * s, pos.y - 15 * s - bob, legW, legH);

    // 3. Torso (Cubo azul)
    ctx.fillStyle = COLORS.playerBody;
    ctx.fillRect(pos.x - 15 * s, pos.y - 40 * s + bob, 30 * s, 25 * s);
    
    // Brillo en el torso para volumen
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(pos.x - 15 * s, pos.y - 40 * s + bob, 5 * s, 25 * s);

    // 4. Cabeza
    ctx.fillStyle = COLORS.playerSkin;
    ctx.fillRect(pos.x - 8 * s, pos.y - 55 * s + bob, 16 * s, 16 * s);

    // 5. Cara (Ojos)
    ctx.fillStyle = '#000';
    ctx.fillRect(pos.x - 5 * s, pos.y - 50 * s + bob, 2 * s, 2 * s);
    ctx.fillRect(pos.x + 3 * s, pos.y - 50 * s + bob, 2 * s, 2 * s);
}

function update() {
    // Rotación de Cámara
    if (keys['arrowleft']) player.angle -= player.rotSpeed;
    if (keys['arrowright']) player.angle += player.rotSpeed;

    // Movimiento Relativo a la Cámara (WASD)
    let moveX = 0;
    let moveY = 0;

    if (keys['w']) { moveX += Math.sin(player.angle); moveY += Math.cos(player.angle); }
    if (keys['s']) { moveX -= Math.sin(player.angle); moveY -= Math.cos(player.angle); }
    if (keys['a']) { moveX -= Math.cos(player.angle); moveY += Math.sin(player.angle); }
    if (keys['d']) { moveX += Math.cos(player.angle); moveY -= Math.sin(player.angle); }

    if (moveX !== 0 || moveY !== 0) {
        player.x += moveX * player.speed;
        player.y += moveY * player.speed;
        player.walkCycle += 0.2;
    }
}

function loop() {
    // Limpiar pantalla con color de cielo
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, width, height);

    update();
    drawInfiniteGrass();
    drawPlayer();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
