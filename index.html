<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cowboy OS - Login</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(20,20,20,0.9); padding: 40px; border-radius: 20px; border: 2px solid #ff007f; box-shadow: 0 0 20px #ff007f; text-align: center; }
        input { background: #000; border: 1px solid #ff007f; color: #ff007f; padding: 10px; font-size: 24px; text-align: center; width: 120px; border-radius: 10px; outline: none; }
        button { background: #ff007f; color: white; border: none; padding: 10px 25px; margin-top: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .pink-text { color: #ff007f; text-shadow: 0 0 5px #ff007f; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="pink-text">COWBOY ENGINE</h2>
        <p>Introduce tu código de 4 dígitos</p>
        <input type="password" id="pin" maxlength="4" placeholder="****">
        <br>
        <button onclick="login()">INICIAR PARTIDA</button>
    </div>

    <script>
        function login() {
            const pin = document.getElementById('pin').value;
            let user = "";
            if(pin === "1234") user = "Agustín Owner";
            else if(pin === "4321") user = "Damian Escobar";
            
            if(user !== "") {
                localStorage.setItem('currentUser', user);
                window.location.href = "perfil.html"; // Siguiente paso
            } else {
                alert("Código incorrecto");
            }
        }
    </script>
</body>
</html>
