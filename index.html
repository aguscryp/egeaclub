<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Open World - Biomes & Interiors</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
            backdrop-filter: blur(5px);
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <strong>WILD WEST SIMULATOR</strong><br>
    <small>Explora el <b>Desierto</b> y la <b>Tierra</b><br>Entra a la cabaña para ver el interior.</small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, sun;
let vaquero, piernaIzq, piernaDer, brazoIzq, brazoDer;
let houseRoof, particles = [];
const keys = {};

const config = {
    speed: 0.22,
    jumpForce: 0.35,
    gravity: 0.015,
    vY: 0,
    isJumping: false,
    walkCycle: 0,
    dayTime: 0 // Para el ciclo día/noche
};

function init() {
    scene = new THREE.Scene();
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ILUMINACIÓN DINÁMICA (SOL)
    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(50, 50, 50);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    crearTerrenoBiomas();
    crearVaquero();
    crearCasa(15, 0, -15);
    
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.mouseButtons = { ORBIT: THREE.MOUSE.RIGHT, ZOOM: THREE.MOUSE.MIDDLE, PAN: THREE.MOUSE.LEFT };
    controls.enableDamping = true;
    controls.rotateSpeed = 1.2;

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    window.addEventListener('resize', onWindowResize);
}

// 1. TERRENO CON BIOMAS (ARENA Y TIERRA)
function crearTerrenoBiomas() {
    const size = 600;
    const segments = 50;
    const geo = new THREE.PlaneGeometry(size, size, segments, segments);
    
    // Colores por vértice para biomas suaves
    const colors = [];
    const colorArena = new THREE.Color(0xd2b48c);
    const colorTierra = new THREE.Color(0x5d4037);
    
    const position = geo.attributes.position;
    for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const y = position.getY(i);
        // Usamos una función de ruido simple para mezclar biomas
        const noise = Math.sin(x * 0.02) * Math.cos(y * 0.02);
        const mixedColor = colorArena.clone().lerp(colorTierra, (noise + 1) / 2);
        colors.push(mixedColor.r, mixedColor.g, mixedColor.b);
    }
    
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.8 });
    const ground = new THREE.Mesh(geo, mat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
}

// 2. CASA CON INTERIOR (DETECCIÓN DE TECHO)
function crearCasa(x, y, z) {
    const houseGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x4e342e });
    
    // Paredes (Huecas)
    const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 8), woodMat);
    wallLeft.position.set(-4, 3, 0);
    const wallRight = wallLeft.clone(); wallRight.position.x = 4;
    const wallBack = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 0.5), woodMat);
    wallBack.position.set(0, 3, -4);
    
    // Techo (Pieza separada para ocultar)
    houseRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.5, 9), woodMat);
    houseRoof.position.set(0, 6, 0);
    houseRoof.castShadow = true;
    
    houseGroup.add(wallLeft, wallRight, wallBack, houseRoof);
    houseGroup.position.set(x, y, z);
    scene.add(houseGroup);
}

// 3. PARTÍCULAS DE POLVO
function emitirPolvo() {
    const pGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xbdc3c7, transparent: true, opacity: 0.6 });
    const p = new THREE.Mesh(pGeo, pMat);
    
    p.position.set(vaquero.position.x + (Math.random()-0.5), 0.1, vaquero.position.z + (Math.random()-0.5));
    p.life = 1.0; // Vida de la partícula
    scene.add(p);
    particles.push(p);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

    piernaIzq = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaDer = piernaIzq.clone(); piernaDer.position.x = 0.25;
    
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    
    brazoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoDer = brazoIzq.clone(); brazoDer.position.x = 0.65;
    
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), matPiel);
    head.position.y = 2.5;
    
    const hat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.08, 1.2), matCuero);
    hat.position.y = 2.85;
    
    vaquero.add(piernaIzq, piernaDer, torso, brazoIzq, brazoDer, head, hat);
    vaquero.traverse(n => n.castShadow = true);
    scene.add(vaquero);
}

function update() {
    let moving = false;
    const prevPos = vaquero.position.clone();

    if (keys['KeyW']) { vaquero.translateZ(-config.speed); moving = true; }
    if (keys['KeyS']) { vaquero.translateZ(config.speed); moving = true; }
    if (keys['KeyA']) { vaquero.rotation.y += 0.06; moving = true; }
    if (keys['KeyD']) { vaquero.rotation.y -= 0.06; moving = true; }

    // Animación y Polvo
    if (moving && !config.isJumping) {
        config.walkCycle += 0.2;
        piernaIzq.rotation.x = Math.sin(config.walkCycle) * 0.6;
        piernaDer.rotation.x = -Math.sin(config.walkCycle) * 0.6;
        brazoIzq.rotation.x = -Math.sin(config.walkCycle) * 0.4;
        brazoDer.rotation.x = Math.sin(config.walkCycle) * 0.4;
        emitirPolvo();
    }

    // Gravedad y Salto
    if (keys['Space'] && !config.isJumping) { config.vY = config.jumpForce; config.isJumping = true; }
    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) { vaquero.position.y = 0; config.isJumping = false; }
    }

    // CICLO DÍA/NOCHE (SOL DINÁMICO)
    config.dayTime += 0.005;
    sun.position.x = Math.sin(config.dayTime) * 100;
    sun.position.y = Math.cos(config.dayTime) * 100;
    scene.background.setHSL(0.55, 0.5, Math.max(0.2, Math.cos(config.dayTime) * 0.5 + 0.5));

    // DETECCIÓN DE INTERIOR (Ocultar Techo)
    const distToHouse = vaquero.position.distanceTo(new THREE.Vector3(15, 0, -15));
    if (distToHouse < 5) {
        houseRoof.material.transparent = true;
        houseRoof.material.opacity = 0.2;
    } else {
        houseRoof.material.opacity = 1.0;
    }

    // Partículas update
    particles.forEach((p, i) => {
        p.life -= 0.02;
        p.position.y += 0.02;
        p.material.opacity = p.life;
        if(p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
    });

    // Cámara Rígida
    camera.position.add(vaquero.position.clone().sub(prevPos));
    controls.target.copy(vaquero.position);
    controls.update();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
