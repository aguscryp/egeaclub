<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Pro - Cute Face & Fixed Camera</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
            backdrop-filter: blur(5px); z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY ENGINE PRO</strong><br>
    <small>Mover: <b>WASD</b> | Saltar: <b>Espacio</b><br>Cámara: <b>Arrastrar Mouse</b> | Zoom: <b>Rueda</b></small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let vaquero, piernaIzq, piernaDer, brazoIzq, brazoDer, houseRoof;
let obstacles = [];
const keys = {};

const config = {
    speed: 0.18,
    jumpForce: 0.28,
    gravity: 0.012,
    vY: 0,
    isJumping: false,
    walkCycle: 0,
    turnSpeed: 0.15 
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    // Posición inicial relativa al personaje
    camera.position.set(0, 6, 12); 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    scene.add(sun);

    crearTerreno();
    crearVaquero();
    crearCasa(15, 0, -15);
    
    // CONTROLES DE CÁMARA (OrbitControls mejorados)
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Suavizado
    controls.dampingFactor = 0.1;
    controls.enablePan = false; // Bloquear desplazamiento lateral
    
    // Configuración de Zoom (acercar/alejar)
    controls.enableZoom = true;
    controls.minDistance = 4;  // Mínimo acercamiento (casi primera persona)
    controls.maxDistance = 30; // Máximo alejamiento

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.addEventListener('resize', onWindowResize);
}

function crearTerreno() {
    const geo = new THREE.PlaneGeometry(500, 500);
    const mat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    const ground = new THREE.Mesh(geo, mat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
    const matNegro = new THREE.MeshStandardMaterial({ color: 0x000000 }); // Para ojos y boca

    // PIERNAS
    const legGeo = new THREE.BoxGeometry(0.35, 1, 0.35);
    piernaIzq = new THREE.Mesh(legGeo, matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaIzq.castShadow = true;
    piernaDer = piernaIzq.clone(); piernaDer.position.x = 0.25;
    
    // TORSO
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    torso.castShadow = true;
    
    // BRAZOS
    const armGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
    brazoIzq = new THREE.Mesh(armGeo, matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoIzq.castShadow = true;
    brazoDer = brazoIzq.clone(); brazoDer.position.x = 0.65;
    
    // CABEZA
    const headGeo = new THREE.BoxGeometry(0.65, 0.65, 0.65);
    const head = new THREE.Mesh(headGeo, matPiel);
    head.position.y = 2.5;
    head.castShadow = true;

    // --- LA CARA SONRIENTE Y BONITA ---
    const faceGroup = new THREE.Group();
    
    // Ojos (dos cubitos negros pequeños)
    const eyeGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const eyeIzq = new THREE.Mesh(eyeGeo, matNegro);
    eyeIzq.position.set(-0.15, 0.1, 0.33); // Profundidad 0.33 para que sobresalga un pelín de la cabeza (0.65/2)
    
    const eyeDer = eyeIzq.clone();
    eyeDer.position.x = 0.15;
    
    // Boca Sonriente (hecha de 3 cubitos para formar la curva "u")
    const mouthBlockGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    
    // Bloque central inferior
    const mouthCenter = new THREE.Mesh(mouthBlockGeo, matNegro);
    mouthCenter.position.set(0, -0.15, 0.33);
    
    // Bloque izquierdo (un poco más arriba)
    const mouthLeft = new THREE.Mesh(mouthBlockGeo, matNegro);
    mouthLeft.position.set(-0.1, -0.1, 0.33);
    
    // Bloque derecho (un poco más arriba)
    const mouthRight = mouthLeft.clone();
    mouthRight.position.x = 0.1;
    
    faceGroup.add(eyeIzq, eyeDer, mouthCenter, mouthLeft, mouthRight);
    head.add(faceGroup); // Pegamos la cara a la cabeza

    // SOMBRERO
    const hat = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 1.2), matCuero);
    hat.position.y = 2.85;

    vaquero.add(piernaIzq, piernaDer, torso, brazoIzq, brazoDer, head, hat);
    scene.add(vaquero);
}

function crearCasa(x, y, z) {
    const house = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    
    const walls = [
        { g: [0.5, 6, 8], p: [-4, 3, 0] },
        { g: [0.5, 6, 8], p: [4, 3, 0] },
        { g: [8, 6, 0.5], p: [0, 3, -4] }
    ];

    walls.forEach(w => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.g), mat);
        mesh.position.set(...w.p);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        house.add(mesh);
        const box = new THREE.Box3().setFromObject(mesh);
        obstacles.push(box);
    });
    
    houseRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, 9), mat);
    houseRoof.position.set(0, 6, 0);
    house.add(houseRoof);
    
    house.position.set(x, y, z);
    obstacles.forEach(box => box.translate(new THREE.Vector3(x, y, z)));
    scene.add(house);
}

function update() {
    // Guardar posición anterior para la cámara fija
    const posAnteriorVaquero = vaquero.position.clone();

    let moveX = 0;
    let moveZ = 0;

    if (keys['KeyW']) moveZ -= 1;
    if (keys['KeyS']) moveZ += 1;
    if (keys['KeyA']) moveX -= 1;
    if (keys['KeyD']) moveX += 1;

    if (moveX !== 0 || moveZ !== 0) {
        const angle = Math.atan2(camera.position.x - vaquero.position.x, camera.position.z - vaquero.position.z);
        const moveDir = new THREE.Vector3(moveX, 0, moveZ).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
        moveDir.normalize();

        const targetRotation = Math.atan2(moveDir.x, moveDir.z);
        // Interpolación angular suave para el giro
        let diff = targetRotation - vaquero.rotation.y;
        if (diff > Math.PI) diff -= Math.PI * 2;
        if (diff < -Math.PI) diff += Math.PI * 2;
        vaquero.rotation.y += diff * config.turnSpeed;

        const newPosX = vaquero.position.x + moveDir.x * config.speed;
        const newPosZ = vaquero.position.z + moveDir.z * config.speed;
        
        let collision = false;
        const playerBox = new THREE.Box3().setFromCenterAndSize(
            new THREE.Vector3(newPosX, 1, newPosZ),
            new THREE.Vector3(1, 2, 1)
        );

        for (let obs of obstacles) {
            if (playerBox.intersectsBox(obs)) { collision = true; break; }
        }

        if (!collision) {
            vaquero.position.x = newPosX;
            vaquero.position.z = newPosZ;
        }

        config.walkCycle += 0.2;
        piernaIzq.rotation.x = Math.sin(config.walkCycle) * 0.6;
        piernaDer.rotation.x = -Math.sin(config.walkCycle) * 0.6;
        brazoIzq.rotation.x = -Math.sin(config.walkCycle) * 0.4;
        brazoDer.rotation.x = Math.sin(config.walkCycle) * 0.4;
    } else {
        piernaIzq.rotation.x = THREE.MathUtils.lerp(piernaIzq.rotation.x, 0, 0.1);
        piernaDer.rotation.x = THREE.MathUtils.lerp(piernaDer.rotation.x, 0, 0.1);
    }

    if (keys['Space'] && !config.isJumping) { config.vY = config.jumpForce; config.isJumping = true; }
    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) { vaquero.position.y = 0; config.isJumping = false; }
    }

    const distToHouse = vaquero.position.distanceTo(new THREE.Vector3(15, 0, -15));
    houseRoof.material.transparent = true;
    houseRoof.material.opacity = (distToHouse < 5) ? 0.2 : 1.0;

    // --- CÁMARA FIJA QUE SIGUE Y PERMITE ZOOM ---
    // 1. Calculamos cuánto se movió el vaquero en este frame
    const desplazamientoVaquero = vaquero.position.clone().sub(posAnteriorVaquero);
    
    // 2. Movemos la cámara EXACTAMENTE la misma distancia.
    // Esto hace que la cámara "se pegue" al personaje y no se aleje al caminar.
    camera.position.add(desplazamientoVaquero);
    
    // 3. Actualizamos el objetivo de OrbitControls para que el centro de rotación y zoom sea el vaquero.
    // Esto te permite usar la rueda del mouse para alejarte o acercarte.
    controls.target.copy(vaquero.position);
    controls.update();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
