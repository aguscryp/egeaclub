<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Biome Engine - Realistic Terrain</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
            backdrop-filter: blur(8px);
        }
        b { color: #4ade80; }
    </style>
</head>
<body>

<div id="ui">
    <strong>BIOME EXPLORER 3D</strong><br>
    <small>Explorando: <b>Desierto y Praderas</b></small><br>
    <small>Usa <b>WASD</b> para viajar</small>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width, height;
const keys = {};

const player = {
    x: 1000, y: 1000, z: 0,
    angle: 0, speed: 6, rotSpeed: 0.045, walkCycle: 0,
    camDist: 220, camHeight: 90
};

// --- CONFIGURACIÓN DE BIOMAS ---
const BIOMES = {
    SAND:   { r: 236, g: 204, b: 162 }, // Arena
    GRASS:  { r: 76,  g: 175, b: 80  }, // Pasto Vivo
    DIRT:   { r: 121, g: 85,  b: 72  }, // Tierra/Pasto Seco
    FOREST: { r: 46,  g: 125, b: 50  }  // Bosque denso
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

// Función matemática simple para generar "ruido" de biomas (Pseudo-Random)
function getNoise(x, y) {
    let n = Math.sin(x * 0.001) + Math.sin(y * 0.001) + Math.cos(x * 0.0005 + y * 0.0005);
    return (n + 2) / 4; // Devuelve valor entre 0 y 1
}

function project(x, y, z) {
    let cx = player.x - Math.sin(player.angle) * player.camDist;
    let cy = player.y - Math.cos(player.angle) * player.camDist;
    let cz = player.z + player.camHeight;
    let dx = x - cx;
    let dy = y - cy;
    let rx = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let ry = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    let rz = cz - z; 
    if (ry < 15) return null;
    const fov = 750;
    const scale = fov / ry;
    return { x: width / 2 + rx * scale, y: height / 2 + rz * scale, scale: scale, depth: ry };
}

function drawRealisticTerrain() {
    const size = 100;
    const range = 14; 
    const px = Math.floor(player.x / size);
    const py = Math.floor(player.y / size);

    for (let j = py + range; j >= py - range; j--) { // Dibujar de atrás hacia adelante
        for (let i = px - range; i <= px + range; i++) {
            
            const p1 = project(i * size, j * size, 0);
            const p2 = project((i + 1) * size, j * size, 0);
            const p3 = project((i + 1) * size, (j + 1) * size, 0);
            const p4 = project(i * size, (j + 1) * size, 0);

            if (p1 && p2 && p3 && p4) {
                // Determinar Bioma basado en coordenadas mundiales
                const noise = getNoise(i * size, j * size);
                let color;
                
                if (noise < 0.3) color = BIOMES.SAND;
                else if (noise < 0.5) color = BIOMES.DIRT;
                else if (noise < 0.8) color = BIOMES.GRASS;
                else color = BIOMES.FOREST;

                // Aplicar sombra por distancia (niebla)
                const distFade = Math.min(1, 1500 / p1.depth);
                const r = color.r * distFade;
                const g = color.g * distFade;
                const b = color.b * distFade;

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.lineTo(p4.x, p4.y);
                ctx.closePath();

                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fill();

                // Detalle de grano/textura realista
                if (p1.depth < 800) {
                    ctx.fillStyle = "rgba(0,0,0,0.03)";
                    ctx.fillRect(p1.x + 10, p1.y + 10, 2, 2);
                }
            }
        }
    }
}

function drawCowboy() {
    const bob = Math.sin(player.walkCycle) * 4;
    const pos = project(player.x, player.y, 0);
    if (!pos) return;
    const s = pos.scale;

    // Sombra suave
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath(); ctx.ellipse(pos.x, pos.y, 22 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();

    // Cuerpo (Bloques con gradientes)
    ctx.fillStyle = "#3e2723"; // Piernas
    ctx.fillRect(pos.x - 10*s, pos.y - 15*s + bob, 8*s, 15*s);
    ctx.fillRect(pos.x + 2*s, pos.y - 15*s - bob, 8*s, 15*s);

    ctx.fillStyle = "#795548"; // Torso
    ctx.fillRect(pos.x - 14*s, pos.y - 38*s + bob, 28*s, 24*s);
    
    ctx.fillStyle = "#ffe0bd"; // Cabeza
    ctx.fillRect(pos.x - 7*s, pos.y - 52*s + bob, 14*s, 14*s);

    ctx.fillStyle = "#3e2723"; // Sombrero
    ctx.fillRect(pos.x - 20*s, pos.y - 54*s + bob, 40*s, 4*s);
    ctx.fillRect(pos.x - 11*s, pos.y - 64*s + bob, 22*s, 12*s);
}

function update() {
    if (keys['arrowleft']) player.angle -= player.rotSpeed;
    if (keys['arrowright']) player.angle += player.rotSpeed;
    let dx = 0, dy = 0;
    if (keys['w']) { dx = Math.sin(player.angle); dy = Math.cos(player.angle); }
    if (keys['s']) { dx = -Math.sin(player.angle); dy = -Math.cos(player.angle); }
    if (keys['a']) { dx = -Math.cos(player.angle); dy = Math.sin(player.angle); }
    if (keys['d']) { dx = Math.cos(player.angle); dy = -Math.sin(player.angle); }
    if (dx !== 0 || dy !== 0) {
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.walkCycle += 0.25;
    }
}

function loop() {
    // Cielo dinámico
    let skyGrad = ctx.createLinearGradient(0,0,0,height);
    skyGrad.addColorStop(0, "#1a2a6c");
    skyGrad.addColorStop(0.5, "#b21f1f");
    skyGrad.addColorStop(1, "#fdbb2d");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0,0,width,height);

    update();
    drawRealisticTerrain();
    drawCowboy();

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
