<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Cowboy Engine Pro - Realistic Movement</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
            backdrop-filter: blur(5px);
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <strong>COWBOY PRO SIMULATOR</strong><br>
    <small>Mover: <b>WASD</b> | Saltar: <b>Espacio</b><br>Girar Cámara: <b>Clic Derecho + Arrastrar</b></small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let vaquero, piernaIzq, piernaDer, brazoIzq, brazoDer;
const keys = {};

const config = {
    speed: 0.2,
    jumpForce: 0.3,
    gravity: 0.012,
    vY: 0,
    isJumping: false,
    walkCycle: 0
};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); 

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves realistas
    document.body.appendChild(renderer.domElement);

    // ILUMINACIÓN PRO
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    // Ajuste de resolución de sombra para diferenciar personaje del piso
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left = -50;
    sun.shadow.camera.right = 50;
    sun.shadow.camera.top = 50;
    sun.shadow.camera.bottom = -50;
    scene.add(sun);

    // SUELO CON TEXTURA DE CUADRÍCULA (Para mejor percepción 3D)
    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    const suelo = new THREE.Mesh(groundGeo, groundMat);
    suelo.rotation.x = -Math.PI / 2;
    suelo.receiveShadow = true;
    scene.add(suelo);

    crearVaquero();

    // CONTROLES DE CÁMARA OPTIMIZADOS
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.mouseButtons = {
        ORBIT: THREE.MOUSE.RIGHT, // Solo clic derecho para rotar
        ZOOM: THREE.MOUSE.MIDDLE,
        PAN: THREE.MOUSE.LEFT
    };
    controls.enableDamping = true;
    controls.dampingFactor = 0.1; // Rotación fluida
    controls.rotateSpeed = 1.5;   // Más rápido como pediste
    controls.minDistance = 8;
    controls.maxDistance = 40;

    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    window.addEventListener('resize', onWindowResize);
}

function crearVaquero() {
    vaquero = new THREE.Group();
    const matCuero = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
    const matCamisa = new THREE.MeshStandardMaterial({ color: 0x795548 });
    const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

    // PIERNAS INDEPENDIENTES
    const legGeo = new THREE.BoxGeometry(0.35, 1.0, 0.35);
    piernaIzq = new THREE.Mesh(legGeo, matCuero);
    piernaIzq.position.set(-0.25, 0.5, 0);
    piernaIzq.castShadow = true;
    
    piernaDer = piernaIzq.clone();
    piernaDer.position.x = 0.25;
    
    vaquero.add(piernaIzq, piernaDer);

    // TORSO
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), matCamisa);
    torso.position.y = 1.6;
    torso.castShadow = true;
    vaquero.add(torso);

    // BRAZOS INDEPENDIENTES
    const armGeo = new THREE.BoxGeometry(0.3, 1.0, 0.3);
    brazoIzq = new THREE.Mesh(armGeo, matCamisa);
    brazoIzq.position.set(-0.65, 1.7, 0);
    brazoIzq.castShadow = true;
    
    brazoDer = brazoIzq.clone();
    brazoDer.position.x = 0.65;
    vaquero.add(brazoIzq, brazoDer);

    // CABEZA Y SOMBRERO
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), matPiel);
    head.position.y = 2.5;
    head.castShadow = true;
    vaquero.add(head);

    const hatBrim = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.08, 1.2), matCuero);
    hatBrim.position.y = 2.85;
    const hatTop = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.6), matCuero);
    hatTop.position.y = 3.1;
    hatBrim.castShadow = true;
    vaquero.add(hatBrim, hatTop);

    scene.add(vaquero);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function update() {
    let isMoving = false;
    const prevPos = vaquero.position.clone();

    // MOVIMIENTO WASD
    if (keys['KeyW']) { vaquero.translateZ(-config.speed); isMoving = true; }
    if (keys['KeyS']) { vaquero.translateZ(config.speed); isMoving = true; }
    if (keys['KeyA']) { vaquero.rotation.y += 0.06; isMoving = true; }
    if (keys['KeyD']) { vaquero.rotation.y -= 0.06; isMoving = true; }

    // ANIMACIÓN DE CAMINATA REALISTA
    if (isMoving && !config.isJumping) {
        config.walkCycle += 0.18;
        const swing = Math.sin(config.walkCycle) * 0.5;
        
        // Piernas cruzadas (estilo caminar humano)
        piernaIzq.rotation.x = swing;
        piernaDer.rotation.x = -swing;
        
        // Brazos opuestos a las piernas
        brazoIzq.rotation.x = -swing * 0.8;
        brazoDer.rotation.x = swing * 0.8;
        
        // Rebote leve en el cuerpo
        vaquero.position.y = Math.abs(Math.cos(config.walkCycle)) * 0.1;
    } else {
        // Reset posición natural
        piernaIzq.rotation.x = piernaDer.rotation.x = 0;
        brazoIzq.rotation.x = brazoDer.rotation.x = 0;
    }

    // SALTO
    if (keys['Space'] && !config.isJumping) {
        config.vY = config.jumpForce;
        config.isJumping = true;
    }

    if (config.isJumping) {
        vaquero.position.y += config.vY;
        config.vY -= config.gravity;
        if (vaquero.position.y <= 0) {
            vaquero.position.y = 0;
            config.isJumping = false;
        }
    }

    // CÁMARA DE SEGUIMIENTO RÍGIDO
    // 1. Calculamos la diferencia de posición del vaquero
    const delta = vaquero.position.clone().sub(prevPos);
    // 2. Movemos la cámara la misma distancia que el vaquero para que no se aleje
    camera.position.add(delta);
    // 3. Forzamos a la cámara a mirar siempre al vaquero
    controls.target.copy(vaquero.position);
    controls.update();
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
