<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Persistente | Agustín Pro</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid #ff007f;
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        .instrucciones {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6); color: #fff; padding: 10px;
            font-size: 11px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre" style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">OPERADOR</div>
        <div style="font-size: 10px; color: #00d4ff; margin-top:5px;">CÁMARA LIBRE ACTIVA</div>
    </div>

    <div class="instrucciones">
        WASD: Mover | CLICK IZQ: Cavar | CLICK DER: Girar Cámara | RUEDITA: Zoom | ESPACIO: Saltar
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let pIzq, pDer, bIzq, bDer, torso;
        let keys = {};
        let velocityY = 0; 
        let isGrounded = true;
        
        let zoomDistance = 35;
        let camRotationY = 0;
        let camRotationX = 0.5;
        let isRightClickDown = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 100, 1500);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // SUELO
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#3d4d21"; 
            ctx.fillRect(0,0,512,512);
            for(let i=0; i<15000; i++) {
                ctx.fillStyle = `rgba(40, 30, 10, ${Math.random() * 0.3})`; 
                ctx.fillRect(Math.random()*512, Math.random()*512, 3, 3);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(150, 150);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(15000, 15000),
                new THREE.MeshStandardMaterial({ map: texture, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // PERSONAJE
            const saved = localStorage.getItem('playerConfig');
            const config = saved ? JSON.parse(saved) : { color: "#ff007f", musculo: 1, altura: 1 };
            document.getElementById('p-nombre').innerText = (localStorage.getItem('currentUser') || "AGUSTÍN").toUpperCase();
            buildVaquero(config);

            // --- MOTOR DE RENDERIZADO DE ELEMENTOR ---
            cargarCiudad();

            // EVENTOS
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('wheel', e => {
                zoomDistance += e.deltaY * 0.05;
                zoomDistance = Math.max(5, Math.min(300, zoomDistance));
            });
            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('mousedown', e => { if(e.button === 2) isRightClickDown = true; });
            window.addEventListener('mouseup', e => { if(e.button === 2) isRightClickDown = false; });
            window.addEventListener('mousemove', e => {
                if(isRightClickDown) {
                    camRotationY -= e.movementX * 0.01;
                    camRotationX += e.movementY * 0.01;
                    camRotationX = Math.max(0.05, Math.min(1.5, camRotationX));
                }
            });
            window.addEventListener('click', (e) => { if(e.button === 0) cavarPozo(); });

            animate();
        }

        // FUNCIÓN CLAVE: Construye los modelos detallados que vienen del Elementor
        function createDetailedModel(type) {
            const group = new THREE.Group();
            const mat = (c) => new THREE.MeshStandardMaterial({ color: c });

            if(type === 'calle') {
                const asfalto = new THREE.Mesh(new THREE.BoxGeometry(50, 0.4, 50), mat(0x111111));
                const linea = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 50), mat(0xffff00));
                group.add(asfalto, linea);
            } 
            else if(type === 'sw4') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(9, 4, 18), mat(0xffffff));
                body.position.y = 3;
                const glass = new THREE.Mesh(new THREE.BoxGeometry(8, 2.5, 7), mat(0x222222));
                glass.position.set(0, 5, -1);
                group.add(body, glass);
                // Ruedas
                const rGeo = new THREE.CylinderGeometry(1.5, 1.5, 1, 12);
                for(let i=0; i<4; i++) {
                    const r = new THREE.Mesh(rGeo, mat(0x111111));
                    r.rotation.z = Math.PI/2;
                    r.position.set(i%2?4.5:-4.5, 1.5, i<2?6:-6);
                    group.add(r);
                }
            } 
            else if(type === 'porton') {
                const p1 = new THREE.Mesh(new THREE.BoxGeometry(4, 30, 4), mat(0x333333));
                const p2 = p1.clone(); p1.position.x = -20; p2.position.x = 20;
                const barra = new THREE.Mesh(new THREE.BoxGeometry(40, 2, 2), mat(0x00d4ff));
                barra.position.y = 25;
                group.add(p1, p2, barra);
            } 
            else if(type === 'luz_led') {
                const poste = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 40), mat(0x333333));
                poste.position.y = 20;
                const cabeza = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 6), mat(0xffffff));
                cabeza.position.set(0, 40, 2);
                group.add(poste, cabeza);
            }
            else if(type === 'palmera') {
                const t = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 25), mat(0x4b3621));
                t.position.y = 12.5;
                const c = new THREE.Mesh(new THREE.SphereGeometry(7, 8, 8), mat(0x228b22));
                c.position.y = 25;
                group.add(t, c);
            }
            else if(type === 'vereda') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(50, 1, 12), mat(0x666666)));
            }
            else if(type === 'pino') {
                const tr = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 5), mat(0x3d2b1f));
                const co = new THREE.Mesh(new THREE.ConeGeometry(8, 20, 8), mat(0x0b3d0b));
                co.position.y = 12.5;
                group.add(tr, co);
            }

            return group;
        }

        function cargarCiudad() {
            const elData = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            elData.forEach(item => {
                const model = createDetailedModel(item.type);
                model.position.set(item.pos.x, 0, item.pos.z);
                scene.add(model);
            });
        }

        function buildVaquero(config) {
            vaquero = new THREE.Group();
            const matColor = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            const m = parseFloat(config.musculo);
            
            torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matColor);
            torso.position.y = 1.6;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;

            const geoExt = new THREE.BoxGeometry(0.3 * m, 0.9, 0.3 * m);
            pIzq = new THREE.Mesh(geoExt, matColor); pIzq.position.set(-0.25, 0.5, 0);
            pDer = new THREE.Mesh(geoExt, matColor); pDer.position.set(0.25, 0.5, 0);
            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25 * m, 1, 0.25 * m), matPiel); bIzq.position.set(-0.6, 1.7, 0);
            bDer = new THREE.Mesh(new THREE.BoxGeometry(0.25 * m, 1, 0.25 * m), matPiel); bDer.position.set(0.6, 1.7, 0);

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            vaquero.scale.set(1, parseFloat(config.altura), 1);
            scene.add(vaquero);
        }

        function cavarPozo() {
            const pozo = new THREE.Mesh(new THREE.CircleGeometry(2, 32), new THREE.MeshBasicMaterial({ color: 0x1a0f00 }));
            pozo.rotation.x = -Math.PI / 2;
            pozo.position.set(vaquero.position.x, 0.05, vaquero.position.z);
            scene.add(pozo);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = Date.now() * 0.005;
            
            if(vaquero) {
                const isMoving = keys['KeyW'] || keys['KeyS'];
                const speed = (keys['ShiftLeft'] ? 65 : 35) * delta;
                
                if(keys['KeyW']) vaquero.translateZ(speed);
                if(keys['KeyS']) vaquero.translateZ(-speed);
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                const animSpeed = isMoving ? 2.5 : 0.5;
                const animAmp = isMoving ? 0.7 : 0.1;
                bIzq.rotation.x = Math.sin(time * animSpeed) * animAmp;
                bDer.rotation.x = -Math.sin(time * animSpeed) * animAmp;
                pIzq.rotation.x = -Math.sin(time * animSpeed) * animAmp;
                pDer.rotation.x = Math.sin(time * animSpeed) * animAmp;

                if(keys['Space'] && isGrounded) { velocityY = 1.3; isGrounded = false; }
                if(!isGrounded) {
                    velocityY -= 0.07;
                    vaquero.position.y += velocityY;
                    if(vaquero.position.y <= 0) { vaquero.position.y = 0; isGrounded = true; }
                }

                const x = vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX);
                const y = vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 5;
                const z = vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX);

                camera.position.set(x, y, z);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 3, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
