<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Persistente | Agustín Pro</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 15px;
            background: rgba(0,0,0,0.8); border-left: 5px solid #ff007f;
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        .instrucciones {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); color: #fff; padding: 10px;
            font-size: 11px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre" style="font-weight: bold; font-size: 18px;">OPERADOR</div>
        <div style="font-size: 10px; color: #00d4ff;">EQUIPAMIENTO: PALA ACTIVA</div>
    </div>

    <div class="instrucciones">
        WASD: Mover | ESPACIO: Salto | CLICK: Cavar Pozo | RUEDITA: Zoom
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let keys = {};
        let velocityY = 0; 
        let isGrounded = true;
        let zoomDistance = 35; // Distancia inicial para el zoom

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 1000);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 300, 100);
            scene.add(sun);

            // 1. EL SUELO (TIERRA/PASTO REALISTA)
            // Usamos un Canvas dinámico para crear una textura de "ruido" y que no sea un color liso
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            for(let i=0; i<10000; i++) {
                ctx.fillStyle = `rgb(61, ${70 + Math.random()*20}, 33)`;
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(100, 100);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(10000, 10000),
                new THREE.MeshStandardMaterial({ map: texture, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 2. PERSONAJE (Cargado de perfil.html)
            const config = JSON.parse(localStorage.getItem('playerConfig')) || { color: "#ff007f", musculo: 1, altura: 1 };
            document.getElementById('p-nombre').innerText = (localStorage.getItem('currentUser') || "AGUSTÍN").toUpperCase();
            buildVaquero(config);

            // 3. ELEMENTOR (Carga de elementor.html)
            sincronizarElementor();

            // EVENTOS
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            // ZOOM CON RUEDITA
            window.addEventListener('wheel', e => {
                zoomDistance += e.deltaY * 0.05;
                zoomDistance = Math.max(15, Math.min(100, zoomDistance)); // Límites de zoom
            });

            // PALA (Click para cavar)
            window.addEventListener('click', () => cavarPozo());

            animate();
        }

        function buildVaquero(config) {
            vaquero = new THREE.Group();
            const matColor = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matColor);
            torso.position.y = 1.6;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;

            vaquero.add(torso, cabeza);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        function sincronizarElementor() {
            // Lee los elementos agregados en elementor.html
            const data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.forEach(item => {
                const geo = item.type === 'calle' ? new THREE.BoxGeometry(50, 0.2, 50) : new THREE.BoxGeometry(10, 20, 10);
                const mat = new THREE.MeshStandardMaterial({ color: item.type === 'calle' ? 0x222222 : 0x777777 });
                const obj = new THREE.Mesh(geo, mat);
                obj.position.set(item.pos.x, item.type === 'calle' ? 0.1 : 10, item.pos.z);
                scene.add(obj);
            });
        }

        function cavarPozo() {
            // Crea un "pozo" (un círculo oscuro en el suelo) en la posición del jugador
            const pozoGeo = new THREE.CircleGeometry(2, 32);
            const pozoMat = new THREE.MeshBasicMaterial({ color: 0x1a0f00 }); // Color tierra profunda
            const pozo = new THREE.Mesh(pozoGeo, pozoMat);
            pozo.rotation.x = -Math.PI / 2;
            pozo.position.set(vaquero.position.x, 0.15, vaquero.position.z);
            scene.add(pozo);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if(vaquero) {
                const speed = (keys['ShiftLeft'] ? 60 : 30) * delta;
                
                // MOVIMIENTO Y GIRO
                if(keys['KeyW']) vaquero.translateZ(speed);
                if(keys['KeyS']) vaquero.translateZ(-speed);
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                // SISTEMA DE SALTO
                if(keys['Space'] && isGrounded) {
                    velocityY = 1.2; 
                    isGrounded = false;
                }

                if(!isGrounded) {
                    velocityY -= 0.05; // Gravedad
                    vaquero.position.y += velocityY;
                    if(vaquero.position.y <= 0) {
                        vaquero.position.y = 0;
                        isGrounded = true;
                        velocityY = 0;
                    }
                }

                // CÁMARA CON ZOOM Y SEGUIMIENTO
                const offset = new THREE.Vector3(0, zoomDistance * 0.4, -zoomDistance);
                const worldOffset = offset.applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(worldOffset, 0.1);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 5, vaquero.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
