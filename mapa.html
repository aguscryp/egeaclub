<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo 4D | Agustín</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="mapalisto.js"></script>
    <script src="fabrica.js"></script>
    <script src="zapatillas.js"></script>
    <script>
        let scene, camera, renderer, vaquero, clock = new THREE.Clock(), keys = {};
        let walkCycle = 0;

        function init() {
            scene = new THREE.Scene();
            // LECTURA MAPALISTO
            scene.background = new THREE.Color(MundoConfig.ambiente.niebla.color);
            scene.fog = new THREE.FogExp2(MundoConfig.ambiente.niebla.color, MundoConfig.ambiente.niebla.densidad);
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

            // PASTO SAGRADO
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(50000, 50000), new THREE.MeshStandardMaterial({color: MundoConfig.terreno.colorPasto}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            cargarPersonaje();
            cargarCiudad();

            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 40000);
            
            window.onkeydown = e => keys[e.code] = true;
            window.onkeyup = e => keys[e.code] = false;
            animate();
        }

        function cargarPersonaje() {
            const config = JSON.parse(localStorage.getItem('playerConfig')) || {color: "#ff007f", zapato: "nike_tn", musculo: 1, altura: 1};
            vaquero = new THREE.Group();
            const m = parseFloat(config.musculo);
            const matR = new THREE.MeshStandardMaterial({color: config.color});
            const matP = new THREE.MeshStandardMaterial({color: 0xffe0bd});

            const torso = new THREE.Mesh(new THREE.BoxGeometry(4*m, 6, 2.5), matR); torso.position.y = 8;
            const cab = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), matP); cab.position.y = 12.5;
            const pI = new THREE.Group(); const pD = new THREE.Group();
            const pierna = new THREE.Mesh(new THREE.BoxGeometry(1.6*m, 5, 1.6), matR);
            pI.add(pierna.clone()); pD.add(pierna.clone());
            pI.position.set(-1.2*m, 2.5, 0); pD.position.set(1.2*m, 2.5, 0);

            // SINCRONIZACIÓN ZAPATILLAS (ESCALA MAPA)
            const zI = GaleriaZapatillas[config.zapato](config.color);
            const zD = GaleriaZapatillas[config.zapato](config.color);
            zI.scale.set(5, 5, 5); zD.scale.set(5, 5, 5); // Escala para el mapa
            zI.position.y = -2.5; zD.position.y = -2.5;
            pI.add(zI); pD.add(zD);

            vaquero.add(torso, cab, pI, pD);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        function cargarCiudad() {
            const ciudad = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            ciudad.forEach(item => {
                if(item.type !== 'suelo' && typeof Fabrica !== 'undefined') {
                    const obj = Fabrica.crear(item.type);
                    obj.position.set(item.pos.x, 0.1, item.pos.z);
                    scene.add(obj);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(vaquero) {
                let isMoving = false;
                const spd = (keys['ShiftLeft'] ? 180 : 90) * delta;
                if(keys['KeyW']) { vaquero.translateZ(spd); isMoving = true; }
                if(keys['KeyS']) { vaquero.translateZ(-spd); isMoving = true; }
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                const pI = vaquero.children[2], pD = vaquero.children[3];
                if(isMoving) {
                    walkCycle += (keys['ShiftLeft'] ? 0.3 : 0.18);
                    pI.rotation.x = Math.sin(walkCycle) * 0.7;
                    pD.rotation.x = -Math.sin(walkCycle) * 0.7;
                } else {
                    pI.rotation.x *= 0.9; pD.rotation.x *= 0.9;
                }

                camera.position.lerp(new THREE.Vector3(vaquero.position.x, vaquero.position.y + 60, vaquero.position.z + 120), 0.1);
                camera.lookAt(vaquero.position);
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
