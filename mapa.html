<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>City View | Ciudad Finalizada</title>
    <style>
        :root { --pink: #ff007f; --cyan: #00d4ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* UI de Información */
        #ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; z-index: 10;
        }
        .logo { color: var(--pink); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; font-size: 18px; }
        .stats { color: var(--cyan); font-size: 12px; text-transform: uppercase; }

        /* Pantalla de carga */
        #loader {
            position: fixed; inset: 0; background: #050505;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.5s;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: var(--pink); margin-top: 20px; letter-spacing: 2px;">SINCRONIZANDO CIUDAD...</p>
    </div>

    <div id="ui-header">
        <div class="logo">AGUSTÍN <span style="color:white">CITY</span></div>
        <div class="stats" id="obj-count">Entidades: 0</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls;
        const loader = new THREE.GLTFLoader();

        // Mapeo de modelos para que coincidan con el constructor
        const ASSETS = {
            'casa': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/SheenChair.glb',
            'edificio': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Buildings.glb',
            'carro_comun': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Car.glb',
            'camion_carga': 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb'
        };

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            // Niebla para dar profundidad realista
            scene.fog = new THREE.FogExp2(0x020202, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.set(300, 200, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Iluminación Cinematic
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 250);
            scene.add(sun);

            // Luces de acento neón (Opcional para ambiente Pink Pro)
            const pinkLight = new THREE.PointLight(0xff007f, 1, 500);
            pinkLight.position.set(0, 50, 0);
            scene.add(pinkLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false; // Cambiar a true si quieres que la ciudad gire sola

            await loadSavedCity();

            // Quitar pantalla de carga
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);

            animate();
        }

        async function loadSavedCity() {
            const data = localStorage.getItem('ciudad_data');
            if (!data) return;

            const objects = JSON.parse(data);
            document.getElementById('obj-count').innerText = `Entidades: ${objects.length}`;

            for (const item of objects) {
                await spawnEntity(item);
            }
        }

        function spawnEntity(item) {
            return new Promise((resolve) => {
                const url = ASSETS[item.type];
                
                if (url) {
                    loader.load(url, (gltf) => {
                        const model = gltf.scene;
                        model.position.set(item.pos.x, item.pos.y, item.pos.z);
                        model.rotation.y = item.rot;
                        
                        // Ajuste de escalas idéntico al constructor
                        if(item.type === 'carro_comun') model.scale.set(10, 10, 10);
                        if(item.type === 'camion_carga') model.scale.set(8, 8, 8);
                        if(item.type === 'edificio') model.scale.set(50, 50, 50);

                        scene.add(model);
                        resolve();
                    });
                } else if (item.type === 'calle') {
                    // Re-crear calle por código
                    const group = new THREE.Group();
                    const asf = new THREE.Mesh(new THREE.BoxGeometry(40, 0.2, 40), new THREE.MeshStandardMaterial({color: 0x111111}));
                    const linea = new THREE.Mesh(new THREE.PlaneGeometry(1, 40), new THREE.MeshStandardMaterial({color: 0xffcc00}));
                    linea.rotation.x = -Math.PI/2; linea.position.y = 0.11;
                    group.add(asf, linea);
                    group.position.set(item.pos.x, item.pos.y, item.pos.z);
                    group.rotation.y = item.rot;
                    scene.add(group);
                    resolve();
                } else {
                    resolve();
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
