<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Despliegue | Cowboy Engine</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud-operador {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid #ff007f;
            color: white; z-index: 100; border-radius: 0 15px 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .stat-bar { font-size: 10px; color: #ff007f; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="hud-operador">
        <div id="nombre-hud" style="font-weight: bold; font-size: 20px; letter-spacing: 2px;">OPERADOR</div>
        <div class="stat-bar">SISTEMA BIO-MÉTRICO: <span style="color: #00d4ff;">ACTIVO</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // CIELO CELESTE
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // LUCES NATURALES
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // EL SUELO VERDE
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(10000, 10000),
                new THREE.MeshStandardMaterial({ color: 0x228B22 }) // VERDE PASTO
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // --- CARGAR PERSONAJE DESDE TU PERFIL.HTML ---
            const savedConfig = localStorage.getItem('playerConfig'); // LA LLAVE QUE USA TU PERFIL
            const config = savedConfig ? JSON.parse(savedConfig) : { color: "#ff007f", musculo: 1, altura: 1 };
            
            document.getElementById('nombre-hud').innerText = (localStorage.getItem('currentUser') || "AGUSTÍN").toUpperCase();

            buildPlayer(config);
            cargarEstructuras(); // Carga lo de construccion.html

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function buildPlayer(config) {
            vaquero = new THREE.Group();
            const matColor = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

            // Torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matColor);
            torso.position.y = 1.6;

            // Cabeza
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;

            // Extremidades
            const geoExt = new THREE.BoxGeometry(0.3, 0.9, 0.3);
            const pIzq = new THREE.Mesh(geoExt, matColor); pIzq.position.set(-0.25, 0.5, 0);
            const pDer = new THREE.Mesh(geoExt, matColor); pDer.position.set(0.25, 0.5, 0);
            const bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matPiel); bIzq.position.set(-0.6, 1.7, 0);
            const bDer = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matPiel); bDer.position.set(0.6, 1.7, 0);

            // Aplicar Musculatura de tu Perfil
            const m = parseFloat(config.musculo);
            bIzq.scale.set(m, 1, m); bDer.scale.set(m, 1, m);
            pIzq.scale.set(m, 1, m); pDer.scale.set(m, 1, m);

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            
            // Aplicar Altura de tu Perfil
            vaquero.scale.y = parseFloat(config.altura);
            
            scene.add(vaquero);
        }

        function cargarEstructuras() {
            const data = JSON.parse(localStorage.getItem('ciudad_db')) || [];
            data.forEach(item => {
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(item.type === 'calle' ? 40 : 10, item.type === 'calle' ? 1 : 20, 10),
                    new THREE.MeshStandardMaterial({ color: item.type === 'calle' ? 0x333333 : 0x888888 })
                );
                box.position.set(item.pos.x, item.type === 'calle' ? 0.2 : 10, item.pos.z);
                scene.add(box);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if(vaquero) {
                const moveSpeed = 40 * delta;
                const rotSpeed = 3 * delta;

                if(keys['KeyW']) vaquero.translateZ(moveSpeed);
                if(keys['KeyS']) vaquero.translateZ(-moveSpeed);
                if(keys['KeyA']) vaquero.rotation.y += rotSpeed;
                if(keys['KeyD']) vaquero.rotation.y -= rotSpeed;

                // Cámara 3ra Persona
                const offset = new THREE.Vector3(0, 10, -25);
                const worldOffset = offset.applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(worldOffset, 0.1);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 2, vaquero.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
