<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agustín Engine | Sincronización Total</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #hud-global {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(10, 10, 10, 0.9); padding: 20px; 
            border-left: 5px solid #ff007f; border-radius: 0 10px 10px 0;
            z-index: 100; backdrop-filter: blur(5px);
        }
        .tag { color: #888; font-size: 10px; text-transform: uppercase; display: block; }
        .val { color: #ff007f; font-weight: bold; font-size: 16px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div id="hud-global">
        <span class="tag">Operador Sincronizado</span>
        <span class="val" id="p-name">CARGANDO...</span>
        <span class="tag">Leyes de Mundo</span>
        <span class="val">MAPALISTO.JS [ACTIVO]</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="mapalisto.js"></script>
    <script src="fabrica.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let nubes = [], particulasSistema, keys = {};
        let walkCycle = 0;
        let zoomDist = 120, camRotY = 0, camRotX = 0.5;

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            // --- LECTURA DE MAPALISTO.JS ---
            scene.background = new THREE.Color(MundoConfig.ambiente.niebla.color);
            scene.fog = new THREE.FogExp2(MundoConfig.ambiente.niebla.color, MundoConfig.ambiente.niebla.densidad);
            
            const sun = new THREE.DirectionalLight(MundoConfig.ambiente.iluminacion.sol.color, MundoConfig.ambiente.iluminacion.sol.intensidad);
            sun.position.set(...MundoConfig.ambiente.iluminacion.sol.pos);
            scene.add(sun, new THREE.AmbientLight(MundoConfig.ambiente.iluminacion.ambiente.color, MundoConfig.ambiente.iluminacion.ambiente.intensidad));

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(MundoConfig.terreno.size, MundoConfig.terreno.size),
                new THREE.MeshStandardMaterial({ color: MundoConfig.terreno.colorPasto })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Atmosfera 4D definida en mapalisto
            generarAtmosfera();

            // --- LECTURA DE PERFIL.HTML (Configuración Absoluta) ---
            sincronizarPersonajeDesdePerfil();

            // --- LECTURA DE ELEMENTOR.HTML (Objetos Guardados) ---
            sincronizarObjetosDesdeElementor();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 40000);
            
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            animate();
        }

        function sincronizarPersonajeDesdePerfil() {
            const config = JSON.parse(localStorage.getItem('playerConfig'));
            if(!config) return;

            document.getElementById('p-name').innerText = (localStorage.getItem('currentUser') || "AGUSTÍN").toUpperCase();
            
            vaquero = new THREE.Group();
            const m = parseFloat(config.musculo);
            const matRopa = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

            // Construcción fiel a perfil.html
            const torso = new THREE.Mesh(new THREE.BoxGeometry(4*m, 6, 2.5*m), matRopa); torso.position.y = 8;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), matPiel); cabeza.position.y = 12.5;
            const pI = new THREE.Group(); const pD = new THREE.Group();
            const piernaMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6*m, 5, 1.6*m), matRopa);
            pI.add(piernaMesh.clone()); pD.add(piernaMesh.clone());
            pI.position.set(-1.2*m, 2.5, 0); pD.position.set(1.2*m, 2.5, 0);
            
            // Si el perfil eligió Nike TN, las ponemos
            if(config.zapato === 'nike_tn') {
                const crearNike = () => {
                    const g = new THREE.Group();
                    const b = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({color: 0x111111}));
                    const s = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.3, 3.1), new THREE.MeshStandardMaterial({
                        color: config.color, emissive: config.color, emissiveIntensity: 2
                    }));
                    s.position.y = -0.5; g.add(b, s); g.position.y = -2.5;
                    return g;
                };
                pI.add(crearNike()); pD.add(crearNike());
            }

            const bI = new THREE.Mesh(new THREE.BoxGeometry(1.3*m, 5, 1.3*m), matPiel); bI.position.set(-3*m, 8.5, 0);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(1.3*m, 5, 1.3*m), matPiel); bD.position.set(3*m, 8.5, 0);

            vaquero.add(torso, cabeza, pI, pD, bI, bD);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        function sincronizarObjetosDesdeElementor() {
            const ciudad = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            ciudad.forEach(item => {
                // El mapa solo acepta objetos que NO sean suelos (para respetar mapalisto)
                if(item.type !== 'suelo' && item.type !== 'calle_base') {
                    if(typeof Fabrica !== 'undefined') {
                        const obj = Fabrica.crear(item.type);
                        obj.position.set(item.pos.x, 0.1, item.pos.z);
                        scene.add(obj);
                    }
                }
            });
        }

        function generarAtmosfera() {
            // Nubes dinámicas según mapalisto.js
            const nubeGeo = new THREE.SphereGeometry(1, 8, 8);
            for(let i = 0; i < MundoConfig.clima.nubes.cantidad; i++) {
                const n = new THREE.Mesh(nubeGeo, new THREE.MeshStandardMaterial({ color: MundoConfig.clima.nubes.color, transparent: true, opacity: 0.7 }));
                n.scale.set(Math.random()*60+30, 15, Math.random()*40+20);
                n.position.set((Math.random()-0.5)*15000, MundoConfig.clima.nubes.alturaBase, (Math.random()-0.5)*15000);
                scene.add(n);
                nubes.push(n);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movimiento 4D
            nubes.forEach(n => {
                n.position.z += MundoConfig.clima.nubes.velocidad * 100 * delta;
                if(n.position.z > 8000) n.position.z = -8000;
            });

            // Movimiento Agustín y sus animaciones
            if(vaquero) {
                let isMoving = false;
                const spd = (keys['ShiftLeft'] ? 180 : 90) * delta;
                if(keys['KeyW']) { vaquero.translateZ(spd); isMoving = true; }
                if(keys['KeyS']) { vaquero.translateZ(-spd); isMoving = true; }
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                const pI = vaquero.children[2], pD = vaquero.children[3], bI = vaquero.children[4], bD = vaquero.children[5];
                if(isMoving) {
                    walkCycle += (keys['ShiftLeft'] ? 0.3 : 0.18);
                    pI.rotation.x = Math.sin(walkCycle) * 0.7;
                    pD.rotation.x = -Math.sin(walkCycle) * 0.7;
                    bI.rotation.x = -Math.sin(walkCycle) * 0.7;
                    bD.rotation.x = Math.sin(walkCycle) * 0.7;
                } else {
                    [pI, pD, bI, bD].forEach(p => p.rotation.x *= 0.9);
                }

                camera.position.lerp(new THREE.Vector3(
                    vaquero.position.x + zoomDist * Math.sin(camRotY),
                    vaquero.position.y + 60,
                    vaquero.position.z + zoomDist * Math.cos(camRotY)
                ), 0.1);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
