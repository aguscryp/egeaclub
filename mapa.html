<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre TOTAL - Cowboy Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(10, 10, 10, 0.9); color: #ff007f; 
            padding: 15px; border-radius: 12px; border: 2px solid #ff007f; 
            z-index: 100; box-shadow: 0 0 15px #ff007f;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold;">OPERADOR: <span id="pName"></span></div>
        <small>WASD para mover | Mouse para rotar</small>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- TODO EL MOTOR AQUÍ DENTRO ---
        let scene, camera, renderer, controls, vaquero;
        const keys = {};

        function init() {
            // 1. ESCENA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // AZUL CIELO

            // 2. CÁMARA
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 10, 25);

            // 3. RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. LUCES (Vital para que no se vea negro)
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // 5. SUELO VERDE (PASTO)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshStandardMaterial({ color: 0x4caf50 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 6. CASA DE REFERENCIA
            const casa = new THREE.Group();
            const walls = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            walls.position.y = 3;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(9, 5, 4), new THREE.MeshStandardMaterial({color: 0x3e2723}));
            roof.position.y = 8.5; roof.rotation.y = Math.PI/4;
            casa.add(walls, roof);
            casa.position.set(-20, 0, -20);
            scene.add(casa);

            // 7. PERSONAJE (VAQUERO)
            const playerConfig = JSON.parse(localStorage.getItem('playerConfig')) || { color: '#ff007f' };
            vaquero = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.3, 0.6), new THREE.MeshStandardMaterial({color: playerConfig.color}));
            torso.position.y = 1.65;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffe0bd}));
            cabeza.position.y = 2.6;
            vaquero.add(torso, cabeza);
            scene.add(vaquero);

            // 8. CONTROLES
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // EVENTOS
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);

            document.getElementById('pName').innerText = localStorage.getItem('currentUser') || "Agustín";

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if(vaquero) {
                const speed = 0.3;
                if(keys['KeyW']) vaquero.translateZ(speed);
                if(keys['KeyS']) vaquero.translateZ(-speed);
                if(keys['KeyA']) vaquero.rotation.y += 0.05;
                if(keys['KeyD']) vaquero.rotation.y -= 0.05;

                // Cámara seguimiento suave
                const offset = new THREE.Vector3(0, 8, 15);
                const camPos = offset.applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(camPos, 0.1);
                controls.target.lerp(vaquero.position, 0.1);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Arrancar
        init();
    </script>
</body>
</html>
