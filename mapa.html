<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Integrado | Agustín</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; }
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid var(--pink);
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        #prompt {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--pink); color: white; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; display: none; z-index: 100;
            box-shadow: 0 0 20px var(--pink); border: 2px solid white;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre">OPERADOR</div>
        <div id="p-estado" style="color: var(--neon);">A PIE</div>
    </div>

    <div id="prompt">PRESIONA [F] PARA CONDUCIR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let keys = {};
        let zoomDistance = 120, camRotationY = 0, camRotationX = 0.5, isRightClickDown = false;
        let autos = [], autoActual = null, carSpeed = 0;

        // --- SISTEMA DE LECTURA DE CEREBROS EXTERNOS ---
        async function importarLogica() {
            try {
                // 1. Leer Elementos de elementor.html
                const resElem = await fetch('elementor.html');
                const htmlElem = await resElem.text();
                const modelCode = htmlElem.match(/window\.createModel = function[\s\S]*?return group;\n\s*}/);
                if (modelCode) eval(modelCode[0]);

                // 2. Leer Personaje de perfil.html
                const resPerf = await fetch('perfil.html');
                const htmlPerf = await resPerf.text();
                // Buscamos la función que dibuja al personaje (ajusta el nombre si en perfil se llama distinto)
                const charCode = htmlPerf.match(/window\.buildVaquero = function[\s\S]*?scene\.add\(vaquero\);\n\s*}/) || 
                                 htmlPerf.match(/function buildVaquero[\s\S]*?scene\.add\(vaquero\);\n\s*}/);
                if (charCode) eval(charCode[0].replace('function', 'window.buildVaquero = function'));
            } catch(e) { console.error("Error vinculando archivos externos:", e); }
        }

        async function init() {
            await importarLogica();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Cielo azul
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Iluminación potente para que no se vea negro
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            // Suelo (Césped)
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(20000, 20000), new THREE.MeshStandardMaterial({ color: 0x3d4d21 }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Intentar usar el personaje de perfil.html, si no, usar uno básico
            if (window.buildVaquero) {
                window.buildVaquero(); 
                // Asignamos la referencia global para el movimiento
                vaquero = scene.children.find(c => c.type === "Group" && !c.userData.isVehicle);
            } else {
                crearVaqueroBasico();
            }

            cargarCiudad();

            // Eventos de control
            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyF') toggleVehiculo(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousedown', e => { if(e.button === 2) isRightClickDown = true; });
            window.addEventListener('mouseup', e => { if(e.button === 2) isRightClickDown = false; });
            window.addEventListener('mousemove', e => {
                if(isRightClickDown) {
                    camRotationY -= e.movementX * 0.01;
                    camRotationX = Math.max(0.05, Math.min(1.5, camRotationX + e.movementY * 0.01));
                }
            });

            animate();
        }

        function crearVaqueroBasico() {
            vaquero = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 2), new THREE.MeshStandardMaterial({color: 0xff007f}));
            body.position.y = 5;
            vaquero.add(body);
            scene.add(vaquero);
        }

        function cargarCiudad() {
            const data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.forEach(item => {
                if(window.createModel) {
                    const m = window.createModel(item.type, false);
                    m.position.set(item.pos.x, 0, item.pos.z);
                    scene.add(m);
                    if(m.userData.isVehicle) autos.push(m);
                }
            });
        }

        function toggleVehiculo() {
            if(autoActual) {
                const off = new THREE.Vector3(15, 0, 0).applyQuaternion(autoActual.quaternion);
                vaquero.position.copy(autoActual.position).add(off);
                vaquero.position.y = 0; autoActual = null; vaquero.visible = true;
                document.getElementById('p-estado').innerText = "A PIE";
            } else {
                autos.forEach(a => {
                    if(vaquero.position.distanceTo(a.position) < 40) {
                        autoActual = a; vaquero.visible = false;
                        document.getElementById('p-estado').innerText = "CONDUCIENDO";
                        carSpeed = 0;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(autoActual) {
                const max = autoActual.userData.isTruck ? 110 : 190;
                const acc = autoActual.userData.isTruck ? 1.5 : 5;
                if(keys['KeyW']) carSpeed = Math.min(carSpeed + acc, max);
                else if(keys['KeyS']) carSpeed = Math.max(carSpeed - acc, -60);
                else carSpeed *= 0.98;
                if(keys['KeyA']) autoActual.rotation.y += 0.03;
                if(keys['KeyD']) autoActual.rotation.y -= 0.03;
                autoActual.translateZ(carSpeed * delta);
                camera.position.lerp(new THREE.Vector3(
                    autoActual.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX),
                    autoActual.position.y + zoomDistance * Math.sin(camRotationX) + 25,
                    autoActual.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)
                ), 0.1);
                camera.lookAt(autoActual.position);
            } else if (vaquero) {
                const s = (keys['ShiftLeft'] ? 130 : 65) * delta;
                if(keys['KeyW']) vaquero.translateZ(s);
                if(keys['KeyS']) vaquero.translateZ(-s);
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                let c = false; autos.forEach(a => { if(vaquero.position.distanceTo(a.position) < 40) c = true; });
                document.getElementById('prompt').style.display = c ? "block" : "none";

                camera.position.set(
                    vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX),
                    vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 15,
                    vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)
                );
                camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
