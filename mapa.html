<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Persistente | Agustín</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; }
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid var(--pink);
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        #prompt {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--pink); color: white; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; display: none; z-index: 100;
            box-shadow: 0 0 20px var(--pink); border: 2px solid white;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre" style="font-weight: bold; font-size: 20px;">OPERADOR</div>
        <div id="p-estado" style="font-size: 10px; color: var(--neon); margin-top:5px;">A PIE</div>
    </div>

    <div id="prompt">PRESIONA [F] PARA CONDUCIR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let keys = {};
        let zoomDistance = 120;
        let camRotationY = 0;
        let camRotationX = 0.5;
        let isRightClickDown = false;

        let autos = [];
        let autoActual = null;
        let carSpeed = 0;

        // FÁBRICA DE OBJETOS (Copia exacta de Elementor para que se vea igual)
        function createModel(type) {
            const group = new THREE.Group();
            const mat = (c, metal = 0) => new THREE.MeshStandardMaterial({ color: c, metalness: metal, roughness: 0.5 });

            if(type === 'calle') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 50), mat(0x111111)));
                group.add(new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 50), mat(0xffff00)));
            } 
            else if(type === 'camion') {
                const cab = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), mat(0x333333, 0.7)); cab.position.y = 5;
                const mot = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 8), mat(0x333333, 0.7)); mot.position.set(0, 3.5, 9);
                const trailer = new THREE.Mesh(new THREE.BoxGeometry(11, 12, 32), mat(0xaaaaaa, 0.1)); trailer.position.set(0, 8, -11);
                group.add(cab, mot, trailer);
                [[5,2.2,12], [-5,2.2,12], [5,2.2,-5], [-5,2.2,-5], [5,2.2,-25], [-5,2.2,-25]].forEach(p => {
                    const w = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 1.5, 12), mat(0x111111));
                    w.rotation.z = Math.PI/2; w.position.set(p[0], p[1], p[2]); group.add(w);
                });
                group.userData.isVehicle = true; group.userData.isTruck = true;
            }
            else if(type === 'auto_conducible') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 18), mat(0xff0044, 0.4)); body.position.y = 2.5;
                group.add(body);
                group.userData.isVehicle = true;
                const rG = new THREE.CylinderGeometry(1.6, 1.6, 1.2, 12);
                for(let i=0; i<4; i++) {
                    const r = new THREE.Mesh(rG, mat(0x111111)); r.rotation.z = Math.PI/2; r.position.set(i%2?5:-5, 1.6, i<2?6:-6);
                    group.add(r);
                }
            }
            else if(type === 'luz_led') {
                const p = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 45), mat(0x333333)); p.position.y = 22.5;
                const c = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 7), mat(0xffffff)); c.position.set(0, 45, 3);
                group.add(p, c);
            }
            else if(type === 'palmera') {
                const t = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.4, 35), mat(0x4b3621)); t.position.y = 17.5;
                const c = new THREE.Mesh(new THREE.SphereGeometry(10, 8, 8), mat(0x228b22)); c.position.y = 35;
                group.add(t, c);
            }
            else if(type === 'vereda') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(50, 1.2, 15), mat(0x444444)));
            }
            return group;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(20000, 20000), new THREE.MeshStandardMaterial({ color: 0x3d4d21 }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            buildAgustin(); // Tu personaje de perfil
            cargarCiudad();

            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyF') toggleVehiculo(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousedown', e => { if(e.button === 2) isRightClickDown = true; });
            window.addEventListener('mouseup', e => { if(e.button === 2) isRightClickDown = false; });
            window.addEventListener('mousemove', e => {
                if(isRightClickDown) {
                    camRotationY -= e.movementX * 0.01;
                    camRotationX = Math.max(0.05, Math.min(1.5, camRotationX + e.movementY * 0.01));
                }
            });

            animate();
        }

        function buildAgustin() {
            vaquero = new THREE.Group();
            const matPiel = new THREE.MeshStandardMaterial({color: 0xffdbac});
            const matRopa = new THREE.MeshStandardMaterial({color: 0xff007f}); // Rosa Agustín

            // Cuerpo básico (Esto lo puedes reemplazar por tu skin de perfil.html)
            const cuerpo = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 2), matRopa);
            cuerpo.position.y = 6;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), matPiel);
            cabeza.position.y = 10.5;
            
            vaquero.add(cuerpo, cabeza);
            scene.add(vaquero);
        }

        function cargarCiudad() {
            const data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.forEach(item => {
                const model = createModel(item.type);
                model.position.set(item.pos.x, 0, item.pos.z);
                scene.add(model);
                if(model.userData.isVehicle) autos.push(model);
            });
        }

        function toggleVehiculo() {
            if(autoActual) {
                const offset = new THREE.Vector3(15, 0, 0).applyQuaternion(autoActual.quaternion);
                vaquero.position.copy(autoActual.position).add(offset);
                vaquero.position.y = 0;
                autoActual = null;
                vaquero.visible = true;
                document.getElementById('p-estado').innerText = "A PIE";
            } else {
                autos.forEach(a => {
                    if(vaquero.position.distanceTo(a.position) < 40) {
                        autoActual = a;
                        vaquero.visible = false;
                        document.getElementById('p-estado').innerText = "CONDUCIENDO";
                        carSpeed = 0;
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(autoActual) {
                const maxSpd = autoActual.userData.isTruck ? 110 : 190;
                const accel = autoActual.userData.isTruck ? 1.5 : 5;

                if(keys['KeyW']) carSpeed = Math.min(carSpeed + accel, maxSpd);
                else if(keys['KeyS']) carSpeed = Math.max(carSpeed - accel, -60);
                else carSpeed *= 0.98;

                if(keys['KeyA']) autoActual.rotation.y += 0.03;
                if(keys['KeyD']) autoActual.rotation.y -= 0.03;

                autoActual.translateZ(carSpeed * delta);
                camera.position.lerp(new THREE.Vector3(
                    autoActual.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX),
                    autoActual.position.y + zoomDistance * Math.sin(camRotationX) + 25,
                    autoActual.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)
                ), 0.1);
                camera.lookAt(autoActual.position);
            } else {
                const speed = (keys['ShiftLeft'] ? 130 : 65) * delta;
                if(keys['KeyW']) vaquero.translateZ(speed);
                if(keys['KeyS']) vaquero.translateZ(-speed);
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                let cerca = false;
                autos.forEach(a => { if(vaquero.position.distanceTo(a.position) < 40) cerca = true; });
                document.getElementById('prompt').style.display = cerca ? "block" : "none";

                camera.position.set(
                    vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX),
                    vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 15,
                    vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)
                );
                camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
