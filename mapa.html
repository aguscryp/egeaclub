<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        /* Interfaz mínima arriba a la izquierda */
        #hud { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0,0,0,0.7); color: #ff007f; 
            padding: 10px 20px; border-radius: 8px; 
            border: 1px solid #ff007f; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="hud">
        <b>OPERADOR:</b> <span id="pName"></span> | <b>WASD</b> para mover
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="logica.js"></script>

    <script>
        // Al cargar la ventana, disparamos el juego sin preguntar nada
        window.onload = () => {
            document.getElementById('pName').innerText = localStorage.getItem('currentUser') || "Agustín";
            if (typeof initGame === "function") {
                initGame();
            }
        };
    </script>
</body>
</html>
