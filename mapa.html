<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Libre</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; color: #ff007f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(10,10,10,0.85); padding: 15px; border-radius: 12px; border: 1px solid #ff007f; color: white; z-index: 100; backdrop-filter: blur(5px); }
        .pink { color: #ff007f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div style="width:50px; height:50px; border:5px solid #111; border-top:5px solid #ff007f; border-radius:50%; animation: spin 1s linear infinite;"></div>
        <p>INICIALIZANDO MUNDO...</p>
    </div>
    <div id="hud">JUGADOR: <span id="pName" class="pink"></span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="logica.js"></script>
    
    <script>
        window.quitarCarga = function() {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => screen.style.display = 'none', 800);
        };
        window.onload = () => {
            document.getElementById('pName').innerText = localStorage.getItem('currentUser') || "Invitado";
            if(typeof initGame === "function") initGame();
        };
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </script>
</body>
</html>
