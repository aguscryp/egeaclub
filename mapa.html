<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Juego | Agustín Pro</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 15px;
            background: rgba(255,255,255,0.8); border: 2px solid #333;
            color: #333; z-index: 100; border-radius: 10px;
        }
        #nombre-jugador { font-weight: bold; font-size: 18px; color: #222; }
        .controles { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="nombre-jugador">JUGADOR</div>
        <div style="font-size: 11px; color: #555;">MODO JUEGO ACTIVO</div>
    </div>

    <div class="controles">Moverse: <b>W A S D</b> | Girar: <b>MOUSE</b></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let keys = {};
        const loader = new THREE.GLTFLoader();

        function init() {
            scene = new THREE.Scene();
            // CIELO CELESTE
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 1000); // Niebla celeste para el horizonte
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // LUCES NATURALES
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // --- 1. EL SUELO VERDE (PASTO) ---
            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 }); // Verde Pasto
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Grilla opcional para referencia
            const grid = new THREE.GridHelper(5000, 100, 0x1a1a1a, 0x1a1a1a);
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            // --- 2. CARGAR PERSONAJE (De Perfil.html) ---
            const pData = JSON.parse(localStorage.getItem('perfil_jugador')) || { nombre: 'Agustín', color: '#ff007f' };
            document.getElementById('nombre-jugador').innerText = pData.nombre.toUpperCase();

            const geo = new THREE.CapsuleGeometry(1.5, 3, 4, 8);
            const mat = new THREE.MeshStandardMaterial({ color: pData.color || '#ff007f' });
            player = new THREE.Mesh(geo, mat);
            player.position.set(0, 5, 0); // Un poco arriba del pasto
            scene.add(player);

            // --- 3. CARGAR CIUDAD (De Construccion.html) ---
            const datos = JSON.parse(localStorage.getItem('ciudad_db')) || [];
            datos.forEach(item => {
                if(item.type === 'calle') {
                    // Calle de asfalto simple
                    const calle = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40), new THREE.MeshStandardMaterial({color: 0x333333}));
                    calle.position.set(item.pos.x, 0.2, item.pos.z);
                    scene.add(calle);
                } else {
                    // Fallback: Pone una caja gris donde iría el modelo
                    const box = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
                    box.position.set(item.pos.x, 10, item.pos.z);
                    scene.add(box);
                }
            });

            // Controles teclado
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if(player) {
                // MOVIMIENTO WASD
                const moveSpeed = 50 * delta;
                const rotateSpeed = 3 * delta;

                if(keys['KeyW']) player.translateZ(moveSpeed);
                if(keys['KeyS']) player.translateZ(-moveSpeed);
                if(keys['KeyA']) player.rotation.y += rotateSpeed;
                if(keys['KeyD']) player.rotation.y -= rotateSpeed;

                // CÁMARA 3RA PERSONA (Sigue al jugador)
                const offset = new THREE.Vector3(0, 15, -35); // Arriba y atrás
                const worldOffset = offset.applyMatrix4(player.matrixWorld);
                camera.position.lerp(worldOffset, 0.1); // Suavizado
                camera.lookAt(player.position.x, player.position.y + 5, player.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
