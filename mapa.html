<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Persistente | Agustín</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; }
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid var(--pink);
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        #prompt {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--pink); color: white; padding: 12px 25px; border-radius: 8px;
            display: none; z-index: 100; box-shadow: 0 0 20px var(--pink); border: 2px solid white;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre" style="font-weight: bold; font-size: 20px;">OPERADOR</div>
        <div id="p-estado" style="font-size: 10px; color: var(--neon); margin-top:5px;">SINCRONIZADO</div>
    </div>
    <div id="prompt">PRESIONA [F] PARA INTERACTUAR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock, keys = {};
        let zoomDistance = 120, camRotationY = 0, camRotationX = 0.5, isRightClickDown = false;
        let autos = [], autoActual = null, carSpeed = 0, walkCycle = 0;

        // --- PODER DE PERFIL.HTML: RECONSTRUCCIÓN FIEL ---
        function sincronizarPersonaje() {
            const config = JSON.parse(localStorage.getItem('playerConfig'));
            if(!config) return;

            vaquero = new THREE.Group();
            const m = parseFloat(config.musculo);
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            const matRopa = new THREE.MeshStandardMaterial({ color: config.color });

            // 1. Torso (Indice 0)
            const torso = new THREE.Mesh(new THREE.BoxGeometry(4 * m, 6, 2.5 * m), matRopa);
            torso.position.y = 8;
            
            // 2. Cabeza (Indice 1)
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), matPiel);
            cabeza.position.y = 12.5;

            // 3. Piernas (Indices 2 y 3)
            const pIzq = new THREE.Group(); const pDer = new THREE.Group();
            const piernaMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6 * m, 5, 1.6 * m), matRopa);
            pIzq.add(piernaMesh.clone()); pDer.add(piernaMesh.clone());
            pIzq.position.set(-1.2 * m, 2.5, 0); pDer.position.set(1.2 * m, 2.5, 0);

            // 4. Brazos (Indices 4 y 5)
            const bIzq = new THREE.Mesh(new THREE.BoxGeometry(1.3 * m, 5, 1.3 * m), matPiel);
            const bDer = new THREE.Mesh(new THREE.BoxGeometry(1.3 * m, 5, 1.3 * m), matPiel);
            bIzq.position.set(-3 * m, 8.5, 0); bDer.position.set(3 * m, 8.5, 0);

            // 5. Calzado (Sincronizado de Perfil)
            if(config.zapato === 'nike_tn') {
                const addNike = (p) => {
                    const s = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({color: 0x111111}));
                    const glow = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.3, 3.1), new THREE.MeshStandardMaterial({
                        color: config.color, emissive: config.color, emissiveIntensity: 2
                    }));
                    glow.position.y = -0.5; s.add(glow); s.position.y = -2.5; p.add(s);
                };
                addNike(pIzq); addNike(pDer);
            }

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        // --- PODER DE ELEMENTOR.HTML: LECTOR DE OBJETOS ---
        function fabricarObjeto(item) {
            const group = new THREE.Group();
            const mat = (c) => new THREE.MeshStandardMaterial({ color: c });

            // Mapa obedece a Elementor: si agregas un tipo nuevo allá, lo agregas aquí
            switch(item.type) {
                case 'calle':
                    group.add(new THREE.Mesh(new THREE.BoxGeometry(100, 1, 100), mat(0x222222)));
                    break;
                case 'camion':
                    const cab = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), mat(0x333333)); cab.position.y = 5;
                    group.add(cab);
                    group.userData.isVehicle = true;
                    break;
                // Mapa leerá cualquier "item.type" que definas en el futuro en elementor
            }
            group.position.set(item.pos.x, 0, item.pos.z);
            scene.add(group);
            if(group.userData.isVehicle) autos.push(group);
        }

        function cargarMundo() {
            const objetos = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            objetos.forEach(obj => fabricarObjeto(obj));
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8), new THREE.DirectionalLight(0xffffff, 1));
            
            sincronizarPersonaje(); // Obedece a perfil.html
            cargarMundo();           // Obedece a elementor.html

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (!vaquero) return;

            let isMoving = false;
            const speed = (keys['ShiftLeft'] ? 140 : 70) * delta;

            if (keys['KeyW']) { vaquero.translateZ(speed); isMoving = true; }
            if (keys['KeyS']) { vaquero.translateZ(-speed); isMoving = true; }
            if (keys['KeyA']) { vaquero.rotation.y += 3 * delta; isMoving = true; }
            if (keys['KeyD']) { vaquero.rotation.y -= 3 * delta; isMoving = true; }

            // MOTOR DE ANIMACIÓN (Copiado de Perfil)
            const torso = vaquero.children[0];
            const pIzq = vaquero.children[2];
            const pDer = vaquero.children[3];
            const bIzq = vaquero.children[4];
            const bDer = vaquero.children[5];

            if (isMoving) {
                walkCycle += (keys['ShiftLeft'] ? 0.25 : 0.15);
                pIzq.rotation.x = Math.sin(walkCycle) * 0.6;
                pDer.rotation.x = -Math.sin(walkCycle) * 0.6;
                bIzq.rotation.x = -Math.sin(walkCycle) * 0.6;
                bDer.rotation.x = Math.sin(walkCycle) * 0.6;
                torso.position.y = 8 + Math.abs(Math.cos(walkCycle)) * 0.5;
            } else {
                [pIzq, pDer, bIzq, bDer].forEach(part => part.rotation.x *= 0.9);
                torso.position.y = 8;
            }

            camera.position.set(
                vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX),
                vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 15,
                vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)
            );
            camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
