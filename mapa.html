<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa | Agustín Pro</title>
    <style>
        :root { --pink: #ff007f; --neon: #00d4ff; }
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; background: rgba(10,10,10,0.9); border-left: 5px solid var(--pink); color: white; border-radius: 0 10px 10px 0; }
        #prompt { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--pink); color: white; padding: 12px 25px; border-radius: 8px; font-weight: bold; display: none; box-shadow: 0 0 20px var(--pink); }
    </style>
</head>
<body>
    <div id="hud">
        <div id="p-nombre">OPERADOR</div>
        <div id="p-estado" style="color: var(--neon);">A PIE</div>
    </div>
    <div id="prompt">PRESIONA [F] PARA CONDUCIR</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, vaquero, clock, keys = {}, autos = [], autoActual = null, carSpeed = 0;
        let zoomDistance = 120, camRotationY = 0, camRotationX = 0.5, isRightClickDown = false;

        async function init() {
            // --- CONEXIÓN DINÁMICA CON EL CEREBRO DE ELEMENTOR ---
            try {
                const res = await fetch('elementor.html');
                const html = await res.text();
                const code = html.match(/window\.createModel = function[\s\S]*?return group;\n\s*}/)[0];
                eval(code); 
            } catch(e) { console.error("Error vinculando con Elementor:", e); }

            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 20000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(500,1000,500); scene.add(sun);
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(20000, 20000), new THREE.MeshStandardMaterial({ color: 0x3d4d21 }));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            buildVaquero();
            cargarCiudad();

            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'KeyF') toggleVehiculo(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousedown', e => { if(e.button === 2) isRightClickDown = true; });
            window.addEventListener('mouseup', e => { if(e.button === 2) isRightClickDown = false; });
            window.addEventListener('mousemove', e => { if(isRightClickDown) { camRotationY -= e.movementX*0.01; camRotationX = Math.max(0.05, Math.min(1.5, camRotationX + e.movementY*0.01)); }});
            
            animate();
        }

        function cargarCiudad() {
            const data = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            data.forEach(item => {
                if(window.createModel) {
                    const m = window.createModel(item.type, false);
                    m.position.set(item.pos.x, 0, item.pos.z);
                    scene.add(m);
                    if(m.userData.isVehicle) autos.push(m);
                }
            });
        }

        function toggleVehiculo() {
            if(autoActual) {
                const off = new THREE.Vector3(15, 0, 0).applyQuaternion(autoActual.quaternion);
                vaquero.position.copy(autoActual.position).add(off);
                vaquero.position.y = 0; autoActual = null; vaquero.visible = true;
                document.getElementById('p-estado').innerText = "A PIE";
            } else {
                autos.forEach(a => {
                    if(vaquero.position.distanceTo(a.position) < 35) {
                        autoActual = a; vaquero.visible = false;
                        document.getElementById('p-estado').innerText = "CONDUCIENDO"; carSpeed = 0;
                    }
                });
            }
        }

        function buildVaquero() {
            vaquero = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 4.5, 2), new THREE.MeshStandardMaterial({color: 0xff007f}));
            body.position.y = 5.5; vaquero.add(body); scene.add(vaquero);
        }

        function animate() {
            requestAnimationFrame(animate);
            const d = clock.getDelta();
            if(autoActual) {
                const max = autoActual.userData.isTruck ? 110 : 190;
                const acc = autoActual.userData.isTruck ? 1.5 : 5;
                if(keys['KeyW']) carSpeed = Math.min(carSpeed + acc, max);
                else if(keys['KeyS']) carSpeed = Math.max(carSpeed - acc, -60);
                else carSpeed *= 0.98;
                if(keys['KeyA']) autoActual.rotation.y += 0.03;
                if(keys['KeyD']) autoActual.rotation.y -= 0.03;
                autoActual.translateZ(carSpeed * d);
                camera.position.lerp(new THREE.Vector3(autoActual.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX), autoActual.position.y + zoomDistance * Math.sin(camRotationX) + 25, autoActual.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX)), 0.1);
                camera.lookAt(autoActual.position);
            } else {
                const s = (keys['ShiftLeft'] ? 130 : 65) * d;
                if(keys['KeyW']) vaquero.translateZ(s); if(keys['KeyS']) vaquero.translateZ(-s);
                if(keys['KeyA']) vaquero.rotation.y += 3 * d; if(keys['KeyD']) vaquero.rotation.y -= 3 * d;
                let c = false; autos.forEach(a => { if(vaquero.position.distanceTo(a.position) < 35) c = true; });
                document.getElementById('prompt').style.display = c ? "block" : "none";
                camera.position.set(vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX), vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 15, vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX));
                camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
