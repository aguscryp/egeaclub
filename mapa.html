<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Interactuable | Agustín Pro</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 15px;
            background: rgba(0,0,0,0.9); border: 1px solid #ff007f;
            color: white; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="user-name" style="color: #ff007f; font-weight: bold; font-size: 20px;">AGUSTÍN</div>
        <div style="font-size: 10px; color: #00d4ff;">CONTROLES: W A S D</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let keys = {};
        const loader = new THREE.GLTFLoader();

        function init() {
            // 1. ESCENA Y LUCES
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            clock = new THREE.Clock();

            // Cámara inicial (Preventiva)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(0, 50, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luz Ambiental FUERTE (Para evitar el negro total)
            const light = new THREE.AmbientLight(0xffffff, 1); 
            scene.add(light);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 1, 1).normalize();
            scene.add(directionalLight);

            // 2. EL SUELO (Si esto no se ve, nada se ve)
            const floorGeo = new THREE.PlaneGeometry(5000, 5000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(5000, 100, 0xff007f, 0x222222);
            scene.add(grid);

            // 3. CARGAR PERSONAJE (Desde Perfil.html)
            const stored = localStorage.getItem('perfil_jugador') || localStorage.getItem('usuario_perfil');
            const perfil = stored ? JSON.parse(stored) : { nombre: 'Invitado', color: '#ff007f' };
            document.getElementById('user-name').innerText = perfil.nombre.toUpperCase();

            const playerGeo = new THREE.CapsuleGeometry(2, 4, 4, 8);
            const playerMat = new THREE.MeshStandardMaterial({ color: perfil.color || 0xff007f });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 5, 0); // Lo ponemos sobre el suelo
            scene.add(player);

            // 4. CARGAR ESTRUCTURAS (Desde Construccion.html)
            const data = JSON.parse(localStorage.getItem('ciudad_db')) || [];
            data.forEach(item => {
                if(item.type === 'calle') {
                    const calle = new THREE.Mesh(new THREE.BoxGeometry(40, 1.2, 40), new THREE.MeshStandardMaterial({color: 0x111111}));
                    calle.position.set(item.pos.x, 0.5, item.pos.z);
                    scene.add(calle);
                } else {
                    // Intento de carga de modelo GLB
                    loader.load(item.type + '.glb', (gltf) => {
                        const m = gltf.scene;
                        m.position.set(item.pos.x, 0, item.pos.z);
                        m.rotation.y = item.rot;
                        scene.add(m);
                    }, undefined, (err) => {
                        // Fallback: Si no hay modelo, pone un bloque gris para que no quede vacío
                        const box = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshStandardMaterial({color: 0x444444}));
                        box.position.set(item.pos.x, 10, item.pos.z);
                        scene.add(box);
                    });
                }
            });

            // Teclado
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if(player) {
                // Movimiento
                const speed = 50 * delta;
                const rotSpeed = 3 * delta;

                if(keys['KeyW']) player.translateZ(speed);
                if(keys['KeyS']) player.translateZ(-speed);
                if(keys['KeyA']) player.rotation.y += rotSpeed;
                if(keys['KeyD']) player.rotation.y -= rotSpeed;

                // Cámara 3ra Persona
                const camPos = new THREE.Vector3(0, 15, -35);
                const actualCamPos = camPos.applyMatrix4(player.matrixWorld);
                camera.position.lerp(actualCamPos, 0.1);
                camera.lookAt(player.position.x, player.position.y + 5, player.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
