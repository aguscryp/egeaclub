<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Interactivo | Agustín Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 15px;
            background: rgba(0,0,0,0.8); border-left: 4px solid #ff007f;
            color: white; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="user-display" style="color: #ff007f; font-weight: bold; font-size: 18px;">JUGADOR</div>
        <div style="font-size: 10px; color: #00d4ff; letter-spacing: 1px;">WASD PARA CAMINAR</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let keys = {};
        const loader = new THREE.GLTFLoader();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // 1. CARGAR PERSONAJE (De perfil.html)
            const perfil = JSON.parse(localStorage.getItem('perfil_jugador')) || { nombre: 'Agustín', color: '#ff007f' };
            document.getElementById('user-display').innerText = perfil.nombre.toUpperCase();

            const geo = new THREE.CapsuleGeometry(1.5, 3, 4, 8);
            const mat = new THREE.MeshStandardMaterial({ color: perfil.color });
            player = new THREE.Mesh(geo, mat);
            player.position.set(0, 5, 0);
            scene.add(player);

            // Suelo base para que no sea todo negro
            const grid = new THREE.GridHelper(5000, 100, 0x222222, 0x111111);
            scene.add(grid);

            // 2. SINCRONIZAR ESTRUCTURAS (De construccion.html)
            sincronizarMundo();

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function sincronizarMundo() {
            // Lee lo que guardaste en construccion.html
            const data = JSON.parse(localStorage.getItem('ciudad_db')) || [];
            data.forEach(item => {
                if(item.type === 'calle') {
                    const c = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40), new THREE.MeshStandardMaterial({color: 0x151515}));
                    c.position.set(item.pos.x, 0, item.pos.z);
                    scene.add(c);
                } else {
                    // Intenta cargar el .glb si existe el archivo
                    loader.load(item.type + '.glb', (gltf) => {
                        const m = gltf.scene;
                        m.position.set(item.pos.x, 0, item.pos.z);
                        m.rotation.y = item.rot;
                        scene.add(m);
                    }, undefined, () => {
                        // Si no encuentra el archivo, pone un bloque para que sepas que ahí va algo
                        const box = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshStandardMaterial({color: 0x333333}));
                        box.position.set(item.pos.x, 10, item.pos.z);
                        scene.add(box);
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if(player) {
                // MOVIMIENTO JUGADOR
                const moveSpeed = 40 * delta;
                if(keys['KeyW']) player.translateZ(moveSpeed);
                if(keys['KeyS']) player.translateZ(-moveSpeed);
                if(keys['KeyA']) player.rotation.y += 3 * delta;
                if(keys['KeyD']) player.rotation.y -= 3 * delta;

                // CÁMARA 3RA PERSONA
                const offset = new THREE.Vector3(0, 15, -30);
                const worldOffset = offset.applyMatrix4(player.matrixWorld);
                camera.position.copy(worldOffset);
                camera.lookAt(player.position);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
