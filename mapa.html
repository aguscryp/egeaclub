<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cowboy Engine | Mundo Dinámico</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* HUD DE ESTADO */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 100; pointer-events: none;
        }
        .stat-card {
            background: rgba(5, 5, 5, 0.9); color: white;
            padding: 12px 20px; border-radius: 10px;
            border-left: 4px solid #ff007f; min-width: 200px;
            backdrop-filter: blur(8px); box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .bar-container { background: #222; height: 8px; border-radius: 4px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: #ff007f; transition: width 0.4s ease; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }
        
        /* MENSAJE DE INTERACCIÓN */
        #interact-msg {
            position: absolute; bottom: 100px; width: 100%;
            text-align: center; color: #ff007f; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px #ff007f; display: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-card">
            <div class="label">Energía <span id="txt-energia">100%</span></div>
            <div class="bar-container"><div id="bar-energia" class="bar-fill"></div></div>
        </div>
        <div class="stat-card">
            <div class="label">Hidratación <span id="txt-sed">100%</span></div>
            <div class="bar-container"><div id="bar-sed" class="bar-fill" style="background: #00d4ff;"></div></div>
        </div>
    </div>

    <div id="interact-msg">Presiona [E] para interactuar</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, vaquero;
        let pIzq, pDer, bIzq, bDer, torso;
        const keys = {};
        
        // Carga de ADN desde Perfil y Tienda
        const playerConfig = JSON.parse(localStorage.getItem('playerConfig')) || { color: '#ff007f', musculo: 1, altura: 1 };
        const tiendaConfig = JSON.parse(localStorage.getItem('tienda_config')) || { activa: false };
        
        let stats = { energia: 100, sed: 100 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Iluminación
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // Suelo
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            buildPlayer();
            if(tiendaConfig.activa) spawnTienda();

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            animate();
        }

        function buildPlayer() {
            vaquero = new THREE.Group();
            const matR = new THREE.MeshStandardMaterial({ color: playerConfig.color });
            const matP = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            const mScale = parseFloat(playerConfig.musculo);

            torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matR);
            torso.position.y = 1.6;

            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matP);
            cabeza.position.y = 2.5;

            pIzq = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), matR);
            pIzq.position.set(-0.25, 0.5, 0);
            pIzq.scale.set(mScale, 1, mScale);

            pDer = pIzq.clone();
            pDer.position.x = 0.25;

            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matP);
            bIzq.position.set(-0.6 * mScale, 1.7, 0);
            bIzq.scale.set(mScale, 1, mScale);

            bDer = bIzq.clone();
            bDer.position.x = 0.6 * mScale;

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            vaquero.scale.y = parseFloat(playerConfig.altura);
            scene.add(vaquero);
        }

        function spawnTienda() {
            const tienda = new THREE.Group();
            
            // Paredes (Color forzado desde tienda.html)
            const walls = new THREE.Mesh(
                new THREE.BoxGeometry(10, 6, 10), 
                new THREE.MeshStandardMaterial({ color: tiendaConfig.colorParedes, side: THREE.DoubleSide })
            );
            walls.position.set(20, 3, -20);
            tienda.add(walls);

            // Dispenser de Agua
            const dispenser = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.7), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            const bidon = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0x00aaff, transparent:true, opacity:0.6}));
            bidon.position.y = 1;
            dispenser.add(base, bidon);
            dispenser.position.set(16, 0.7, -18);
            scene.add(dispenser);

            // NPC Vendedor
            const npc = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2, 0.8), new THREE.MeshStandardMaterial({color: 0x333333}));
            npc.position.set(20, 1, -20);
            scene.add(npc);

            scene.add(tienda);
        }

        function animate() {
            requestAnimationFrame(animate);
            let isMoving = false;

            if(vaquero) {
                const speed = 0.25 * (stats.energia / 100);
                if(keys['KeyW']) { vaquero.translateZ(speed); isMoving = true; stats.energia -= 0.05; }
                if(keys['KeyS']) { vaquero.translateZ(-speed); isMoving = true; }
                if(keys['KeyA']) { vaquero.rotation.y += 0.06; isMoving = true; }
                if(keys['KeyD']) { vaquero.rotation.y -= 0.06; isMoving = true; }

                // Consumo pasivo de sed
                stats.sed = Math.max(0, stats.sed - 0.01);

                // Animación física
                if(isMoving) {
                    const t = Date.now() * 0.012;
                    pIzq.rotation.x = Math.sin(t) * 0.6;
                    pDer.rotation.x = -Math.sin(t) * 0.6;
                    bIzq.rotation.x = -Math.sin(t) * 0.5;
                    bDer.rotation.x = Math.sin(t) * 0.5;
                } else {
                    if(stats.energia < 100) stats.energia += 0.08;
                    pIzq.rotation.x = pDer.rotation.x = bIzq.rotation.x = bDer.rotation.x = 0;
                    // Respiración
                    torso.scale.x = 1 + Math.sin(Date.now() * 0.002) * 0.03;
                }

                // Lógica de Proximidad al Dispenser (Coord: 16, -18)
                const dist = vaquero.position.distanceTo(new THREE.Vector3(16, 0, -18));
                const msg = document.getElementById('interact-msg');
                if(dist < 3) {
                    msg.style.display = 'block';
                    if(keys['KeyE']) {
                        stats.sed = 100;
                        console.log("Bebiendo agua...");
                    }
                } else { msg.style.display = 'none'; }

                // Cámara
                const offset = new THREE.Vector3(0, 7, 15).applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(offset, 0.1);
                controls.target.lerp(vaquero.position, 0.1);
            }

            // Actualizar HUD
            document.getElementById('bar-energia').style.width = stats.energia + "%";
            document.getElementById('bar-sed').style.width = stats.sed + "%";
            document.getElementById('txt-energia').innerText = Math.round(stats.energia) + "%";
            document.getElementById('txt-sed').innerText = Math.round(stats.sed) + "%";

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
