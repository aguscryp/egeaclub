<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre | Cowboy Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(10, 10, 10, 0.8); color: #ff007f; 
            padding: 15px; border-radius: 12px; 
            border: 2px solid #ff007f; z-index: 100;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            backdrop-filter: blur(5px);
        }
        .pink { font-weight: bold; text-shadow: 0 0 5px #ff007f; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="margin-bottom: 5px;">JUGADOR: <span id="pName" class="pink"></span></div>
        <small style="color: #aaa;">WASD para cabalgar | MOUSE para cámara</small>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="logica.js"></script>

    <script>
        window.onload = () => {
            const usuario = localStorage.getItem('currentUser') || "Agustín";
            document.getElementById('pName').innerText = usuario;
            if (typeof initGame === "function") initGame();
        };
    </script>
</body>
</html>
