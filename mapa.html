<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Persistente | Agustín Pro</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; padding: 20px;
            background: rgba(10, 10, 10, 0.9); border-left: 5px solid #ff007f;
            color: white; z-index: 100; border-radius: 0 10px 10px 0;
        }
        .instrucciones {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6); color: #fff; padding: 10px;
            font-size: 11px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="p-nombre" style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">OPERADOR</div>
        <div style="font-size: 10px; color: #00d4ff; margin-top:5px;">CÁMARA LIBRE ACTIVA</div>
    </div>

    <div class="instrucciones">
        WASD: Mover | CLICK IZQ: Cavar | CLICK DER: Girar Cámara | RUEDITA: Zoom | ESPACIO: Saltar
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let pIzq, pDer, bIzq, bDer, torso;
        let keys = {};
        let velocityY = 0; 
        let isGrounded = true;
        
        // --- VARIABLES DE CÁMARA ---
        let zoomDistance = 35;
        let camRotationY = 0; // Rotación horizontal de la cámara
        let camRotationX = 0.5; // Rotación vertical (ángulo)
        let isRightClickDown = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 100, 1000);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // SUELO REALISTA
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#3d4d21"; 
            ctx.fillRect(0,0,512,512);
            for(let i=0; i<15000; i++) {
                ctx.fillStyle = `rgba(40, 30, 10, ${Math.random() * 0.3})`; 
                ctx.fillRect(Math.random()*512, Math.random()*512, 3, 3);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(150, 150);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(10000, 10000),
                new THREE.MeshStandardMaterial({ map: texture, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // PERSONAJE
            const saved = localStorage.getItem('playerConfig');
            const config = saved ? JSON.parse(saved) : { color: "#ff007f", musculo: 1, altura: 1 };
            document.getElementById('p-nombre').innerText = (localStorage.getItem('currentUser') || "AGUSTÍN").toUpperCase();
            buildVaquero(config);

            // ELEMENTOR
            const elData = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            elData.forEach(item => {
                const geo = item.type === 'calle' ? new THREE.BoxGeometry(50, 0.2, 50) : new THREE.BoxGeometry(10, 20, 10);
                const mat = new THREE.MeshStandardMaterial({ color: item.type === 'calle' ? 0x222222 : 0x777777 });
                const obj = new THREE.Mesh(geo, mat);
                obj.position.set(item.pos.x, item.type === 'calle' ? 0.1 : 10, item.pos.z);
                scene.add(obj);
            });

            // --- EVENTOS DE CONTROL ---
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            // Zoom
            window.addEventListener('wheel', e => {
                zoomDistance += e.deltaY * 0.05;
                zoomDistance = Math.max(10, Math.min(150, zoomDistance));
            });

            // Bloquear menú contextual del click derecho
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Detección de Click Derecho
            window.addEventListener('mousedown', e => { if(e.button === 2) isRightClickDown = true; });
            window.addEventListener('mouseup', e => { if(e.button === 2) isRightClickDown = false; });

            // Movimiento del Mouse
            window.addEventListener('mousemove', e => {
                if(isRightClickDown) {
                    camRotationY -= e.movementX * 0.01;
                    camRotationX += e.movementY * 0.01;
                    // Limitar rotación vertical para no dar la vuelta completa
                    camRotationX = Math.max(0.1, Math.min(1.4, camRotationX));
                }
            });

            window.addEventListener('click', (e) => { if(e.button === 0) cavarPozo(); });

            animate();
        }

        function buildVaquero(config) {
            vaquero = new THREE.Group();
            const matColor = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            const m = parseFloat(config.musculo);
            
            torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matColor);
            torso.position.y = 1.6;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;

            const geoExt = new THREE.BoxGeometry(0.3 * m, 0.9, 0.3 * m);
            pIzq = new THREE.Mesh(geoExt, matColor); pIzq.position.set(-0.25, 0.5, 0);
            pDer = new THREE.Mesh(geoExt, matColor); pDer.position.set(0.25, 0.5, 0);
            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25 * m, 1, 0.25 * m), matPiel); bIzq.position.set(-0.6, 1.7, 0);
            bDer = new THREE.Mesh(new THREE.BoxGeometry(0.25 * m, 1, 0.25 * m), matPiel); bDer.position.set(0.6, 1.7, 0);

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        function cavarPozo() {
            const pozo = new THREE.Mesh(new THREE.CircleGeometry(2, 32), new THREE.MeshBasicMaterial({ color: 0x1a0f00 }));
            pozo.rotation.x = -Math.PI / 2;
            pozo.position.set(vaquero.position.x, 0.15, vaquero.position.z);
            scene.add(pozo);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = Date.now() * 0.005;
            
            if(vaquero) {
                const isMoving = keys['KeyW'] || keys['KeyS'];
                const speed = (keys['ShiftLeft'] ? 65 : 35) * delta;
                
                // MOVIMIENTO (Relativo a donde mira el personaje)
                if(keys['KeyW']) vaquero.translateZ(speed);
                if(keys['KeyS']) vaquero.translateZ(-speed);
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                // Animación de extremidades
                const animSpeed = isMoving ? 2.5 : 0.5;
                const animAmp = isMoving ? 0.7 : 0.1;
                bIzq.rotation.x = Math.sin(time * animSpeed) * animAmp;
                bDer.rotation.x = -Math.sin(time * animSpeed) * animAmp;
                pIzq.rotation.x = -Math.sin(time * animSpeed) * animAmp;
                pDer.rotation.x = Math.sin(time * animSpeed) * animAmp;

                // Salto
                if(keys['Space'] && isGrounded) { velocityY = 1.3; isGrounded = false; }
                if(!isGrounded) {
                    velocityY -= 0.07;
                    vaquero.position.y += velocityY;
                    if(vaquero.position.y <= 0) { vaquero.position.y = 0; isGrounded = true; }
                }

                // --- LÓGICA DE CÁMARA 360 ---
                // La cámara gira alrededor del personaje usando camRotationY y camRotationX
                const x = vaquero.position.x + zoomDistance * Math.sin(camRotationY) * Math.cos(camRotationX);
                const y = vaquero.position.y + zoomDistance * Math.sin(camRotationX) + 5;
                const z = vaquero.position.z + zoomDistance * Math.cos(camRotationY) * Math.cos(camRotationX);

                camera.position.set(x, y, z);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 3, vaquero.position.z);
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
