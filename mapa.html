<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Libre | Cowboy Engine Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* PANTALLA DE CARGA ESTILO PINK NEON */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; color: #ff007f; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .loader {
            width: 60px; height: 60px;
            border: 5px solid rgba(255, 0, 127, 0.2);
            border-top: 5px solid #ff007f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* INTERFAZ DE USUARIO (HUD) */
        #hud {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 10, 10, 0.8);
            padding: 20px; border-radius: 15px;
            border: 2px solid #ff007f; color: white;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .user-info { font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid rgba(255, 0, 127, 0.4); padding-bottom: 5px; }
        .controls-hint { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .pink-glow { color: #ff007f; text-shadow: 0 0 8px #ff007f; font-weight: bold; }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; letter-spacing: 3px;">INICIALIZANDO MUNDO...</p>
        <div id="load-msg" style="font-size: 12px; opacity: 0.7;">Cargando perfil de <span id="user-display"></span></div>
    </div>

    <div id="hud">
        <div class="user-info">JUGADOR: <span id="player-name" class="pink-glow"></span></div>
        <div class="controls-hint">
            <b>W S A D</b> - Desplazamiento<br>
            <b>MOUSE</b> - Rotar Cámara<br>
            <b>ESPACIO</b> - Saltar
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="logica.js"></script>

    <script>
        // Función Global para quitar la carga (se llama desde logica.js)
        window.quitarCarga = function() {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
            }, 800);
        };

        // Al cargar la ventana, sincronizamos datos y arrancamos el motor
        window.onload = () => {
            const usuario = localStorage.getItem('currentUser') || "Invitado";
            document.getElementById('player-name').innerText = usuario;
            document.getElementById('user-display').innerText = usuario;

            // Verificamos si logica.js está cargado antes de iniciar
            if (typeof initGame === "function") {
                initGame();
            } else {
                console.error("Error: No se pudo encontrar initGame() en logica.js");
                document.getElementById('load-msg').innerText = "Error al cargar logica.js";
            }
        };
    </script>
</body>
</html>
