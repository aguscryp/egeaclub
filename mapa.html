<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre | Cowboy Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #hud { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(10, 10, 10, 0.8); color: #ff007f; 
            padding: 15px; border-radius: 12px; border: 2px solid #ff007f; 
            z-index: 100; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            backdrop-filter: blur(5px);
        }
        .pink { font-weight: bold; text-shadow: 0 0 5px #ff007f; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="margin-bottom: 5px;">JUGADOR: <span id="pName" class="pink"></span></div>
        <small style="color: #aaa;"><b>WASD</b> para mover | <b>MOUSE</b> para cámara</small>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        /**
         * TODO EN UNO - EVITA ERRORES DE LECTURA DE ARCHIVOS
         */
        let scene, camera, renderer, controls, vaquero;
        let pIzq, pDer, bIzq, bDer; // Extremidades
        const keys = {};

        // 1. OBTENER CONFIGURACIÓN
        const playerConfig = JSON.parse(localStorage.getItem('playerConfig')) || { color: '#ff007f' };

        function initGame() {
            // ESCENA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // LUCES
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // MAPA (Pasto Verde)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000), 
                new THREE.MeshStandardMaterial({ color: 0x4caf50 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // PERSONAJE ANIMADO
            vaquero = new THREE.Group();
            const matRopa = new THREE.MeshStandardMaterial({ color: playerConfig.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

            // Cuerpo
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matRopa);
            torso.position.y = 1.6;
            vaquero.add(torso);

            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matPiel);
            cabeza.position.y = 2.5;
            vaquero.add(cabeza);

            // Extremidades
            const geoExt = new THREE.BoxGeometry(0.3, 0.9, 0.3);
            pIzq = new THREE.Mesh(geoExt, matRopa); pIzq.position.set(-0.2, 0.5, 0);
            pDer = new THREE.Mesh(geoExt, matRopa); pDer.position.set(0.2, 0.5, 0);
            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), matPiel); bIzq.position.set(-0.55, 1.6, 0);
            bDer = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), matPiel); bDer.position.set(0.55, 1.6, 0);

            vaquero.add(pIzq, pDer, bIzq, bDer);
            scene.add(vaquero);

            // CONTROLES
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.onkeydown = (e) => keys[e.code] = true;
            window.onkeyup = (e) => keys[e.code] = false;

            document.getElementById('pName').innerText = localStorage.getItem('currentUser') || "Agustín";

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            let moving = false;

            if(vaquero) {
                const speed = 0.25;
                if(keys['KeyW']) { vaquero.translateZ(speed); moving = true; }
                if(keys['KeyS']) { vaquero.translateZ(-speed); moving = true; }
                if(keys['KeyA']) { vaquero.rotation.y += 0.06; moving = true; }
                if(keys['KeyD']) { vaquero.rotation.y -= 0.06; moving = true; }

                // Animación de caminata
                if(moving) {
                    const t = Date.now() * 0.01;
                    pIzq.rotation.x = Math.sin(t) * 0.6;
                    pDer.rotation.x = -Math.sin(t) * 0.6;
                    bIzq.rotation.x = -Math.sin(t) * 0.6;
                    bDer.rotation.x = Math.sin(t) * 0.6;
                    vaquero.position.y = Math.abs(Math.cos(t * 0.5)) * 0.1;
                } else {
                    pIzq.rotation.x = pDer.rotation.x = bIzq.rotation.x = bDer.rotation.x = 0;
                    vaquero.position.y = 0;
                }

                // Cámara
                const offset = new THREE.Vector3(0, 7, 14).applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(offset, 0.1);
                controls.target.lerp(vaquero.position, 0.1);
            }
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = initGame;
    </script>
</body>
</html>
