<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Operativo | Cowboy Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* HUD NEON FLOW */
        #hud {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 100; pointer-events: none;
        }
        .stat-card {
            background: rgba(10, 10, 10, 0.9); color: white;
            padding: 12px 20px; border-radius: 8px;
            border-left: 4px solid #ff007f; min-width: 200px;
            backdrop-filter: blur(10px);
        }
        .bar-bg { background: #222; height: 6px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: #ff007f; transition: width 0.3s; }
        .label { font-size: 11px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }

        #interact-hint {
            position: absolute; bottom: 15%; width: 100%;
            text-align: center; color: #ff007f; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px #ff007f; display: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-card">
            <div class="label">Energía <span id="txt-nrg">100%</span></div>
            <div class="bar-bg"><div id="bar-nrg" class="bar-fill"></div></div>
        </div>
        <div class="stat-card">
            <div class="label">Hidratación <span id="txt-h2o">100%</span></div>
            <div class="bar-bg"><div id="bar-h2o" class="bar-fill" style="background: #00d4ff;"></div></div>
        </div>
    </div>

    <div id="interact-hint">Presiona [E] para beber agua</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, vaquero;
        let pIzq, pDer, bIzq, bDer, torso;
        const keys = {};
        
        // Datos del LocalStorage
        const playerCfg = JSON.parse(localStorage.getItem('playerConfig')) || { color: '#ff007f', musculo: 1, altura: 1 };
        const tiendaCfg = JSON.parse(localStorage.getItem('tienda_config')) || { activa: false };
        
        let stats = { energia: 100, sed: 100 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Cielo

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luces
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // Suelo Infinito
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            buildVaquero();
            if(tiendaCfg.activa) renderTiendaPro();

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            animate();
        }

        function buildVaquero() {
            vaquero = new THREE.Group();
            const matR = new THREE.MeshStandardMaterial({ color: playerCfg.color });
            const matP = new THREE.MeshStandardMaterial({ color: 0xffe0bd });
            const m = parseFloat(playerCfg.musculo);

            torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matR);
            torso.position.y = 1.6;

            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matP);
            cabeza.position.y = 2.4;

            pIzq = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), matR);
            pIzq.position.set(-0.25, 0.5, 0); pIzq.scale.set(m, 1, m);
            pDer = pIzq.clone(); pDer.position.x = 0.25;

            bIzq = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), matP);
            bIzq.position.set(-0.6 * m, 1.7, 0); bIzq.scale.set(m, 1, m);
            bDer = bIzq.clone(); bDer.position.x = 0.6 * m;

            vaquero.add(torso, cabeza, pIzq, pDer, bIzq, bDer);
            vaquero.scale.y = parseFloat(playerCfg.altura);
            scene.add(vaquero);
        }

        function renderTiendaPro() {
            const tGroup = new THREE.Group();
            tGroup.position.set(30, 0, -30); // Ubicación de la tienda en el mapa
            
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x151515, side: THREE.DoubleSide });
            
            // Estructura fija (Piso, Techo y Paredes ciegas)
            const floor = new THREE.Mesh(new THREE.BoxGeometry(16, 0.1, 16), wallMat);
            const roof = floor.clone(); roof.position.y = 6;
            const pA = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 0.4), wallMat); pA.position.set(0, 3, -8);
            const pI = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 16), wallMat); pI.position.set(-8, 3, 0);
            const pD = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 16), wallMat); pD.position.set(8, 3, 0);
            tGroup.add(floor, roof, pA, pI, pD);

            // Carga de objetos según las coordenadas X, Y, Z del Admin
            const pos = tiendaCfg.posiciones;

            // Función interna para colocar cada pieza
            const place = (mesh, key) => {
                if(pos[key]) {
                    mesh.position.set(pos[key].x, pos[key].y, pos[key].z);
                    tGroup.add(mesh);
                }
            };

            // Reconstrucción de formas reales
            const puerta = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 0.2), new THREE.MeshStandardMaterial({color: 0xff007f, transparent: true, opacity: 0.5}));
            place(puerta, 'puerta');

            const winMat = new THREE.MeshStandardMaterial({color: 0x00aaff, transparent: true, opacity: 0.3});
            place(new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.2), winMat), 'ventana_izq');
            place(new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.2), winMat), 'ventana_der');

            // Dispenser
            const dispenser = new THREE.Group();
            dispenser.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), new THREE.MeshStandardMaterial({color: 0xeeeeee})));
            const bidon = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0x00aaff}));
            bidon.position.y = 0.9; dispenser.add(bidon);
            place(dispenser, 'dispenser');

            // PC
            const pc = new THREE.Group();
            pc.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.1), new THREE.MeshStandardMaterial({color: 0x000})));
            place(pc, 'computadora');

            // Mobiliario Extra
            place(new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 1.5), new THREE.MeshStandardMaterial({color: 0x3e2723})), 'mostrador');
            place(new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.2), new THREE.MeshStandardMaterial({color: 0x111111})), 'heladera');
            place(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.4), new THREE.MeshStandardMaterial({color: 0x000, emissive: 0xff007f})), 'parlante');

            scene.add(tGroup);
        }

        function animate() {
            requestAnimationFrame(animate);
            let moving = false;

            if(vaquero) {
                const speed = 0.25 * (stats.energia / 100);
                if(keys['KeyW']) { vaquero.translateZ(speed); moving = true; stats.energia -= 0.05; }
                if(keys['KeyS']) { vaquero.translateZ(-speed); moving = true; }
                if(keys['KeyA']) { vaquero.rotation.y += 0.06; moving = true; }
                if(keys['KeyD']) { vaquero.rotation.y -= 0.06; moving = true; }

                stats.sed = Math.max(0, stats.sed - 0.01);

                if(moving) {
                    const t = Date.now() * 0.012;
                    pIzq.rotation.x = Math.sin(t) * 0.6; pDer.rotation.x = -Math.sin(t) * 0.6;
                    bIzq.rotation.x = -Math.sin(t) * 0.5; bDer.rotation.x = Math.sin(t) * 0.5;
                } else {
                    if(stats.energia < 100) stats.energia += 0.08;
                    pIzq.rotation.x = pDer.rotation.x = bIzq.rotation.x = bDer.rotation.x = 0;
                    torso.scale.x = 1 + Math.sin(Date.now() * 0.002) * 0.03;
                }

                // Lógica de Interacción con Dispenser
                // Nota: Las posiciones son relativas al grupo de la tienda (30, 0, -30)
                const configPos = tiendaCfg.posiciones || {};
                if(configPos.dispenser) {
                    const dispWorldPos = new THREE.Vector3(30 + configPos.dispenser.x, 0, -30 + configPos.dispenser.z);
                    const dist = vaquero.position.distanceTo(dispWorldPos);
                    const hint = document.getElementById('interact-hint');
                    
                    if(dist < 3.5) {
                        hint.style.display = 'block';
                        if(keys['KeyE']) stats.sed = 100;
                    } else { hint.style.display = 'none'; }
                }

                // Cámara
                const camPos = new THREE.Vector3(0, 7, 15).applyMatrix4(vaquero.matrixWorld);
                camera.position.lerp(camPos, 0.1);
                controls.target.lerp(vaquero.position, 0.1);
            }

            // Actualizar UI
            document.getElementById('bar-nrg').style.width = stats.energia + "%";
            document.getElementById('bar-h2o').style.width = stats.sed + "%";
            document.getElementById('txt-nrg').innerText = Math.round(stats.energia) + "%";
            document.getElementById('txt-h2o').innerText = Math.round(stats.sed) + "%";

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
