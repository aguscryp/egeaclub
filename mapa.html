<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agustín Engine | World Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid #ff007f;
            text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
        }
        .valor { color: #ff007f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <div>Sujeto: <span class="valor" id="p-name">AGUSTÍN</span></div>
        <div>Mundo: <span class="valor">SINCRONIZADO 4D</span></div>
        <div id="status">ESTADO: IDLE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="mapalisto.js"></script>

    <script>
        let scene, camera, renderer, vaquero, clock;
        let nubes = [], particulasSistema, keys = {};
        let walkCycle = 0, velocidadY = 0;
        let zoomDist = 120, camRotY = 0, camRotX = 0.5;

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            // 1. APLICAR CONFIGURACIÓN DE MAPALISTO.JS
            scene.background = new THREE.Color(MundoConfig.ambiente.niebla.color);
            scene.fog = new THREE.FogExp2(MundoConfig.ambiente.niebla.color, MundoConfig.ambiente.niebla.densidad);

            // Luces
            const sun = new THREE.DirectionalLight(MundoConfig.ambiente.iluminacion.sol.color, MundoConfig.ambiente.iluminacion.sol.intensidad);
            sun.position.set(...MundoConfig.ambiente.iluminacion.sol.pos);
            scene.add(sun, new THREE.AmbientLight(MundoConfig.ambiente.iluminacion.ambiente.color, MundoConfig.ambiente.iluminacion.ambiente.intensidad));

            // Suelo Profesional
            const groundGeo = new THREE.PlaneGeometry(MundoConfig.terreno.size, MundoConfig.terreno.size);
            const groundMat = new THREE.MeshStandardMaterial({ color: MundoConfig.terreno.colorPasto });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 2. GENERAR ELEMENTOS DINÁMICOS (4D)
            crearAtmosfera();
            
            // 3. CARGAR PERSONAJE Y OBJETOS
            sincronizarPersonaje();
            cargarObjetosElementor();

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 30000);
            
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            animate();
        }

        function crearAtmosfera() {
            // Nubes
            const nubeGeo = new THREE.SphereGeometry(1, 7, 7);
            for(let i = 0; i < MundoConfig.clima.nubes.cantidad; i++) {
                const n = new THREE.Mesh(nubeGeo, new THREE.MeshStandardMaterial({ color: MundoConfig.clima.nubes.color, transparent: true, opacity: 0.6 }));
                n.scale.set(Math.random()*40+20, 10, Math.random()*30+15);
                n.position.set((Math.random()-0.5)*10000, MundoConfig.clima.nubes.alturaBase + (Math.random()*200), (Math.random()-0.5)*10000);
                scene.add(n);
                nubes.push(n);
            }

            // Partículas de polvo/luz
            const partGeo = new THREE.BufferGeometry();
            const posArr = [];
            for(let i=0; i<MundoConfig.clima.particulas.cantidad; i++) {
                posArr.push((Math.random()-0.5)*MundoConfig.clima.particulas.area, Math.random()*500, (Math.random()-0.5)*MundoConfig.clima.particulas.area);
            }
            partGeo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
            particulasSistema = new THREE.Points(partGeo, new THREE.PointsMaterial({ size: MundoConfig.clima.particulas.size, color: MundoConfig.clima.particulas.color, transparent: true, opacity: 0.4 }));
            scene.add(particulasSistema);
        }

        function sincronizarPersonaje() {
            const config = JSON.parse(localStorage.getItem('playerConfig')) || { color: "#ff007f", musculo: 1, altura: 1 };
            document.getElementById('p-name').innerText = localStorage.getItem('currentUser') || "AGUSTÍN";
            
            vaquero = new THREE.Group();
            const m = parseFloat(config.musculo);
            const matRopa = new THREE.MeshStandardMaterial({ color: config.color });
            const matPiel = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(4*m, 6, 2.5*m), matRopa); torso.position.y = 8;
            const cabeza = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), matPiel); cabeza.position.y = 12.5;
            
            const pI = new THREE.Group(); const pD = new THREE.Group();
            const pierna = new THREE.Mesh(new THREE.BoxGeometry(1.6*m, 5, 1.6*m), matRopa);
            pI.add(pierna.clone()); pD.add(pierna.clone());
            pI.position.set(-1.2*m, 2.5, 0); pD.position.set(1.2*m, 2.5, 0);

            const bI = new THREE.Mesh(new THREE.BoxGeometry(1.3*m, 5, 1.3*m), matPiel); bI.position.set(-3*m, 8.5, 0);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(1.3*m, 5, 1.3*m), matPiel); bD.position.set(3*m, 8.5, 0);

            vaquero.add(torso, cabeza, pI, pD, bI, bD);
            vaquero.scale.y = parseFloat(config.altura);
            scene.add(vaquero);
        }

        function cargarObjetosElementor() {
            const objs = JSON.parse(localStorage.getItem('elementos_ciudad')) || [];
            objs.forEach(o => {
                const box = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 20), new THREE.MeshStandardMaterial({color: 0x444444}));
                box.position.set(o.pos.x, 10, o.pos.z);
                scene.add(box);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. ANIMACIÓN 4D (Nubes y Partículas)
            nubes.forEach(n => {
                n.position.z += MundoConfig.clima.nubes.velocidad * 100 * delta;
                if(n.position.z > 5000) n.position.z = -5000;
            });
            particulasSistema.rotation.y += 0.01 * delta;

            // 2. MOVIMIENTO AGUSTÍN
            if(vaquero) {
                let isMoving = false;
                const spd = (keys['ShiftLeft'] ? 160 : 80) * delta;

                if(keys['KeyW']) { vaquero.translateZ(spd); isMoving = true; }
                if(keys['KeyS']) { vaquero.translateZ(-spd); isMoving = true; }
                if(keys['KeyA']) vaquero.rotation.y += 3 * delta;
                if(keys['KeyD']) vaquero.rotation.y -= 3 * delta;

                // Animación de extremidades
                const pI = vaquero.children[2], pD = vaquero.children[3], bI = vaquero.children[4], bD = vaquero.children[5];
                if(isMoving) {
                    walkCycle += (keys['ShiftLeft'] ? 0.3 : 0.18);
                    pI.rotation.x = Math.sin(walkCycle) * 0.7;
                    pD.rotation.x = -Math.sin(walkCycle) * 0.7;
                    bI.rotation.x = -Math.sin(walkCycle) * 0.7;
                    bD.rotation.x = Math.sin(walkCycle) * 0.7;
                } else {
                    [pI, pD, bI, bD].forEach(p => p.rotation.x *= 0.9);
                }

                // Cámara sigue al personaje
                camera.position.lerp(new THREE.Vector3(
                    vaquero.position.x + zoomDist * Math.sin(camRotY),
                    vaquero.position.y + 60,
                    vaquero.position.z + zoomDist * Math.cos(camRotY)
                ), 0.1);
                camera.lookAt(vaquero.position.x, vaquero.position.y + 10, vaquero.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
