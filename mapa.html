<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre | Agustín Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        /* Interfaz del Jugador */
        #hud {
            position: absolute; top: 20px; left: 20px;
            padding: 15px; background: rgba(0,0,0,0.8);
            border-left: 4px solid #ff007f; color: white; z-index: 100;
        }
        .instrucciones { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ff007f; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; font-size: 18px;">EXPLORADOR 3D</div>
        <div id="info-personaje" style="color: #00d4ff; font-size: 12px;">Cargando perfil...</div>
    </div>

    <div class="instrucciones">USA EL MOUSE PARA EXPLORAR LA CIUDAD</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls;
        const loader = new THREE.GLTFLoader();
        let estructurasCargadas = [];

        // 1. ASSETS REALISTAS (Deben ser iguales a los de construccion.html)
        const ASSETS = {
            'casa': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/SheenChair.glb',
            'edificio': 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Buildings.glb',
            'chery': 'chery.glb',
            'vento': 'vento.glb'
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 15000);
            camera.position.set(300, 200, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Iluminación
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 250);
            scene.add(sun);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // CARGAR TODO
            cargarPersonaje(); // Trae lo de perfil.html
            sincronizarConstruccion(); // Trae lo de construccion.html

            animate();
        }

        // Recupera los datos del personaje de perfil.html
        function cargarPersonaje() {
            const p = localStorage.getItem('usuario_perfil'); // Ajustá el nombre si usaste otro
            if(p) {
                const data = JSON.parse(p);
                document.getElementById('info-personaje').innerText = `Jugador: ${data.nombre || 'Agustín'}`;
            }
        }

        // LEE LA BASE DE DATOS QUE LLENASTE EN CONSTRUCCION.HTML
        async function sincronizarConstruccion() {
            const data = localStorage.getItem('ciudad_db'); // Esta es la "llave" mágica
            if(!data) return;

            const objetos = JSON.parse(data);
            for(let item of objetos) {
                await colocarEnMapa(item);
            }
        }

        function colocarEnMapa(item) {
            return new Promise((resolve) => {
                if(item.type === 'calle') {
                    // Genera la calle por código para que sea rápida
                    const g = new THREE.Group();
                    const m = new THREE.Mesh(new THREE.BoxGeometry(40, 0.4, 40), new THREE.MeshStandardMaterial({color: 0x111111}));
                    g.add(m); g.position.set(item.pos.x, item.pos.y, item.pos.z);
                    g.rotation.y = item.rot;
                    scene.add(g);
                    resolve();
                } else {
                    // Carga el modelo 3D real (Chery, Casa, etc)
                    loader.load(ASSETS[item.type], (gltf) => {
                        const m = gltf.scene;
                        m.position.set(item.pos.x, item.pos.y, item.pos.z);
                        m.rotation.y = item.rot;
                        
                        // Escalas automáticas para que no se vean gigantes
                        if(item.type === 'chery') m.scale.set(12, 12, 12);
                        if(item.type === 'edificio') m.scale.set(40, 40, 40);

                        scene.add(m);
                        resolve();
                    }, undefined, () => resolve());
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
