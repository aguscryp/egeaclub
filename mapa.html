<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Libre - Cowboy Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* UI ESTILO PINK PRO */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 10, 10, 0.8);
            padding: 15px; border-radius: 12px;
            border: 1px solid #ff007f; color: white;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            z-index: 100;
        }
        .pink { color: #ff007f; font-weight: bold; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff007f; display: flex;
            align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading-screen">Cargando Mundo de <span id="user-load"></span>...</div>

<div id="ui-layer">
    <div>Jugador: <span id="playerName" class="pink"></span></div>
    <small>WASD: Mover | E: Interactuar</small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="logica.js"></script>

<script>
    // Recuperar datos de sesión
    const usuario = localStorage.getItem('currentUser') || "Invitado";
    document.getElementById('playerName').innerText = usuario;
    document.getElementById('user-load').innerText = usuario;

    // Iniciar el motor que reside en logica.js
    window.onload = () => {
        initGame();
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
        }, 1000);
    };
</script>
</body>
</html>
